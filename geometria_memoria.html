<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔷 Geometria Memória</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--sky:#6EC6F5;--sun:#FFD43B;--grass:#51CF66;--coral:#FF6B6B;--purple:#CC5DE8;--orange:#FF922B;--mint:#38D9A9;--bg:#F0F4FF;--shadow:0 6px 24px rgba(0,0,0,.10);--radius:22px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
.bg-shapes{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-shape{position:absolute;opacity:.07;animation:floatShape 10s ease-in-out infinite;}
@keyframes floatShape{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-22px) rotate(8deg);}}
.app{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:16px 12px 50px;}
header{text-align:center;padding:16px 0 8px;}
.header-title{font-size:clamp(1.8rem,6vw,3rem);font-weight:900;background:linear-gradient(135deg,#4263EB,#7950F2,#E64980);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.header-sub{font-size:1rem;color:#888;margin-top:4px;}
.daily-counter{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap;}.daily-box{background:white;border-radius:14px;box-shadow:0 3px 12px rgba(0,0,0,.08);padding:7px 16px;display:flex;align-items:center;gap:7px;font-size:.95rem;font-weight:800;color:#555;}.daily-box .star-count{font-size:1.3rem;color:#F59F00;}.daily-box .day-label{font-size:.75rem;font-weight:700;color:#aaa;}.btn-reset-stars{font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;padding:6px 13px;border:2px solid #EEE;border-radius:50px;background:white;color:#bbb;cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,.06);}.btn-reset-stars:hover{border-color:var(--coral);color:var(--coral);}
.tabs{display:flex;gap:8px;justify-content:center;margin:18px 0 10px;flex-wrap:wrap;}
.tab-btn{font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;padding:9px 18px;border:none;border-radius:50px;cursor:pointer;transition:all .2s;background:white;color:#aaa;box-shadow:0 3px 10px rgba(0,0,0,.08);}
.tab-btn.active{background:linear-gradient(135deg,#4263EB,#7950F2);color:white;box-shadow:0 6px 18px rgba(121,80,242,.35);transform:translateY(-2px);}
.panel{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 26px;margin-bottom:16px;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.panel-title{font-size:1.2rem;font-weight:800;color:#444;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.settings-grid{grid-template-columns:1fr;}}
.setting-item label{display:block;font-size:.88rem;font-weight:700;color:#666;margin-bottom:5px;}
.setting-item select,.setting-item input[type=range]{width:100%;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;border:2.5px solid #eee;border-radius:12px;padding:7px 11px;background:#fafafa;color:#444;outline:none;transition:border-color .2s;cursor:pointer;}
.setting-item select:focus{border-color:#7950F2;}
.setting-item.full-width{grid-column:1/-1;}
.range-row{display:flex;align-items:center;gap:8px;}
.range-val{min-width:30px;text-align:center;font-size:1.05rem;font-weight:800;color:#7950F2;background:#F3F0FF;border-radius:8px;padding:2px 6px;}
/* COLOR PICKER */
.color-picker{display:flex;gap:8px;flex-wrap:wrap;}
.color-toggle{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .2s;opacity:.45;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.color-toggle.active{opacity:1;border-color:white;box-shadow:0 0 0 3px #7950F2;}
/* SHAPE SET BTNS */
.shapeset-btns{display:flex;gap:7px;flex-wrap:wrap;}
.ss-btn{font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;padding:7px 14px;border:2.5px solid transparent;border-radius:50px;cursor:pointer;transition:all .2s;opacity:.55;background:#E7F5FF;color:#1971C2;}
.ss-btn.active{opacity:1;transform:scale(1.06);border-color:#1971C2;box-shadow:0 3px 10px rgba(0,0,0,.12);}
.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:6px 0 14px;}
.mode-card{background:#fafafa;border:2.5px solid #eee;border-radius:16px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;font-weight:700;font-size:.88rem;color:#666;}
.mode-card .mode-icon{font-size:1.9rem;margin-bottom:6px;}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.10);}
.mode-card.active{border-color:#7950F2;background:#F3F0FF;color:#7950F2;box-shadow:0 4px 16px rgba(121,80,242,.25);transform:translateY(-2px);}
.btn-start{display:block;width:100%;font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:800;color:white;background:linear-gradient(135deg,#4263EB,#7950F2);border:none;border-radius:50px;padding:15px 28px;cursor:pointer;box-shadow:0 8px 24px rgba(66,99,235,.4);transition:all .2s;margin-top:8px;}
.btn-start:hover{transform:translateY(-3px) scale(1.02);}
.btn-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
.btn-action{flex:1;min-width:120px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;padding:11px 18px;border:none;border-radius:50px;cursor:pointer;transition:all .2s;color:white;}
.btn-check{background:linear-gradient(135deg,#7950F2,var(--sky));box-shadow:0 5px 16px rgba(110,198,245,.4);}
.btn-next{background:linear-gradient(135deg,var(--grass),var(--mint));box-shadow:0 5px 16px rgba(56,217,169,.4);}
.btn-reset{background:linear-gradient(135deg,#4263EB,#7950F2);box-shadow:0 5px 16px rgba(66,99,235,.3);}
.btn-action:hover{transform:translateY(-2px) scale(1.03);}
#game-area{display:none;}
.phase-label{text-align:center;font-size:1.35rem;font-weight:800;color:#555;margin-bottom:12px;min-height:38px;}
.phase-label span{color:#7950F2;}
.progress-wrap{background:#F0F0F0;border-radius:50px;height:10px;margin-bottom:18px;overflow:hidden;}
.progress-bar{height:100%;border-radius:50px;background:linear-gradient(90deg,#4263EB,#7950F2);transition:width .4s;}
.round-info{display:flex;justify-content:space-between;align-items:center;font-size:.88rem;font-weight:700;color:#999;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.score-badge{background:linear-gradient(135deg,var(--sun),var(--orange));color:white;border-radius:50px;padding:4px 13px;font-size:.9rem;font-weight:800;box-shadow:0 3px 10px rgba(255,146,43,.35);}
.mode-badge{font-size:.75rem;font-weight:800;padding:3px 10px;border-radius:50px;background:#F3F0FF;color:#7950F2;}
.img-grid{display:grid;gap:10px;justify-items:center;margin-bottom:14px;}
.img-card{background:white;border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.09);padding:12px 8px;cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);border:3px solid transparent;display:flex;flex-direction:column;align-items:center;user-select:none;position:relative;width:100%;}
.img-card:hover:not(.locked){transform:translateY(-4px) scale(1.05);box-shadow:0 10px 26px rgba(0,0,0,.14);}
.img-card svg{display:block;}
.img-card.selected{border-color:#7950F2;background:#F3F0FF;transform:scale(1.06);}
.img-card.correct{border-color:var(--grass);background:#EBFBEE;animation:pop .35s;}
.img-card.wrong{border-color:var(--coral);background:#FFF5F5;animation:shake .4s;}
.img-card.locked{cursor:default;}
.img-card.face-down{background:linear-gradient(135deg,#74C0FC,#4DABF7);border-color:#339AF0;}
.img-card.face-down svg{visibility:hidden;}
.img-card.face-down::after{content:'?';position:absolute;font-size:2.2rem;font-weight:900;color:white;opacity:.85;}
.order-slots{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.order-slot{min-width:70px;min-height:70px;border:3px dashed #DDD;border-radius:14px;display:flex;align-items:center;justify-content:center;background:#FAFAFA;transition:all .2s;position:relative;}
.order-slot.filled{border-style:solid;border-color:#7950F2;background:#F3F0FF;}
.order-slot .slot-num{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#7950F2;color:white;font-size:.62rem;font-weight:800;border-radius:50px;padding:1px 7px;}
.feedback-box{text-align:center;padding:14px;border-radius:16px;margin-top:10px;font-size:1.1rem;font-weight:800;display:none;animation:fadeIn .3s;}
.feedback-box.success{background:#EBFBEE;color:#2F9E44;}.feedback-box.fail{background:#FFF5F5;color:#C92A2A;}
.timer-ring{width:52px;height:52px;border-radius:50%;border:5px solid #EEE;border-top-color:#7950F2;animation:spin 1s linear infinite;margin:0 auto 10px;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.pairs-grid{display:grid;gap:10px;justify-items:center;margin-bottom:14px;}
.changed-grid{display:flex;gap:0;justify-content:center;flex-wrap:wrap;margin-bottom:14px;background:white;border-radius:18px;overflow:hidden;border:2.5px solid #EEE;}
.changed-col{flex:1;min-width:110px;padding:14px 12px;}
.changed-col:first-child{border-right:3px solid #DEE2E6;background:#FAFAFA;}
.changed-col:last-child{background:#F3F0FF;}
.changed-label{text-align:center;font-size:.82rem;font-weight:800;margin-bottom:10px;padding:5px 12px;border-radius:50px;display:inline-block;width:100%;}
.changed-col:first-child .changed-label{background:#E9ECEF;color:#666;}
.changed-col:last-child .changed-label{background:#E5DBFF;color:#7950F2;}
.count-display{text-align:center;padding:14px 0 18px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);display:flex;flex-wrap:wrap;justify-content:center;gap:8px;}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.count-options{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.count-btn{font-family:'Nunito',sans-serif;font-size:1.4rem;font-weight:800;width:66px;height:66px;border:3px solid #EEE;border-radius:16px;background:white;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(0,0,0,.08);color:#444;}
.count-btn:hover{transform:translateY(-3px) scale(1.06);border-color:#7950F2;background:#F3F0FF;}
.count-btn.correct{border-color:var(--grass);background:#EBFBEE;color:#2F9E44;}
.count-btn.wrong{border-color:var(--coral);background:#FFF5F5;color:#C92A2A;}
.missing-question{padding:12px;background:#F8F9FA;border-radius:14px;margin-bottom:10px;}
#result-screen{display:none;text-align:center;padding:28px 18px;animation:fadeIn .4s;}
.result-emoji{font-size:4.5rem;margin-bottom:8px;animation:bounce 1s infinite;}
.result-title{font-size:1.8rem;font-weight:900;color:#444;}
.result-score{font-size:1.1rem;color:#888;margin:8px 0 14px;}
.result-stars{font-size:2rem;font-weight:900;color:#F59F00;margin:8px 0 20px;}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:confettiFall 1.8s ease-in forwards;z-index:999;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1.06)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>
<body>
<div class="bg-shapes">
  <svg class="bg-shape" style="width:200px;top:3%;left:-30px" viewBox="0 0 100 100"><polygon points="50,5 95,95 5,95" fill="#4263EB"/></svg>
  <svg class="bg-shape" style="width:160px;top:18%;right:-20px;animation-delay:2s" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" fill="#7950F2"/></svg>
  <svg class="bg-shape" style="width:220px;bottom:8%;left:5%;animation-delay:4s" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#E64980"/></svg>
  <svg class="bg-shape" style="width:140px;bottom:25%;right:3%;animation-delay:1.5s" viewBox="0 0 100 100"><polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#F59F00"/></svg>
  <svg class="bg-shape" style="width:180px;top:45%;left:38%;animation-delay:3s" viewBox="0 0 100 100"><polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="#2F9E44"/></svg>
</div>

<div class="app">
  <header>
    <div class="header-title">🔷 Geometria Memória</div>
    <div class="header-sub">Formák, színek – fejleszd a megfigyelőképességed!</div>
    <div class="daily-counter" id="daily-counter" style="display:none">
      <div class="daily-box">
        <span>⭐</span>
        <div>
          <div class="star-count" id="daily-star-count">0 pont</div>
          <div class="day-label" id="daily-date-label"></div>
        </div>
      </div>
      <button class="btn-reset-stars" onclick="resetDailyStars()" title="Nullázás – következő gyerek">🔄 Nullázás</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('game')">🎮 Játék</button>
    <button class="tab-btn" onclick="switchTab('settings')">⚙️ Beállítások</button>
  </div>

  <!-- SETTINGS -->
  <div class="panel" id="settings-panel" style="display:none">
    <div class="panel-title">⚙️ Pedagógus / Szülő beállítások</div>
    <div class="settings-grid">

      <div class="setting-item full-width">
        <label>🔷 Formakészlet</label>
        <div class="shapeset-btns">
          <button class="ss-btn active" id="ss-alap" onclick="setShapeSet('alap',this)">⬤ Alap<br><small>kör, négyzet, háromszög</small></button>
          <button class="ss-btn" id="ss-basic" onclick="setShapeSet('basic',this)">🔵 Egyszerű<br><small>+ téglalap, csillag</small></button>
          <button class="ss-btn" id="ss-extended" onclick="setShapeSet('extended',this)">🔶 Bővített<br><small>+ ötszög, hatszög, félkör</small></button>
          <button class="ss-btn" id="ss-extra" onclick="setShapeSet('extra',this)">🌀 Extra<br><small>+ fejen álló háromszög, elforgatott félkörök</small></button>
        </div>
      </div>

      <div class="setting-item full-width">
        <label>🎨 Aktív színek (1–4)</label>
        <div class="color-picker">
          <div class="color-toggle active" id="ct-red"    style="background:#e03131" title="Piros"  onclick="toggleColor('red')"></div>
          <div class="color-toggle active" id="ct-blue"   style="background:#1971C2" title="Kék"    onclick="toggleColor('blue')"></div>
          <div class="color-toggle active" id="ct-green"  style="background:#2F9E44" title="Zöld"   onclick="toggleColor('green')"></div>
          <div class="color-toggle active" id="ct-yellow" style="background:#F59F00" title="Sárga"  onclick="toggleColor('yellow')"></div>
        </div>
        <div style="font-size:.78rem;color:#aaa;margin-top:5px" id="color-hint">Mind a 4 szín aktív</div>
      </div>

      <div class="setting-item">
        <label>🔷 Formák száma egy körben</label>
        <div class="range-row">
          <input type="range" id="img-count" min="1" max="10" value="4" oninput="$('img-count-val').textContent=this.value">
          <div class="range-val" id="img-count-val">4</div>
        </div>
      </div>

      <div class="setting-item">
        <label>👁️ Megjegyzési idő (mp)</label>
        <div class="range-row">
          <input type="range" id="mem-time" min="2" max="20" value="6" oninput="$('mem-time-val').textContent=this.value">
          <div class="range-val" id="mem-time-val">6</div>
        </div>
      </div>

      <div class="setting-item">
        <label>🔄 Körök száma</label>
        <div class="range-row">
          <input type="range" id="rounds" min="1" max="10" value="5" oninput="$('rounds-val').textContent=this.value">
          <div class="range-val" id="rounds-val">5</div>
        </div>
      </div>

      <div class="setting-item">
        <label>➕ Elterelők száma (visszamondásnál)</label>
        <div class="range-row">
          <input type="range" id="distractor-count" min="1" max="5" value="2" oninput="$('distractor-count-val').textContent=this.value">
          <div class="range-val" id="distractor-count-val">2</div>
        </div>
      </div>

      <div class="setting-item">
        <label>🎮 Játékmód</label>
        <select id="settings-mode">
          <option value="recall">🔁 Visszamondás</option>
          <option value="order">🔢 Sorba rendezés</option>
          <option value="missing">🔍 Mi hiányzik?</option>
          <option value="pairs">🪞 Páros memória</option>
          <option value="changed">🎨 Mi változott?</option>
          <option value="count">🔢 Hány volt?</option>
          <option value="mixed_all">🎲 Vegyes (mind)</option>
        </select>
      </div>

    </div>
    <button class="btn-start" onclick="applySettings()">✅ Mentés és játék indítása</button>
  </div>

  <!-- GAME PANEL -->
  <div id="game-panel">
    <div class="panel" id="start-screen">
      <div style="text-align:center;padding:6px 0 4px">
        <div style="display:flex;justify-content:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <svg width="48" height="48" viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="#e03131"/></svg>
          <svg width="48" height="48" viewBox="0 0 100 100"><polygon points="50,6 94,94 6,94" fill="#1971C2"/></svg>
          <svg width="48" height="48" viewBox="0 0 100 100"><rect x="8" y="8" width="84" height="84" fill="#2F9E44"/></svg>
          <svg width="48" height="48" viewBox="0 0 100 100"><polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#F59F00"/></svg>
        </div>
        <div style="font-size:1.15rem;font-weight:800;color:#555;margin-bottom:12px">Válassz játékmódot!</div>
        <div class="mode-grid">
          <div class="mode-card active" onclick="selectMode('recall',this)"><div class="mode-icon">🔁</div>Visszamondás</div>
          <div class="mode-card" onclick="selectMode('order',this)"><div class="mode-icon">🔢</div>Sorba rendezés</div>
          <div class="mode-card" onclick="selectMode('missing',this)"><div class="mode-icon">🔍</div>Mi hiányzik?</div>
          <div class="mode-card" onclick="selectMode('pairs',this)"><div class="mode-icon">🪞</div>Páros memória</div>
          <div class="mode-card" onclick="selectMode('changed',this)"><div class="mode-icon">🎨</div>Mi változott?</div>
          <div class="mode-card" onclick="selectMode('count',this)"><div class="mode-icon">🔢</div>Hány volt?</div>
        </div>
        <button class="btn-start" onclick="startGame()">🚀 Játék indítása!</button>
      </div>
    </div>

    <div id="game-area">
      <div class="panel">
        <div class="round-info">
          <span id="round-label">Kör: 1 / 5</span>
          <span class="mode-badge" id="mode-badge">🔁 Visszamondás</span>
          <div class="score-badge">⭐ <span id="score-val">0</span> pont</div>
        </div>
        <div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
        <div class="timer-ring" id="timer-ring"></div>
        <div class="phase-label" id="phase-label"></div>
        <div class="img-grid" id="img-grid"></div>
        <div class="order-slots" id="order-slots" style="display:none"></div>
        <div class="pairs-grid" id="pairs-grid" style="display:none"></div>
        <div id="count-area" style="display:none">
          <div class="count-display" id="count-display"></div>
          <div class="count-options" id="count-options"></div>
        </div>
        <div class="changed-grid" id="changed-grid" style="display:none"></div>
        <div class="missing-question" id="missing-q" style="display:none"></div>
        <div class="feedback-box" id="feedback-box"></div>
        <div class="btn-row" id="btn-row" style="display:none">
          <button class="btn-action btn-check" id="btn-check" onclick="routeCheck()" style="display:none">✅ Ellenőrzés</button>
          <button class="btn-action btn-next" id="btn-next" onclick="nextRound()" style="display:none">➡️ Következő</button>
          <button class="btn-action btn-reset" onclick="resetGame()">🏠 Kezdőoldal</button>
        </div>
      </div>
    </div>

    <div id="result-screen">
      <div class="panel">
        <div class="result-emoji" id="res-emoji">🎉</div>
        <div class="result-title" id="res-title">Szuper!</div>
        <div class="result-score" id="res-score"></div>
        <div class="result-stars" id="res-stars"></div>
        <button class="btn-start" onclick="resetGame()">🏠 Kezdőoldal</button>
        <button class="btn-action btn-reset" style="margin-top:10px;width:100%" onclick="startGame(true)">⚡ Ugyanez újra</button>
      </div>
    </div>
  </div>
</div>

<script>
// =================== COLORS ===================
const ALL_COLORS={
  red:   {id:'red',   fill:'#e03131',stroke:'#c92a2a',name:'piros'},
  blue:  {id:'blue',  fill:'#1971C2',stroke:'#1864AB',name:'kék'},

const SHAPE_DEFS=[
  // ALAP (set 0)
  {id:'circle',   set:0, svg:(f,s,r)=>`<circle cx="50" cy="50" r="44" fill="${f}" stroke="${s}" stroke-width="3"/>`},
  {id:'square',   set:0, svg:(f,s,r)=>`<rect x="8" y="8" width="84" height="84" fill="${f}" stroke="${s}" stroke-width="3"/>`},
  {id:'triangle', set:0, svg:(f,s,r)=>`<polygon points="50,6 94,94 6,94" fill="${f}" stroke="${s}" stroke-width="3"/>`},
  // EGYSZERŰ (set 1)
  {id:'rect_h',   set:1, svg:(f,s,r)=>`<rect x="6" y="26" width="88" height="48" fill="${f}" stroke="${s}" stroke-width="3"/>`},
  {id:'star',     set:1, svg:(f,s,r)=>`<polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="${f}" stroke="${s}" stroke-width="2"/>`},
  // BŐVÍTETT (set 2)
  {id:'pentagon', set:2, svg:(f,s,r)=>`<polygon points="50,5 97,36 79,91 21,91 3,36" fill="${f}" stroke="${s}" stroke-width="3"/>`},
  {id:'hexagon',  set:2, svg:(f,s,r)=>`<polygon points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5" fill="${f}" stroke="${s}" stroke-width="3"/>`},
  {id:'semi_up',  set:2, svg:(f,s,r)=>`<path d="M6,50 A44,44 0 0,1 94,50 Z" fill="${f}" stroke="${s}" stroke-width="3"/>`},

  {id:'tri_inv',  set:3, svg:(f,s,r)=>`<polygon points="50,94 6,6 94,6" fill="${f}" stroke="${s}" stroke-width="3"/>`},
  {id:'semi_rt',  set:3, svg:(f,s,r)=>`<path d="M50,6 A44,44 0 0,1 50,94 Z" fill="${f}" stroke="${s}" stroke-width="3"/>`},
  {id:'semi_dn',  set:3, svg:(f,s,r)=>`<path d="M6,50 A44,44 0 0,0 94,50 Z" fill="${f}" stroke="${s}" stroke-width="3"/>`},
  {id:'semi_lt',  set:3, svg:(f,s,r)=>`<path d="M50,6 A44,44 0 0,0 50,94 Z" fill="${f}" stroke="${s}" stroke-width="3"/>`},
];

function getActiveShapes(){
  const maxSet={alap:0,basic:1,extended:2,extra:3}[cfg.shapeSet]||0;
  return SHAPE_DEFS.filter(s=>s.set<=maxSet);
}
function getActiveColors(){
  return cfg.activeColors.map(id=>ALL_COLORS[id]).filter(Boolean);
}

function makeSVG(shape,color,size=64){
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${shape.svg(color.fill,color.stroke)}</svg>`;
}

function buildPool(){
  const shapes=getActiveShapes();
  const colors=getActiveColors();
  const pool=[];
  if(colors.length===1){
    // 1 szín: minden forma csak egyszer, garantáltan különböző formák
    for(const shape of shapes){
      const color=colors[0];
      pool.push({id:shape.id+'_'+color.id,shape,color,svg:makeSVG(shape,color),svgSmall:makeSVG(shape,color,44)});
    }
  }else{
    for(const shape of shapes){
      for(const color of colors){
        pool.push({id:shape.id+'_'+color.id,shape,color,svg:makeSVG(shape,color),svgSmall:makeSVG(shape,color,44)});
      }
    }
  }
  return pool;
}

// =================== STATE ===================
const MODE_LABELS={recall:'🔁 Visszamondás',order:'🔢 Sorba rendezés',missing:'🔍 Mi hiányzik?',pairs:'🪞 Páros memória',changed:'🎨 Mi változott?',count:'🔢 Hány volt?'};

let cfg={count:4,memTime:6,rounds:5,mode:'recall',shapeSet:'alap',activeColors:['red','blue','green','yellow'],distractorCount:2};
let selectedMode='recall', state={};

function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function $(id){return document.getElementById(id);}

// =================== SETTINGS UI ===================
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='game')||(i===1&&t==='settings')));
  $('settings-panel').style.display=t==='settings'?'block':'none';

function selectMode(m,el){selectedMode=m;document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('active'));el.classList.add('active');}

function setShapeSet(s,btn){

}

function toggleColor(id){
  const active=cfg.activeColors;
  if(active.includes(id)){
    cfg.activeColors=active.filter(c=>c!==id);
    $('ct-'+id).classList.remove('active');
  }else{

function updateColorHint(){

function applySettings(){
  cfg.count=+$('img-count').value;
  cfg.memTime=+$('mem-time').value;
  cfg.rounds=+$('rounds').value;
  cfg.distractorCount=+$('distractor-count').value;
  selectedMode=$('settings-mode').value;

}

// =================== GAME FLOW ===================
function startGame(fromSettings){
  $('start-screen').style.display='none';$('result-screen').style.display='none';$('game-area').style.display='block';
  if(!cfg.rounds)cfg.rounds=5;
  state={round:1,score:0,answered:false,pairsFlipped:[],pairsMatched:new Set(),pairsLock:false};
  updateStarsDisplay();loadRound();
}
function pickRandom(){const m=Object.keys(MODE_LABELS);return m[Math.floor(Math.random()*m.length)];}
function loadRound(){
  state.answered=false;state.pairsFlipped=[];state.pairsMatched=new Set();state.pairsLock=false;
  const pool=shuffle(buildPool());
  // make sure pool is large enough
  const need=cfg.count+6;
  const bigPool=pool.length>=need?pool:shuffle([...pool,...pool,...pool]).slice(0,need*2).filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i).slice(0,need)||pool;
  let mode=selectedMode==='mixed_all'?pickRandom():selectedMode;
  state.currentMode=mode;
  hideAll();updateRoundUI();
  state.shownItems=pool.slice(0,cfg.count);
  state.shownOrder=[...state.shownItems];
  state.distractors=pool.slice(cfg.count,cfg.count+Math.min(pool.length-cfg.count,cfg.distractorCount));
  $('mode-badge').textContent=MODE_LABELS[mode]||mode;
  if(mode==='pairs'){loadPairs();return;}
  if(mode==='count'){loadCount();return;}
  if(mode==='changed'){loadChanged();return;}
  renderMemorize();
  startTimer(cfg.memTime,()=>startAnswerPhase(mode));
}
function hideAll(){
  $('img-grid').style.display='grid';$('img-grid').innerHTML='';
  $('order-slots').style.display='none';$('pairs-grid').style.display='none';
  $('count-area').style.display='none';
  $('changed-grid').style.display='none';$('changed-grid').innerHTML='';
  $('missing-q').style.display='none';$('feedback-box').style.display='none';
  $('btn-row').style.display='none';$('btn-check').style.display='none';$('btn-next').style.display='none';
  $('timer-ring').style.display='none';
}
function updateRoundUI(){
  $('round-label').textContent='Kör: '+state.round+' / '+cfg.rounds;
  $('score-val').textContent=state.score;
  $('prog-bar').style.width=((state.round-1)/cfg.rounds*100)+'%';
}
function startTimer(sec,cb){
  $('timer-ring').style.display='block';let t=sec;
  $('phase-label').innerHTML='👀 Figyelj! <span>'+t+'</span> mp';
  const iv=setInterval(()=>{t--;$('phase-label').innerHTML='👀 Figyelj! <span>'+t+'</span> mp';if(t<=0){clearInterval(iv);$('timer-ring').style.display='none';cb();}},1000);
}

// =================== CARD HTML ===================
function cardHTML(item,id,onclick,extraClass){

  return `<div class="img-card ${extraClass||''}" id="${id}" ${oc} data-key="${item.id}">${item.svg}</div>`;

// =================== MEMORIZE ===================
function renderMemorize(){
  const grid=$('img-grid'),isOrder=(state.currentMode==='order');

// =================== RECALL ===================
function startAnswerPhase(mode){if(mode==='recall')startRecall();else if(mode==='order')startOrder();else if(mode==='missing')startMissing();}
function startRecall(){
  $('phase-label').innerHTML='🤔 <span>Melyik formákat láttad?</span> Kattints rájuk!';
  state.selected=[];
  const all=shuffle([...state.shownItems,...state.distractors]);
  const cols=all.length<=4?2:all.length<=6?3:4;
  const grid=$('img-grid');grid.style.gridTemplateColumns='repeat('+cols+',1fr)';grid.style.overflowX='';
  grid.innerHTML=all.map((item,i)=>cardHTML(item,'ri-'+i,'toggleRecall('+i+')','')).join('');
  showBtnRow(true,false);
}
function toggleRecall(i){
  if(state.answered)return;
  const card=$('ri-'+i),key=card.dataset.key;
  if(state.selected.includes(key)){state.selected=state.selected.filter(k=>k!==key);card.classList.remove('selected');}
  else{state.selected.push(key);card.classList.add('selected');}
}
function checkRecall(){
  state.answered=true;const shown=state.shownItems.map(x=>x.id);let correct=0;
  document.querySelectorAll('[id^="ri-"]').forEach(card=>{
    const key=card.dataset.key,wasShown=shown.includes(key),wasSel=state.selected.includes(key);
    card.classList.add('locked');
    if(wasShown&&wasSel){card.classList.add('correct');correct++;}
    else if(!wasShown&&wasSel)card.classList.add('wrong');
    else if(wasShown&&!wasSel)card.style.opacity='.4';
  });
  awardPoints(correct,shown.length);
}

// =================== ORDER ===================
function startOrder(){
  $('phase-label').innerHTML='🔢 <span>Rendezd sorba!</span> Ahogy láttad.';
  state.orderAnswer=[];
  const shuffled=shuffle([...state.shownItems]);
  const grid=$('img-grid');grid.style.gridTemplateColumns='repeat('+shuffled.length+',1fr)';grid.style.overflowX='auto';
  grid.innerHTML=shuffled.map((item,i)=>cardHTML(item,'oi-'+i,'selectOrder('+i+')','')).join('');
  const slots=$('order-slots');slots.style.display='flex';
  slots.innerHTML=state.shownItems.map((_,i)=>'<div class="order-slot" id="slot-'+i+'"><span class="slot-num">'+(i+1)+'.</span></div>').join('');
  showBtnRow(false,false);$('btn-row').style.display='flex';
}
function selectOrder(i){
  if(state.answered)return;
  const card=$('oi-'+i);if(card.classList.contains('locked'))return;
  const key=card.dataset.key;state.orderAnswer.push(key);card.classList.add('locked','selected');
  const idx=state.orderAnswer.length-1,slot=$('slot-'+idx);
  const item=state.shownItems.find(x=>x.id===key)||state.distractors.find(x=>x.id===key);
  if(slot){slot.innerHTML='<span class="slot-num">'+(idx+1)+'.</span>'+(item?item.svgSmall:'');slot.classList.add('filled');}
  if(state.orderAnswer.length===state.shownItems.length)setTimeout(checkOrder,300);
}
function checkOrder(){
  state.answered=true;const co=state.shownOrder.map(x=>x.id);let correct=0;
  state.orderAnswer.forEach((key,i)=>{const slot=$('slot-'+i);if(co[i]===key){correct++;if(slot)slot.style.borderColor='var(--grass)';}else{if(slot)slot.style.borderColor='var(--coral)';}});
  awardPoints(correct,co.length);
}

// =================== MISSING ===================
function startMissing(){
  const mi=Math.floor(Math.random()*state.shownItems.length);
  state.missingItem=state.shownItems[mi];
  const visible=state.shownItems.filter((_,i)=>i!==mi);
  $('phase-label').innerHTML='🔍 <span>Melyik hiányzik?</span> Válassz!';

    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'

    +'</div>';

function checkMissing(k){

  $('missing-q').querySelectorAll('button').forEach(btn=>{
    btn.disabled=true;const oc=btn.getAttribute('onclick');

    else if(oc&&oc.includes("'"+k+"'")&&!ok)btn.style.cssText+='border-color:var(--coral);background:#FFF5F5;';
  });

}

// =================== PAIRS ===================
function loadPairs(){
  $('phase-label').innerHTML='🪞 <span>Keresd a párokat!</span> Kettesével fordítsd fel!';
  $('img-grid').style.display='none';
  const pairsCount=Math.min(Math.max(2,Math.floor(cfg.count/2)*2),8);
  const items=shuffle(buildPool()).slice(0,pairsCount);
  const cards=shuffle([...items,...items].map((item,i)=>({...item,uid:i})));
  state.pairsCards=cards;state.pairsFlipped=[];state.pairsMatched=new Set();
  const grid=$('pairs-grid');grid.style.display='grid';
  grid.style.gridTemplateColumns='repeat(4,1fr)';
  grid.innerHTML=cards.map((card,i)=>cardHTML(card,'pc-'+i,'flipPair('+i+')','face-down')).join('');
  showBtnRow(false,false);$('btn-row').style.display='flex';
}
function flipPair(i){
  if(state.pairsLock||state.pairsMatched.has(i))return;
  const card=$('pc-'+i);
  if(!card.classList.contains('face-down'))return;
  card.classList.remove('face-down');card.classList.add('selected');
  state.pairsFlipped.push(i);
  if(state.pairsFlipped.length===2){
    state.pairsLock=true;const [a,b]=state.pairsFlipped;
    setTimeout(()=>{
      if(state.pairsCards[a].id===state.pairsCards[b].id){
        [$('pc-'+a),$('pc-'+b)].forEach(c=>{c.classList.add('correct');c.classList.remove('selected');});
        state.pairsMatched.add(a);state.pairsMatched.add(b);playSound('correct');
        if(state.pairsMatched.size===state.pairsCards.length)setTimeout(()=>awardPoints(state.pairsCards.length/2,state.pairsCards.length/2),400);
      }else{
        [$('pc-'+a),$('pc-'+b)].forEach(c=>{c.classList.add('face-down');c.classList.remove('selected');});
        playSound('wrong');
      }
      state.pairsFlipped=[];state.pairsLock=false;
    },700);
  }
}

// =================== CHANGED ===================
function loadChanged(){
  const before=[...state.shownItems];
  const ci=Math.floor(Math.random()*before.length);
  const pool=shuffle(buildPool()).filter(x=>!before.find(b=>b.id===x.id));
  const newItem=pool[0];
  const after=before.map((item,i)=>i===ci?newItem:item);
  state.changedItem=newItem;
  $('phase-label').innerHTML='🎨 <span>Mi változott?</span> Melyik forma cserélődött ki?';
  $('img-grid').style.display='none';
  const cols=before.length<=4?2:before.length<=6?3:4;
  const makeGrid=(items,lbl)=>'<div class="changed-col"><div class="changed-label">'+lbl+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:7px">'
    +items.map(item=>'<div class="img-card locked" style="padding:6px">'+makeSVG(item.shape,item.color,50)+'</div>').join('')
    +'</div></div>';
  const cg=$('changed-grid');cg.style.display='flex';
  cg.innerHTML=makeGrid(before,'⬅️ Előtte')+makeGrid(after,'➡️ Utána');
  const choices=shuffle([newItem,...state.shownItems.filter((_,i)=>i!==ci).slice(0,3)]);
  $('missing-q').style.display='block';
  $('missing-q').innerHTML='<div style="font-size:.9rem;font-weight:800;margin-bottom:10px;color:#555">Melyik forma cserélődött ki?</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    +choices.map(c=>`<button onclick="checkChanged('${c.id}')" style="padding:8px;border:3px solid #eee;border-radius:14px;background:white;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(0,0,0,.08)" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform=''">${makeSVG(c.shape,c.color,52)}</button>`).join('')
    +'</div>';
  showBtnRow(false,false);$('btn-row').style.display='flex';
}
function checkChanged(k){
  if(state.answered)return;state.answered=true;const ok=k===state.changedItem.id;
  $('missing-q').querySelectorAll('button').forEach(btn=>{
    btn.disabled=true;const oc=btn.getAttribute('onclick');
    if(oc&&oc.includes("'"+state.changedItem.id+"'"))btn.style.cssText+='border-color:var(--grass);background:#EBFBEE;';
    else if(oc&&oc.includes("'"+k+"'")&&!ok)btn.style.cssText+='border-color:var(--coral);background:#FFF5F5;';
  });
  awardPoints(ok?1:0,1);
}

// =================== COUNT ===================

  },cfg.memTime*1000);

function checkCount(val,btn){

  const ok=val===state.countAnswer;btn.classList.add(ok?'correct':'wrong');
  if(!ok)document.querySelectorAll('.count-btn').forEach(b=>{if(+b.textContent===state.countAnswer)b.classList.add('correct');});
  awardPoints(ok?1:0,1);
}

// =================== SCORING ===================
function awardPoints(correct,total){
  const pts=Math.round((correct/total)*10);state.score+=pts;$('score-val').textContent=state.score;
  const perfect=correct===total,good=correct>=total*.7;
  let msg,cls;
  if(perfect){msg='🎉 Tökéletes! Mindet eltaláltad! +'+pts+' pont';cls='success';confetti();}
  else if(good){msg='😊 Szép munka! '+correct+'/'+total+' helyes. +'+pts+' pont';cls='success';}
  else{msg='🙈 '+correct+'/'+total+' volt helyes. +'+pts+' pont';cls='fail';}
  const fb=$('feedback-box');fb.textContent=msg;fb.className='feedback-box '+cls;fb.style.display='block';
  showBtnRow(false,true);playSound(perfect||good?'correct':'wrong');
}
function showBtnRow(check,next){
  $('btn-check').style.display=check?'inline-block':'none';
  $('btn-next').style.display=next?'inline-block':'none';
  $('btn-row').style.display='flex';
}
function routeCheck(){const m=state.currentMode;if(m==='recall')checkRecall();else if(m==='order')checkOrder();}
function nextRound(){if(state.round>=cfg.rounds){showResult();return;}state.round++;loadRound();}
function showResult(){
  $('game-area').style.display='none';$('result-screen').style.display='block';
  const max=cfg.rounds*10,pct=state.score/max;const grade=pct>=.9?3:pct>=.6?2:1;
  $('res-emoji').textContent=['😢','😊','🎉'][grade-1];
  $('res-title').textContent=['Próbáld újra!','Szuper volt!','Bajnok vagy! 🏆'][grade-1];
  $('res-score').textContent=state.score+' pont a lehetséges '+max+'-ból';
  $('res-stars').textContent='⭐ '+state.score+' pont';
  confetti(grade===3?80:30);
  try{
    const today=new Date().toISOString().slice(0,10);
    const saved=JSON.parse(localStorage.getItem('geoDailyStars')||'{}');
    if(saved.date!==today){saved.date=today;saved.stars=0;}
    saved.stars=(saved.stars||0)+state.score;
    localStorage.setItem('geoDailyStars',JSON.stringify(saved));
  }catch(e){}
  updateStarsDisplay();
}
function resetGame(){$('game-area').style.display='none';$('result-screen').style.display='none';$('start-screen').style.display='block';}
function updateStarsDisplay(){
  try{
    const today=new Date().toISOString().slice(0,10);
    const saved=JSON.parse(localStorage.getItem('geoDailyStars')||'{}');
    const isToday=saved.date===today;
    const total=(isToday?(saved.stars||0):0);
    const counter=$('daily-counter');
    const countEl=$('daily-star-count');
    const dateEl=$('daily-date-label');
    if(total>0){
      counter.style.display='flex';
      countEl.textContent=total+' pont ma';
      const d=new Date();
      dateEl.textContent=d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0')+'.';
    }else{
      counter.style.display='none';
    }
  }catch(e){}
}
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playSound(type){
  try{
    const ac=getAudio(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=type==='correct'?523:200;o.type=type==='wrong'?'sawtooth':'sine';
    g.gain.setValueAtTime(.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.3);
    o.start();o.stop(ac.currentTime+.3);
  }catch(e){}
}
function confetti(n=50){
  const colors=['#e03131','#1971C2','#2F9E44','#F59F00','#7950F2','#E64980'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText='left:'+Math.random()*100+'vw;top:-10px;background:'+colors[Math.floor(Math.random()*colors.length)]+';animation-duration:'+(1.2+Math.random()*1.2)+'s;animation-delay:'+(Math.random()*.6)+'s;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;border-radius:'+(Math.random()<.5?'50%':'2px')+';';
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}
function resetDailyStars(){
  try{
    const today=new Date().toISOString().slice(0,10);
    localStorage.setItem('geoDailyStars',JSON.stringify({date:today,stars:0}));
  }catch(e){}
  updateStarsDisplay();
}
updateStarsDisplay();
</script>
