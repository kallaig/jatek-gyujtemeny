<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Téri tájékozódás</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0FF;
    --white: #ffffff;
    --purple: #7C3AED;
    --purple-dark: #5B21B6;
    --purple-light: #EDE9FE;
    --green: #22C55E;
    --green-dark: #15803D;
    --red: #EF4444;
    --yellow: #FCD34D;
    --orange: #F97316;
    --cell: #EDE9FE;
    --cell-border: #C4B5FD;
    --text: #2E1065;
    --muted: #7C6FA0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 12px 48px; gap: 12px; color: var(--text);
  }
  h1 { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 900; color: var(--purple); text-align: center; }

  .mode-bar {
    display: flex; background: var(--white); border-radius: 50px;
    padding: 5px; gap: 4px;
    box-shadow: 0 2px 10px rgba(124,58,237,0.10);
    flex-wrap: wrap; justify-content: center;
  }
  .mode-btn {
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.8rem;
    border: none; border-radius: 50px; padding: 7px 14px;
    cursor: pointer; background: transparent; color: var(--muted);
    white-space: nowrap; transition: background 0.15s, color 0.15s;
  }
  .mode-btn.active { background: var(--purple); color: white; }

  .settings-toggle {
    background: var(--white); border: 2.5px solid var(--cell-border);
    border-radius: 50px; padding: 6px 16px;
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.85rem;
    color: var(--purple); cursor: pointer;
  }
  .settings-toggle:hover { background: var(--purple-light); }

  .settings-panel {
    background: var(--white); border-radius: 18px; padding: 16px 20px;
    box-shadow: 0 4px 18px rgba(124,58,237,0.10);
    width: min(420px, 100%); display: none; flex-direction: column; gap: 12px;
  }
  .settings-panel.open { display: flex; }
  .settings-title { font-weight: 900; font-size: 0.95rem; color: var(--purple); }

  .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .setting-label { font-weight: 700; font-size: 0.85rem; color: var(--text); flex: 1; }
  .setting-label small { display: block; font-size: 0.70rem; color: var(--muted); }
  .setting-value { font-weight: 900; font-size: 0.9rem; color: var(--purple); min-width: 36px; text-align: right; }

  input[type=range] {
    -webkit-appearance: none; height: 7px; border-radius: 8px;
    background: var(--cell); outline: none; cursor: pointer; width: 110px; flex-shrink: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px;
    border-radius: 50%; background: var(--purple); cursor: pointer;
  }

  .toggle-group { display: flex; border-radius: 50px; border: 2px solid var(--cell-border); overflow: hidden; }
  .toggle-group button {
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.78rem;
    border: none; padding: 6px 11px; cursor: pointer; background: var(--white); color: var(--muted);
  }
  .toggle-group button.active { background: var(--purple); color: white; }

  .apply-btn {
    background: var(--purple); color: white; border: none; border-radius: 50px;
    padding: 8px 20px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.9rem;
    cursor: pointer; align-self: flex-end; box-shadow: 0 4px 0 var(--purple-dark); transition: transform 0.1s;
  }
  .apply-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--purple-dark); }

  .status-bar {
    display: flex; align-items: center; gap: 10px; background: var(--white);
    border-radius: 50px; padding: 6px 18px;
    box-shadow: 0 2px 10px rgba(124,58,237,0.10);
    font-weight: 900; font-size: 0.85rem; flex-wrap: wrap; justify-content: center;
  }
  .badge { border-radius: 50px; padding: 3px 12px; font-size: 0.82rem; font-weight: 900; color: white; background: var(--purple); }

  .phase {
    font-size: clamp(0.9rem, 3vw, 1.05rem); font-weight: 900;
    color: var(--purple); text-align: center; min-height: 1.4rem; padding: 0 8px;
  }

  /* Grid */
  .grid-outer { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .col-row { display: flex; padding-left: 26px; gap: 4px; }
  .coord-lbl { font-weight: 900; font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; justify-content: center; }
  .grid-body { display: flex; gap: 4px; }
  .row-lbls { display: flex; flex-direction: column; gap: 4px; }
  .grid-wrap-inner { background: var(--white); border-radius: 12px; padding: 8px; box-shadow: 0 3px 14px rgba(124,58,237,0.12); border: 2.5px solid var(--cell-border); }
  .grid { display: grid; gap: 4px; }

  .cell {
    background: var(--cell); border-radius: 7px; border: 2px solid var(--cell-border);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, transform 0.1s; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cell.clickable { cursor: pointer; }
  .cell.clickable:hover { transform: scale(1.08); background: #DDD6FE; }
  .cell.clickable:active { transform: scale(0.92); }
  .cell.selected   { background: #DDD6FE; border-color: var(--purple); }
  .cell.correct-c  { background: #BBF7D0; border-color: var(--green-dark); animation: pop 0.3s cubic-bezier(0.34,1.6,0.64,1); }
  .cell.wrong-c    { background: #FECACA; border-color: var(--red); animation: shake 0.4s ease; }
  .cell.target-c   { background: #FEF9C3; border-color: var(--orange); }

  /* Arrow pad */
  .arrow-pad { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); gap: 5px; }
  .arrow-btn {
    width: 52px; height: 52px; border-radius: 12px; border: none;
    background: var(--purple); color: white; font-size: 1.3rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 0 var(--purple-dark); transition: transform 0.1s, box-shadow 0.1s;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .arrow-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--purple-dark); }
  .arrow-btn.empty  { background: transparent; box-shadow: none; pointer-events: none; }

  /* Coord steppers */
  .coord-answer { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  .cinput-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cinput-lbl { font-size: 0.72rem; font-weight: 900; color: var(--muted); }
  .stepper { display: flex; align-items: center; gap: 6px; background: var(--white); border-radius: 50px; padding: 5px 10px; border: 2px solid var(--cell-border); }
  .step-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--purple); color: white; font-size: 1rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .step-val { font-size: 1.05rem; font-weight: 900; color: var(--purple); min-width: 26px; text-align: center; }

  /* Distance input */
  .dist-wrap { display: flex; align-items: center; gap: 10px; background: var(--white); border-radius: 16px; padding: 10px 16px; box-shadow: 0 2px 10px rgba(124,58,237,0.10); }
  .dist-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--purple); color: white; font-size: 1.4rem; font-weight: 900; cursor: pointer; box-shadow: 0 3px 0 var(--purple-dark); transition: transform 0.1s; display: flex; align-items: center; justify-content: center; }
  .dist-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--purple-dark); }
  .dist-val { font-size: 2rem; font-weight: 900; color: var(--purple); min-width: 48px; text-align: center; }
  .dist-lbl { font-weight: 900; font-size: 0.85rem; color: var(--muted); }

  /* Instruction box */
  .instr-box {
    background: var(--white); border-radius: 14px; padding: 10px 18px;
    font-weight: 900; font-size: 0.95rem; color: var(--purple);
    box-shadow: 0 2px 8px rgba(124,58,237,0.10); text-align: center;
    max-width: min(380px, 90vw);
  }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.95rem;
    border: none; border-radius: 50px; padding: 10px 22px; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12); transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
  .btn-primary { background: var(--purple); color: white; }
  .btn-primary:hover { background: var(--purple-dark); }
  .btn-check { background: var(--green-dark); color: white; box-shadow: 0 4px 0 #14532d; }

  .result { font-weight: 900; font-size: clamp(0.9rem, 3.5vw, 1.2rem); text-align: center; min-height: 1.5rem; }
  .result.success { color: var(--green-dark); }
  .result.fail    { color: var(--red); }
  .stars { font-size: 1.4rem; letter-spacing: 4px; min-height: 1.7rem; text-align: center; }

  @keyframes pop   { 0%{transform:scale(0.8)} 60%{transform:scale(1.18)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
</style>
</head>
<body>

<h1>🗺️ Téri tájékozódás</h1>

<div class="mode-bar">
  <button class="mode-btn active" data-mode="find">🐾 Melyik mezőn?</button>
  <button class="mode-btn" data-mode="navigate">➡️ Navigálj!</button>
  <button class="mode-btn" data-mode="distance">📏 Távolság</button>
</div>

<button class="settings-toggle" id="settingsToggle">⚙️ Beállítások</button>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-title">Beállítások</div>
  <div class="setting-row">
    <div class="setting-label">Rács mérete<small>3×3 – 8×8</small></div>
    <input type="range" id="sizeSlider" min="3" max="8" value="4">
    <span class="setting-value" id="sizeVal">4×4</span>
  </div>
  <div class="setting-row" id="navModeRow" style="display:none">
    <div class="setting-label">Navigáció módja</div>
    <div class="toggle-group" id="navModeGroup">
      <button data-val="arrows" class="active">Nyilak</button>
      <button data-val="click">Kattintás</button>
    </div>
  </div>
  <div class="setting-row" id="stepsRow" style="display:none">
    <div class="setting-label">Lépések száma</div>
    <input type="range" id="stepsSlider" min="1" max="20" value="2">
    <span class="setting-value" id="stepsVal2">2</span>
  </div>
  <div class="setting-row" id="instrStyleRow" style="display:none">
    <div class="setting-label">Utasítás megjelenítése</div>
    <div class="toggle-group" id="instrStyleGroup">
      <button data-val="text" class="active">Szöveges</button>
      <button data-val="icon">Csak nyilak</button>
    </div>
  </div>
  <button class="apply-btn" id="applyBtn">Alkalmaz</button>
</div>

<div class="status-bar">
  <span class="badge" id="roundBadge">1. feladat</span>
  <span>⭐ <span id="scoreVal">0</span> pont</span>
  <span>✅ <span id="correctVal">0</span> helyes</span>
</div>

<div class="phase" id="phaseText">Válassz módot és nyomd meg a gombot!</div>
<div id="gameArea" style="display:flex;flex-direction:column;align-items:center;gap:12px"></div>
<div class="result" id="result"></div>
<div class="stars"  id="stars"></div>

<div class="btn-row">
  <button class="btn btn-check"   id="checkBtn"  style="display:none">✅ Ellenőrzés</button>
  <button class="btn btn-primary" id="mainBtn">▶ Kezdés</button>
</div>

<script>
  const EMOJIS = ['🐶','🐱','🐰','🦊','🐻','🐼','🦁','🐸','🦋','🌟','🍎','🚀','🎈','🦄','🐧'];
  const DIR_LABELS = { up:'fel ↑', down:'le ↓', left:'balra ←', right:'jobbra →' };
  const DIRS = ['up','down','left','right'];

  let cfg = { size: 4, mode: 'find', navMode: 'arrows', steps: 2, instrStyle: 'text' };
  let score = 0, roundCount = 0, correctCount = 0, consecutiveCorrect = 0;
  let phase = 'idle', isRetry = false;

  // find
  let animalPos = {x:0,y:0}, answerCol = 0, answerRow = 0;
  // navigate
  let startPos = {x:0,y:0}, navInstructions = [], targetPos = {x:0,y:0}, playerPos = {x:0,y:0};
  let navGridEl = null;
  // distance
  let distA = {x:0,y:0}, distB = {x:0,y:0}, correctDist = 0, userDist = 1;

  // ── DOM ───────────────────────────────────────────────
  const gameArea    = document.getElementById('gameArea');
  const phaseText   = document.getElementById('phaseText');
  const resultEl    = document.getElementById('result');
  const starsEl     = document.getElementById('stars');
  const mainBtn     = document.getElementById('mainBtn');
  const checkBtn    = document.getElementById('checkBtn');
  const scoreValEl  = document.getElementById('scoreVal');
  const correctValEl= document.getElementById('correctVal');
  const roundBadge  = document.getElementById('roundBadge');

  // ── Settings ──────────────────────────────────────────
  const sizeSlider  = document.getElementById('sizeSlider');
  const stepsSlider = document.getElementById('stepsSlider');

  function updateDisplays() {
    document.getElementById('sizeVal').textContent   = `${sizeSlider.value}×${sizeSlider.value}`;
    document.getElementById('stepsVal2').textContent = stepsSlider.value;
  }
  sizeSlider.addEventListener('input', updateDisplays);
  stepsSlider.addEventListener('input', updateDisplays);
  updateDisplays();

  document.querySelectorAll('.toggle-group').forEach(g => {
    g.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        g.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  });

  document.getElementById('settingsToggle').addEventListener('click', () => {
    document.getElementById('settingsPanel').classList.toggle('open');
  });

  document.getElementById('applyBtn').addEventListener('click', () => {
    cfg.size       = parseInt(sizeSlider.value);
    cfg.navMode    = document.querySelector('#navModeGroup .active').dataset.val;
    cfg.steps      = parseInt(stepsSlider.value);
    cfg.instrStyle = document.querySelector('#instrStyleGroup .active').dataset.val;
    document.getElementById('settingsPanel').classList.remove('open');
    startRound();
  });

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      cfg.mode = btn.dataset.mode;
      document.getElementById('navModeRow').style.display   = cfg.mode === 'navigate' ? 'flex' : 'none';
      document.getElementById('stepsRow').style.display     = cfg.mode === 'navigate' ? 'flex' : 'none';
      document.getElementById('instrStyleRow').style.display = cfg.mode === 'navigate' ? 'flex' : 'none';
      resetUI();
    });
  });

  // ── Grid builder ──────────────────────────────────────
  function cpx() {
    return Math.max(34, Math.floor((Math.min(window.innerWidth - 80, 320)) / cfg.size) - 4);
  }

  function buildGrid(opts) {
    const px = cpx();
    const outer = document.createElement('div');
    outer.className = 'grid-outer';

    // Column labels
    const colRow = document.createElement('div');
    colRow.className = 'col-row';
    for (let c = 0; c < cfg.size; c++) {
      const l = document.createElement('div');
      l.className = 'coord-lbl';
      l.style.width = px + 'px';
      l.textContent = String.fromCharCode(65 + c);
      colRow.appendChild(l);
    }
    outer.appendChild(colRow);

    const body = document.createElement('div');
    body.className = 'grid-body';

    // Row labels
    const rowLbls = document.createElement('div');
    rowLbls.className = 'row-lbls';
    for (let r = 0; r < cfg.size; r++) {
      const l = document.createElement('div');
      l.className = 'coord-lbl';
      l.style.height = px + 'px';
      l.style.width = '22px';
      l.textContent = r + 1;
      rowLbls.appendChild(l);
    }
    body.appendChild(rowLbls);

    const wrap = document.createElement('div');
    wrap.className = 'grid-wrap-inner';
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.style.gridTemplateColumns = `repeat(${cfg.size}, ${px}px)`;

    for (let r = 0; r < cfg.size; r++) {
      for (let c = 0; c < cfg.size; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.width = cell.style.height = px + 'px';
        cell.style.fontSize = Math.floor(px * 0.50) + 'px';
        cell.dataset.col = c; cell.dataset.row = r;

        if (opts.animal  && opts.animal.x  === c && opts.animal.y  === r) cell.textContent = opts.emoji || '🐶';
        if (opts.player  && opts.player.x  === c && opts.player.y  === r) cell.textContent = '😊';
        if (opts.target  && opts.target.x  === c && opts.target.y  === r) { cell.textContent = '⭐'; cell.classList.add('target-c'); }
        if (opts.markerA && opts.markerA.x === c && opts.markerA.y === r) cell.textContent = '🔵';
        if (opts.markerB && opts.markerB.x === c && opts.markerB.y === r) cell.textContent = '🔴';

        if (opts.clickable) {
          cell.classList.add('clickable');
          cell.addEventListener('click', () => opts.onCellClick && opts.onCellClick(c, r, cell, grid));
        }
        grid.appendChild(cell);
      }
    }
    wrap.appendChild(grid);
    body.appendChild(wrap);
    outer.appendChild(body);
    outer._grid = grid;
    return outer;
  }

  function getCell(grid, x, y) {
    return grid.querySelector(`[data-col="${x}"][data-row="${y}"]`);
  }

  // ── Helpers ───────────────────────────────────────────
  function rnd(n) { return Math.floor(Math.random() * n); }
  function rndPos() { return { x: rnd(cfg.size), y: rnd(cfg.size) }; }
  function diffPos(ex) { let p; do { p = rndPos(); } while (p.x === ex.x && p.y === ex.y); return p; }
  function manhattan(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }

  function genInstructions(start, steps) {
    let pos = { ...start };
    const instrs = [];
    for (let i = 0; i < steps; i++) {
      const ok = DIRS.filter(d =>
        !(d==='up'&&pos.y===0) && !(d==='down'&&pos.y===cfg.size-1) &&
        !(d==='left'&&pos.x===0) && !(d==='right'&&pos.x===cfg.size-1)
      );
      if (!ok.length) break;
      const dir = ok[rnd(ok.length)];
      instrs.push(dir);
      if (dir==='up')    pos.y--;
      if (dir==='down')  pos.y++;
      if (dir==='left')  pos.x--;
      if (dir==='right') pos.x++;
    }
    return { instrs, end: pos };
  }

  function applyDir(pos, dir) {
    const p = { ...pos };
    if (dir==='up'    && p.y>0)              p.y--;
    if (dir==='down'  && p.y<cfg.size-1)     p.y++;
    if (dir==='left'  && p.x>0)              p.x--;
    if (dir==='right' && p.x<cfg.size-1)     p.x++;
    return p;
  }

  // ── MODE 1: Find ──────────────────────────────────────
  function buildFind() {
    animalPos = rndPos();
    answerCol = 0; answerRow = 0;
    const emoji = EMOJIS[rnd(EMOJIS.length)];
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:12px;';

    const g = buildGrid({ animal: animalPos, emoji });
    wrap.appendChild(g);

    // Steppers
    const ans = document.createElement('div'); ans.className = 'coord-answer';

    function makeGroup(labelText, max, isCol) {
      const grp = document.createElement('div'); grp.className = 'cinput-group';
      const lbl = document.createElement('div'); lbl.className = 'cinput-lbl'; lbl.textContent = labelText;
      const stp = document.createElement('div'); stp.className = 'stepper';
      const minus = document.createElement('button'); minus.className = 'step-btn'; minus.textContent = '−';
      const val = document.createElement('div'); val.className = 'step-val';
      val.textContent = isCol ? 'A' : '1';
      const plus = document.createElement('button'); plus.className = 'step-btn'; plus.textContent = '+';
      minus.addEventListener('click', () => {
        if (isCol) { answerCol = Math.max(0, answerCol - 1); val.textContent = String.fromCharCode(65 + answerCol); }
        else       { answerRow = Math.max(0, answerRow - 1); val.textContent = answerRow + 1; }
      });
      plus.addEventListener('click', () => {
        if (isCol) { answerCol = Math.min(max - 1, answerCol + 1); val.textContent = String.fromCharCode(65 + answerCol); }
        else       { answerRow = Math.min(max - 1, answerRow + 1); val.textContent = answerRow + 1; }
      });
      stp.append(minus, val, plus);
      grp.append(lbl, stp);
      return grp;
    }

    ans.appendChild(makeGroup(`Oszlop (A–${String.fromCharCode(64 + cfg.size)})`, cfg.size, true));
    ans.appendChild(makeGroup(`Sor (1–${cfg.size})`, cfg.size, false));
    wrap.appendChild(ans);
    gameArea.appendChild(wrap);
    return g._grid;
  }

  function checkFind() {
    const grid = gameArea.querySelector('.grid');
    const correct = answerCol === animalPos.x && answerRow === animalPos.y;
    getCell(grid, animalPos.x, animalPos.y).classList.add(correct ? 'correct-c' : 'target-c');
    if (!correct) {
      const uc = getCell(grid, answerCol, answerRow);
      if (uc) uc.classList.add('wrong-c');
    }
    finishRound(correct);
  }

  // ── MODE 2: Navigate ──────────────────────────────────
  function buildNavigate() {
    startPos = rndPos();
    const { instrs, end } = genInstructions(startPos, cfg.steps);
    navInstructions = instrs; targetPos = end; playerPos = { ...startPos };

    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:12px;';

    const DIR_ICONS = { up:'↑', down:'↓', left:'←', right:'→' };
    const instrBox = document.createElement('div');
    instrBox.className = 'instr-box';
    if (cfg.instrStyle === 'icon') {
      instrBox.textContent = instrs.map(d => DIR_ICONS[d]).join('  ');
      instrBox.style.fontSize = '1.4rem';
      instrBox.style.letterSpacing = '4px';
    } else {
      instrBox.textContent = instrs.map(d => DIR_LABELS[d]).join('     ');
    }
    wrap.appendChild(instrBox);

    if (cfg.navMode === 'click') {
      let selCell = null;
      const g = buildGrid({
        player: startPos, clickable: true,
        onCellClick: (c, r, cell, grid) => {
          if (phase !== 'playing') return;
          if (selCell) selCell.classList.remove('selected');
          // keep player emoji visible
          selCell = cell;
          cell.classList.add('selected');
          playerPos = { x: c, y: r };
        }
      });
      navGridEl = g._grid;
      wrap.appendChild(g);
    } else {
      const g = buildGrid({ player: startPos });
      navGridEl = g._grid;
      wrap.appendChild(g);

      const pad = document.createElement('div'); pad.className = 'arrow-pad';
      [
        [null,''], ['up','▲'], [null,''],
        ['left','◀'], [null,''], ['right','▶'],
        [null,''], ['down','▼'], [null,'']
      ].forEach(([dir, icon]) => {
        const el = document.createElement(dir ? 'button' : 'div');
        el.className = dir ? 'arrow-btn' : 'arrow-btn empty';
        if (dir) {
          el.textContent = icon;
          el.addEventListener('click', () => {
            if (phase !== 'playing') return;
            const prev = { ...playerPos };
            playerPos = applyDir(playerPos, dir);
            const prevCell = getCell(navGridEl, prev.x, prev.y);
            const newCell  = getCell(navGridEl, playerPos.x, playerPos.y);
            if (prevCell) prevCell.textContent = '';
            if (newCell)  newCell.textContent = '😊';
          });
        }
        pad.appendChild(el);
      });
      wrap.appendChild(pad);
    }

    gameArea.appendChild(wrap);
  }

  function checkNavigate() {
    const correct = playerPos.x === targetPos.x && playerPos.y === targetPos.y;
    const tc = getCell(navGridEl, targetPos.x, targetPos.y);
    const pc = getCell(navGridEl, playerPos.x, playerPos.y);
    if (correct) {
      tc.classList.add('correct-c');
    } else {
      if (pc) pc.classList.add('wrong-c');
      setTimeout(() => { if (tc) { tc.textContent = '⭐'; tc.classList.add('target-c'); } }, 400);
    }
    finishRound(correct);
  }

  // ── MODE 3: Distance ──────────────────────────────────
  function buildDistance() {
    distA = rndPos();
    do { distB = rndPos(); } while (manhattan(distA, distB) < 2);
    correctDist = manhattan(distA, distB);
    userDist = 1;

    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:12px;';

    const g = buildGrid({ markerA: distA, markerB: distB });
    wrap.appendChild(g);

    const dw = document.createElement('div'); dw.className = 'dist-wrap';
    const minus = document.createElement('button'); minus.className = 'dist-btn'; minus.textContent = '−';
    const valEl = document.createElement('div'); valEl.className = 'dist-val'; valEl.textContent = '1';
    const plus  = document.createElement('button'); plus.className = 'dist-btn'; plus.textContent = '+';
    const lbl   = document.createElement('div'); lbl.className = 'dist-lbl'; lbl.textContent = 'lépés';
    minus.addEventListener('click', () => { userDist = Math.max(1, userDist - 1); valEl.textContent = userDist; });
    plus.addEventListener('click',  () => { userDist = Math.min(cfg.size * 2, userDist + 1); valEl.textContent = userDist; });
    dw.append(minus, valEl, plus, lbl);
    wrap.appendChild(dw);
    gameArea.appendChild(wrap);
  }

  function checkDistance() {
    const correct = userDist === correctDist;
    if (!correct) {
      resultEl.textContent = `😅 Nem egészen… A helyes válasz: ${correctDist} lépés`;
      resultEl.className = 'result fail';
    }
    finishRound(correct, !correct);
  }

  // ── Finish ────────────────────────────────────────────
  function finishRound(correct, skipMsg) {
    phase = 'result';
    checkBtn.style.display = 'none';
    if (correct) {
      isRetry = false; consecutiveCorrect++; correctCount++;
      correctValEl.textContent = correctCount;
      score += 10 + cfg.size; scoreValEl.textContent = score;
      if (!skipMsg) { resultEl.textContent = '🎉 Helyes! Szuper!'; resultEl.className = 'result success'; }
      starsEl.textContent = consecutiveCorrect >= 3 ? '⭐⭐⭐' : consecutiveCorrect >= 2 ? '⭐⭐' : '⭐';
      mainBtn.textContent = '▶ Következő feladat';
    } else {
      isRetry = true; consecutiveCorrect = 0;
      if (!skipMsg) { resultEl.textContent = '😅 Nem egészen… Próbáld újra!'; resultEl.className = 'result fail'; }
      starsEl.textContent = '';
      mainBtn.textContent = '🔄 Újra';
    }
    mainBtn.style.display = 'inline-block';
  }

  // ── Start round ───────────────────────────────────────
  function startRound() {
    const retrying = isRetry; isRetry = false;
    if (!retrying) roundCount++;
    roundBadge.textContent = `${roundCount}. feladat`;
    resultEl.textContent = ''; resultEl.className = 'result';
    starsEl.textContent = '';
    phase = 'playing';
    mainBtn.style.display = 'none';
    checkBtn.style.display = 'none';
    gameArea.innerHTML = '';

    if (cfg.mode === 'find') {
      phaseText.textContent = '🐾 Melyik mezőn áll az állat? Add meg az oszlopot és a sort!';
      buildFind();
    } else if (cfg.mode === 'navigate') {
      phaseText.textContent = cfg.navMode === 'arrows'
        ? '➡️ Kövesd az utasításokat a nyilakkal!'
        : '➡️ Kattints arra a mezőre, ahova az állat kerül!';
      buildNavigate();
    } else {
      phaseText.textContent = '📏 Hány lépés van a 🔵 és a 🔴 között?';
      buildDistance();
    }
    checkBtn.style.display = 'inline-block';
  }

  function resetUI() {
    gameArea.innerHTML = ''; resultEl.textContent = ''; resultEl.className = 'result';
    starsEl.textContent = ''; checkBtn.style.display = 'none';
    mainBtn.textContent = '▶ Kezdés'; mainBtn.style.display = 'inline-block';
    phase = 'idle'; isRetry = false;
    phaseText.textContent = 'Válassz módot és nyomd meg a gombot!';
  }

  mainBtn.addEventListener('click', () => { if (phase === 'idle' || phase === 'result') startRound(); });
  checkBtn.addEventListener('click', () => {
    if (phase !== 'playing') return;
    if (cfg.mode === 'find')     checkFind();
    if (cfg.mode === 'navigate') checkNavigate();
    if (cfg.mode === 'distance') checkDistance();
  });
</script>
</body>
</html>
