<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-Back</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0fdf4;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 18px;
    --accent: #059669;
    --accent-dark: #065f46;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 15%, rgba(5,150,105,0.10) 0%, transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(16,185,129,0.08) 0%, transparent 40%);
    overflow-x: hidden;
  }

  header { text-align: center; padding: 20px 16px 4px; }
  .logo { font-size: clamp(22px,5vw,36px); font-weight: 900; color: var(--accent-dark); letter-spacing: -0.5px; }
  .subtitle { font-size: 14px; color: #64748b; font-weight: 600; margin-top: 3px; }

  /* SETTINGS */
  .top-bar { max-width: 680px; margin: 10px auto 0; padding: 0 14px; display: flex; justify-content: flex-end; }
  .settings-toggle-btn {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; padding: 7px 16px;
    border: 2px solid #a7f3d0; border-radius: 50px; cursor: pointer;
    background: white; color: #64748b; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.2s;
  }
  .settings-toggle-btn:hover { border-color: var(--accent); color: var(--accent-dark); }

  .settings-panel {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    max-width: 680px; margin: 8px auto 0; overflow: hidden;
    max-height: 0; transition: max-height 0.35s ease, padding 0.3s ease; padding: 0 22px;
  }
  .settings-panel.open { max-height: 320px; padding: 18px 22px; }
  .settings-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
  .setting-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
  .setting-group label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
  .setting-group select {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: #334155;
    background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 11px; padding: 7px 11px;
    cursor: pointer; outline: none; transition: border-color 0.2s;
  }
  .setting-group select:focus { border-color: var(--accent); }

  /* GAME */
  .game-container { max-width: 680px; margin: 0 auto; padding: 12px 14px 50px; }

  .status-bar { background: white; border-radius: var(--radius); padding: 12px 18px; margin-bottom: 12px; box-shadow: var(--shadow); text-align: center; }
  .status-msg { font-size: 16px; font-weight: 800; color: #334155; }

  /* INFO ROW */
  .info-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
  .info-badge {
    font-size: 14px; font-weight: 900; padding: 5px 16px;
    border-radius: 50px; background: white; box-shadow: var(--shadow);
    border: 2px solid #a7f3d0; color: var(--accent-dark);
  }
  .info-badge.hit    { border-color: #86efac; color: #16a34a; }
  .info-badge.miss   { border-color: #fca5a5; color: #dc2626; }
  .info-badge.fa     { border-color: #fde68a; color: #92400e; }

  /* HISTORY STRIP */
  .history-strip {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 12px; min-height: 36px;
  }
  .hist-item {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; border: 2px solid #e2e8f0; background: #f8fafc;
    transition: all 0.2s; flex-shrink: 0;
    position: relative;
  }
  .hist-item.current {
    border-color: var(--accent); background: #d1fae5;
    transform: scale(1.15);
    box-shadow: 0 0 0 3px rgba(5,150,105,0.2);
  }
  .hist-item.match-pos {
    border-color: #6366f1; background: #e0e7ff;
  }
  /* result dots */
  .hist-item::after {
    content: '';
    position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
    width: 6px; height: 6px; border-radius: 50%;
  }
  .hist-item.answered-correct::after { background: #22c55e; }
  .hist-item.answered-wrong::after   { background: #ef4444; }
  .hist-item.answered-skip::after    { background: #94a3b8; }

  /* STIMULUS DISPLAY */
  .stimulus-area {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 20px; margin-bottom: 14px;
    min-height: 160px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .stimulus-area.flash-in { animation: stimFlash 0.25s ease; }

  .stimulus-emoji { font-size: 88px; line-height: 1; user-select: none; animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1); }
  .stimulus-shape { animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1); }
  .stimulus-shape svg { width: 100px; height: 100px; display: block; }
  .stimulus-letter {
    font-size: 96px; font-weight: 900; color: #0f172a;
    line-height: 1; user-select: none;
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* blank / between */
  .stimulus-blank { width: 80px; height: 80px; background: #f1f5f9; border-radius: 16px; }

  /* RESPONSE BUTTONS */
  .response-area {
    display: flex; gap: 14px; justify-content: center; margin-bottom: 14px;
  }

  .resp-btn {
    font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900;
    padding: 16px 36px; border: 3px solid transparent; border-radius: 50px;
    cursor: pointer; transition: all 0.15s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.09);
    flex: 1; max-width: 200px;
  }
  .resp-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.14); }
  .resp-btn:active { transform: translateY(0) scale(0.97); }
  .resp-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .btn-yes { background: linear-gradient(135deg, #22c55e, #059669); color: white; }
  .btn-no  { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }

  .resp-btn.flash-correct { animation: flashGreen 0.4s ease; }
  .resp-btn.flash-wrong   { animation: flashRed 0.4s ease; }

  /* n indicator */
  .n-indicator {
    text-align: center; margin-bottom: 10px;
    font-size: 13px; font-weight: 800; color: #64748b;
  }
  .n-indicator span {
    background: white; border: 2px solid #a7f3d0; color: var(--accent-dark);
    border-radius: 50px; padding: 3px 14px; font-size: 14px;
    box-shadow: var(--shadow);
  }

  /* RESULT */
  .result-banner { background: white; border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow); margin-bottom: 12px; display: none; }
  .result-banner.show { display: block; animation: slideDown 0.3s ease; }
  .result-text { font-size: 22px; font-weight: 900; color: #334155; margin-bottom: 6px; }
  .result-table { font-size: 13px; font-weight: 700; color: #64748b; line-height: 1.8; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    padding: 12px 26px; border: none; border-radius: 50px;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(0,0,0,0.09);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.14); }
  .btn:active { transform: translateY(0); }
  .btn-start { background: linear-gradient(135deg, #059669, #10b981); color: white; }
  .btn-new   { background: linear-gradient(135deg, #64748b, #475569); color: white; }

  @keyframes popIn     { 0%{transform:scale(0.5);opacity:0} 100%{transform:scale(1);opacity:1} }
  @keyframes stimFlash { 0%{background:#d1fae5} 100%{background:white} }
  @keyframes flashGreen{ 0%{box-shadow:0 0 0 0 rgba(34,197,94,0.6)} 100%{box-shadow:0 0 0 14px rgba(34,197,94,0)} }
  @keyframes flashRed  { 0%{box-shadow:0 0 0 0 rgba(239,68,68,0.6)} 100%{box-shadow:0 0 0 14px rgba(239,68,68,0)} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  .star { position:fixed; pointer-events:none; font-size:22px; animation:floatStar 1.4s ease-out forwards; z-index:200; }
  @keyframes floatStar { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.5)} }

  .hidden { display: none !important; }
</style>
</head>

<header>
  <div class="logo">🔁 N-Back</div>
  <div class="subtitle">Egyezik az n lépéssel korábbival?</div>
</header>

<div class="top-bar">
  <button class="settings-toggle-btn" onclick="toggleSettings()">⚙️ Beállítások</button>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="settings-row">
    <div class="setting-group">
      <label>Inger típusa</label>
      <select id="stim-type" onchange="updateStimType()">
        <option value="emoji" selected>Emoji</option>
        <option value="shape">Színes formák</option>
        <option value="letter">Betűk</option>
        <option value="number">Számok</option>
      </select>
    </div>
    <div class="setting-group" id="emoji-cat-group">
      <label>Emoji kategória</label>
      <select id="emoji-cat">
        <option value="animals" selected>Állatok</option>
        <option value="plants">Növények</option>
        <option value="vehicles">Járművek</option>
        <option value="mixed">Vegyes</option>
      </select>
    </div>
    <div class="setting-group">
      <label>N szint</label>
      <select id="n-level">
        <option value="1" selected>1-back</option>
        <option value="2">2-back</option>
        <option value="3">3-back</option>
        <option value="4">4-back</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Sorozat hossza</label>
      <select id="seq-length">
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="20" selected>20</option>
        <option value="25">25</option>
        <option value="30">30</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Inger idő (mp)</label>
      <select id="stim-time">
        <option value="1500">1.5</option>
        <option value="2000" selected>2</option>
        <option value="2500">2.5</option>
        <option value="3000">3</option>
        <option value="5000">5</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Könyvtár mérete</label>
      <select id="pool-size">
        <option value="3">3 féle</option>
        <option value="4" selected>4 féle</option>
        <option value="5">5 féle</option>
        <option value="6">6 féle</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Egyezések aránya</label>
      <select id="match-rate">
        <option value="0.2">~20%</option>
        <option value="0.3" selected>~30%</option>
        <option value="0.4">~40%</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Mutatósáv</label>
      <select id="show-history">
        <option value="yes" selected>Látható</option>
        <option value="no">Rejtett</option>
      </select>
    </div>
  </div>
</div>

<div class="game-container">

  <div class="status-bar"><div class="status-msg" id="status-msg">Nyomj a Start gombra!</div></div>

  <div class="n-indicator hidden" id="n-indicator">Figyeld: egyezik az <span id="n-label">1</span> lépéssel korábbival?</div>

  <div class="info-row hidden" id="info-row">
    <div class="info-badge" id="badge-pos">1 / 20</div>
    <div class="info-badge hit"  id="badge-hit">✓ 0</div>
    <div class="info-badge miss" id="badge-miss">Kihagyott: 0</div>
    <div class="info-badge fa"   id="badge-fa">Téves: 0</div>
  </div>

  <div class="history-strip hidden" id="history-strip"></div>

  <div class="stimulus-area hidden" id="stimulus-area">
    <div class="stimulus-blank" id="stimulus-inner"></div>
  </div>

  <div class="response-area hidden" id="response-area">
    <button class="resp-btn btn-yes" id="btn-yes" onclick="onResponse(true)" disabled>✓ Igen, egyezik!</button>
    <button class="resp-btn btn-no"  id="btn-no"  onclick="onResponse(false)" disabled>✗ Nem egyezik</button>
  </div>

  <div class="result-banner" id="result-banner">
    <div class="result-text" id="result-text"></div>
    <div class="result-table" id="result-table"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="start-btn" onclick="startGame()">🚀 Start</button>
    <button class="btn btn-new hidden" id="new-btn" onclick="startGame()">🔄 Új játék</button>
  </div>

</div>

<script>
// ── DATA ──
const EMOJI_POOLS = {
  animals:  ['🐶','🐱','🐰','🦊','🐻','🐼','🐯','🐮','🐷','🐸','🐵','🦁','🐧','🦉','🐺'],
  plants:   ['🌵','🍄','🌴','🌻','🍁','🍀','🌾','🎋','🌲','🪨'],
  vehicles: ['🚂','✈️','🚀','🚁','⛵','🚒','🚑','🛸','🚜','🏍'],
};
const COLORS = [
  {id:'red',hex:'#ef4444'},{id:'yellow',hex:'#facc15'},
  {id:'green',hex:'#22c55e'},{id:'blue',hex:'#3b82f6'},
  {id:'purple',hex:'#a855f7'},{id:'orange',hex:'#f97316'},
];
const SHAPES_LIST = ['circle','square','triangle'];
const LETTERS = ['A','B','C','D','E','F','G','H','K','L','M','N','P','R','S','T'];
const NUMBERS = ['1','2','3','4','5','6','7','8','9'];

// ── STATE ──
let GS = {};
let settingsOpen = false;
let stimTimer = null;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function setStatus(m){document.getElementById('status-msg').textContent=m;}
function spawnStars(x,y,n){['⭐','🌟','✨','💫'].slice(0,n).forEach((s,i)=>{const e=document.createElement('div');e.className='star';e.textContent=s;e.style.left=(x+(Math.random()-.5)*80)+'px';e.style.top=(y+(Math.random()-.5)*40)+'px';e.style.animationDelay=(i*.1)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),1800);});}

function toggleSettings(){settingsOpen=!settingsOpen;document.getElementById('settings-panel').classList.toggle('open',settingsOpen);}
function updateStimType(){
  const v=document.getElementById('stim-type').value;
  document.getElementById('emoji-cat-group').classList.toggle('hidden',v!=='emoji');
}

// ── BUILD POOL ──
function buildStimPool(type, emojiCat, poolSize){
  if(type==='emoji'){
    let base = emojiCat==='mixed'
      ? shuffle([...EMOJI_POOLS.animals,...EMOJI_POOLS.plants,...EMOJI_POOLS.vehicles])
      : shuffle([...EMOJI_POOLS[emojiCat]]);
    return base.slice(0, poolSize);
  }
  if(type==='shape'){
    // pool = color+shape combos
    const combos=[];
    COLORS.forEach(c=>SHAPES_LIST.forEach(s=>combos.push({color:c.hex,shape:s,id:c.id+'_'+s})));
    return shuffle(combos).slice(0, poolSize);
  }
  if(type==='letter') return shuffle([...LETTERS]).slice(0, poolSize);
  if(type==='number') return shuffle([...NUMBERS]).slice(0, poolSize);
}

// ── GENERATE SEQUENCE ──
function generateSequence(pool, n, seqLen, matchRate){
  const seq = [];
  for(let i=0; i<seqLen; i++){
    // Can we make a match?
    if(i >= n && Math.random() < matchRate){
      seq.push({stim: seq[i-n].stim, isMatch: true});
    } else {
      // Pick random, but avoid accidental match
      let stim, tries=0;
      do {
        stim = typeof pool[0]==='object' ? rand(pool) : rand(pool);
        tries++;
      } while(tries<30 && i>=n && stimEqual(stim, seq[i-n].stim));
      seq.push({stim, isMatch: false});
    }
  }
  return seq;
}

function stimEqual(a, b){
  if(typeof a === 'object' && a !== null) return a.id === b.id;
  return a === b;
}

// ── START GAME ──
function startGame(){
  clearTimeout(stimTimer);
  const type      = document.getElementById('stim-type').value;
  const emojiCat  = document.getElementById('emoji-cat').value;
  const n         = parseInt(document.getElementById('n-level').value);
  const seqLen    = parseInt(document.getElementById('seq-length').value);
  const stimTime  = parseInt(document.getElementById('stim-time').value);
  const poolSize  = parseInt(document.getElementById('pool-size').value);
  const matchRate = parseFloat(document.getElementById('match-rate').value);

  const pool = buildStimPool(type, emojiCat, poolSize);
  const sequence = generateSequence(pool, n, seqLen, matchRate);

  GS = {
    type, n, seqLen, stimTime, sequence,
    pos: -1,        // current position
    responses: [],  // true/false/null per position (null = no response possible for first n)
    hits: 0, misses: 0, falseAlarms: 0, correctRejections: 0,
    answered: false,
    phase: 'running',
  };

  // UI
  document.getElementById('result-banner').style.display='none';
  document.getElementById('result-banner').classList.remove('show');
  document.getElementById('start-btn').classList.add('hidden');
  document.getElementById('new-btn').classList.remove('hidden');
  document.getElementById('n-indicator').classList.remove('hidden');
  document.getElementById('info-row').classList.remove('hidden');
  // history-strip visibility handled after reading showHistory setting
  document.getElementById('stimulus-area').classList.remove('hidden');
  document.getElementById('response-area').classList.remove('hidden');

  document.getElementById('n-label').textContent = n;
  const showHistory = document.getElementById('show-history').value === 'yes';
  GS.showHistory = showHistory;
  if(showHistory){
    // history-strip visibility handled after reading showHistory setting
  } else {
    document.getElementById('history-strip').classList.add('hidden');
  }
  document.getElementById('history-strip').innerHTML = '';
  updateBadges();
  setStatus(`Figyeld az ingereket! Egyezik az ${n} lépéssel korábbival?`);

  nextStimulus();
}

// ── NEXT STIMULUS ──
function nextStimulus(){
  GS.pos++;
  if(GS.pos >= GS.seqLen){ endGame(); return; }

  GS.answered = false;
  const item = GS.sequence[GS.pos];
  const canRespond = GS.pos >= GS.n;

  // Buttons
  document.getElementById('btn-yes').disabled = !canRespond;
  document.getElementById('btn-no').disabled  = !canRespond;

  // Render stimulus
  renderStimulus(item.stim);

  // History
  addHistoryItem(GS.pos, item, canRespond);

  updateBadges();

  if(canRespond){
    setStatus(`Egyezik a ${GS.n} lépéssel korábbival? (${GS.pos+1}/${GS.seqLen})`);
  } else {
    setStatus(`Jegyezd meg! (${GS.pos+1}/${GS.seqLen}) – Még ${GS.n - GS.pos} inger kell a válaszhoz`);
  }

  // Auto-advance after stimTime
  stimTimer = setTimeout(()=>{
    if(GS.phase !== 'running') return;
    if(canRespond && !GS.answered){
      // No response = "No" (miss if match, correct rejection if not)
      recordResponse(false, true); // silent miss
    }
    nextStimulus();
  }, GS.stimTime);
}

// ── RENDER STIMULUS ──
function renderStimulus(stim){
  const area  = document.getElementById('stimulus-area');
  const inner = document.getElementById('stimulus-inner');
  area.classList.add('flash-in');
  setTimeout(()=>area.classList.remove('flash-in'),300);

  if(GS.type==='emoji'){
    inner.className = 'stimulus-emoji';
    inner.textContent = stim;
  } else if(GS.type==='shape'){
    inner.className = 'stimulus-shape';
    inner.innerHTML = '';
    inner.appendChild(makeShapeSVG(stim.color, stim.shape));
  } else {
    inner.className = 'stimulus-letter';
    inner.textContent = stim;
  }
}

function makeShapeSVG(hex, shape){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 48 48');
  let el;
  if(shape==='circle'){el=document.createElementNS(ns,'circle');el.setAttribute('cx','24');el.setAttribute('cy','24');el.setAttribute('r','20');}
  else if(shape==='square'){el=document.createElementNS(ns,'rect');el.setAttribute('x','4');el.setAttribute('y','4');el.setAttribute('width','40');el.setAttribute('height','40');el.setAttribute('rx','4');}
  else{el=document.createElementNS(ns,'polygon');el.setAttribute('points','24,4 44,44 4,44');}
  el.setAttribute('fill',hex);el.setAttribute('stroke','rgba(0,0,0,0.10)');el.setAttribute('stroke-width','1.5');
  svg.appendChild(el);return svg;
}

// ── HISTORY ──
function addHistoryItem(pos, item, canRespond){
  const strip = document.getElementById('history-strip');
  const el = document.createElement('div');
  el.className = 'hist-item';
  el.id = `hist-${pos}`;
  el.dataset.pos = pos;

  if(GS.type==='emoji') el.textContent = item.stim;
  else if(GS.type==='shape'){
    const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('viewBox','0 0 48 48');s.style.width='18px';s.style.height='18px';
    let sh;
    if(item.stim.shape==='circle'){sh=document.createElementNS('http://www.w3.org/2000/svg','circle');sh.setAttribute('cx','24');sh.setAttribute('cy','24');sh.setAttribute('r','20');}
    else if(item.stim.shape==='square'){sh=document.createElementNS('http://www.w3.org/2000/svg','rect');sh.setAttribute('x','4');sh.setAttribute('y','4');sh.setAttribute('width','40');sh.setAttribute('height','40');sh.setAttribute('rx','4');}
    else{sh=document.createElementNS('http://www.w3.org/2000/svg','polygon');sh.setAttribute('points','24,4 44,44 4,44');}
    sh.setAttribute('fill',item.stim.color);s.appendChild(sh);el.appendChild(s);
  } else {
    el.textContent = item.stim;
    el.style.fontSize = '13px'; el.style.fontWeight = '900'; el.style.color = '#334155';
  }

  // Mark current
  el.classList.add('current');
  // Remove current from previous
  strip.querySelectorAll('.hist-item.current').forEach(e=>e.classList.remove('current'));
  el.classList.add('current');

  // Mark n-back position
  if(pos >= GS.n){
    const matchPos = document.getElementById(`hist-${pos - GS.n}`);
    if(matchPos) matchPos.classList.add('match-pos');
  }

  strip.appendChild(el);
  el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'end'});
}

function markHistoryResult(pos, resultClass){
  const el = document.getElementById(`hist-${pos}`);
  if(el) el.classList.add(resultClass);
}

// ── RESPONSE ──
function onResponse(yes){
  if(GS.phase !== 'running') return;
  if(GS.pos < GS.n) return;
  if(GS.answered) return;

  clearTimeout(stimTimer);
  GS.answered = true;
  recordResponse(yes, false);

  // Flash button
  const btn = yes ? document.getElementById('btn-yes') : document.getElementById('btn-no');
  const isCorrect = (yes === GS.sequence[GS.pos].isMatch);
  btn.classList.add(isCorrect ? 'flash-correct' : 'flash-wrong');
  setTimeout(()=>btn.classList.remove('flash-correct','flash-wrong'), 400);

  if(isCorrect && yes){
    const r = btn.getBoundingClientRect();
    spawnStars(r.left+r.width/2, r.top, 3);
  }

  // Brief pause then next
  setTimeout(()=>nextStimulus(), 350);
}

function recordResponse(yes, silent){
  const item = GS.sequence[GS.pos];
  const isMatch = item.isMatch;

  let resultClass;
  if(yes && isMatch){
    GS.hits++;
    resultClass = 'answered-correct';
    if(!silent) setStatus('✅ Helyes! Egyezett.');
  } else if(!yes && !isMatch){
    GS.correctRejections++;
    resultClass = 'answered-correct';
    if(!silent) setStatus('✅ Helyes! Nem egyezett.');
  } else if(yes && !isMatch){
    GS.falseAlarms++;
    resultClass = 'answered-wrong';
    if(!silent) setStatus('❌ Téves – nem egyezett.');
  } else { // !yes && isMatch
    GS.misses++;
    resultClass = silent ? 'answered-skip' : 'answered-wrong';
    if(!silent) setStatus('❌ Kihagyott – egyezett volna!');
  }

  markHistoryResult(GS.pos, resultClass);
  updateBadges();
}

// ── BADGES ──
function updateBadges(){
  const pos = Math.min(GS.pos+1, GS.seqLen);
  document.getElementById('badge-pos').textContent   = `${pos} / ${GS.seqLen}`;
  document.getElementById('badge-hit').textContent   = `✓ ${GS.hits}`;
  document.getElementById('badge-miss').textContent  = `Kihagyott: ${GS.misses}`;
  document.getElementById('badge-fa').textContent    = `Téves: ${GS.falseAlarms}`;
}

// ── END GAME ──
function endGame(){
  clearTimeout(stimTimer);
  GS.phase = 'done';

  document.getElementById('btn-yes').disabled = true;
  document.getElementById('btn-no').disabled  = true;
  document.getElementById('stimulus-area').classList.add('hidden');

  const answerable = GS.seqLen - GS.n;
  const totalMatches = GS.sequence.filter((s,i)=>i>=GS.n && s.isMatch).length;
  const totalNonMatch = answerable - totalMatches;

  const hitRate = totalMatches > 0 ? Math.round(GS.hits / totalMatches * 100) : 0;
  const faRate  = totalNonMatch > 0 ? Math.round(GS.falseAlarms / totalNonMatch * 100) : 0;
  const dprime  = hitRate - faRate; // simplified d' proxy

  let icon, text;
  if(hitRate >= 80 && faRate <= 20){ icon='🏆'; text='Kiváló teljesítmény!'; }
  else if(hitRate >= 60){ icon='👍'; text='Jó munka!'; }
  else if(hitRate >= 40){ icon='🙂'; text='Egyre jobb lesz!'; }
  else { icon='🙈'; text='Gyakorolj tovább!'; }

  setStatus(icon+' '+text);
  document.getElementById('result-text').textContent = icon+' '+text;
  document.getElementById('result-table').innerHTML =
    `Találat: ${GS.hits} / ${totalMatches} &nbsp;|&nbsp; `+
    `Kihagyott: ${GS.misses} &nbsp;|&nbsp; `+
    `Téves riasztás: ${GS.falseAlarms} &nbsp;|&nbsp; `+
    `Helyes elutasítás: ${GS.correctRejections}<br>`+
    `Találati arány: ${hitRate}% &nbsp;|&nbsp; Téves arány: ${faRate}%`;

  const b=document.getElementById('result-banner');b.style.display='block';b.classList.add('show');
  document.getElementById('start-btn').textContent='🔄 Új játék';
  document.getElementById('start-btn').classList.remove('hidden');
  document.getElementById('new-btn').classList.add('hidden');
}
</script>
