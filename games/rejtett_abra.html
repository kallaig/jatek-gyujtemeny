<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rejtett Ábra</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0fdf4;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 18px;
    --accent: #16a34a;
    --accent2: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 15%, rgba(34,197,94,0.10) 0%, transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(250,204,21,0.10) 0%, transparent 40%);
    overflow-x: hidden;
  }

  header { text-align: center; padding: 18px 16px 4px; }
  .logo { font-size: clamp(22px,5vw,34px); font-weight: 900; color: var(--accent); letter-spacing: -0.5px; }
  .subtitle { font-size: 14px; color: #64748b; font-weight: 600; margin-top: 3px; }

  /* SETTINGS */
  .top-bar { max-width: 700px; margin: 10px auto 0; padding: 0 14px; display: flex; justify-content: flex-end; }
  .settings-toggle-btn {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; padding: 7px 16px;
    border: 2px solid #bbf7d0; border-radius: 50px; cursor: pointer;
    background: white; color: #64748b; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.2s;
  }
  .settings-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

  .settings-panel {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    max-width: 700px; margin: 8px auto 0; overflow: hidden;
    max-height: 0; transition: max-height 0.35s ease, padding 0.3s ease; padding: 0 22px;
  }
  .settings-panel.open { max-height: 320px; padding: 18px 22px; }
  .settings-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
  .setting-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
  .setting-group label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
  .setting-group select {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: #334155;
    background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 11px; padding: 7px 11px;
    cursor: pointer; outline: none; transition: border-color 0.2s;
  }
  .setting-group select:focus { border-color: var(--accent); }

  /* GAME */
  .game-container { max-width: 700px; margin: 0 auto; padding: 12px 14px 50px; }

  .status-bar { background: white; border-radius: var(--radius); padding: 12px 18px; margin-bottom: 12px; box-shadow: var(--shadow); text-align: center; }
  .status-msg { font-size: 16px; font-weight: 800; color: #334155; }

  /* TARGET STRIP */
  .target-strip {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 12px 16px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }

  .target-label {
    font-size: 12px; font-weight: 800; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
  }

  .target-items { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .target-item {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, #dcfce7, #bbf7d0);
    border: 3px solid #22c55e;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(34,197,94,0.2);
  }
  .target-item svg.shape { width: 34px; height: 34px; }
  .target-item svg.shape.large { width: 42px; height: 42px; }

  /* counter badges */
  .target-counter {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .counter-badge {
    font-size: 18px; font-weight: 900; color: var(--accent);
    background: #dcfce7; border-radius: 50px;
    padding: 2px 10px; min-width: 40px; text-align: center;
    border: 2px solid #86efac;
  }
  .counter-badge.done { background: #d1fae5; color: #059669; border-color: #6ee7b7; }
  .counter-sub { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }

  /* PROGRESS BAR */
  .progress-wrap { background: #e2e8f0; border-radius: 99px; height: 8px; margin-bottom: 12px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

  /* SEARCH GRID */
  .search-section {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px; margin-bottom: 12px; overflow: hidden;
  }

  .search-grid {
    display: grid;
    gap: 5px;
    justify-content: center;
  }

  /* GRID CELL */
  .grid-cell {
    width: 100%; aspect-ratio: 1;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    cursor: pointer;
    transition: transform 0.12s, background 0.12s;
    border: 2px solid transparent;
    background: #f8fafc;
    user-select: none;
    position: relative;
  }

  .grid-cell:hover { transform: scale(1.08); background: #f0fdf4; border-color: #86efac; }

  .grid-cell.found {
    background: linear-gradient(135deg, #dcfce7, #bbf7d0) !important;
    border-color: #22c55e !important;
    animation: foundPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
    cursor: default;
  }

  .grid-cell.wrong-click {
    background: #fee2e2 !important;
    border-color: #ef4444 !important;
    animation: shake 0.35s ease;
  }

  /* neutral selection marker (hidden counter mode, before check) */
  .grid-cell.selected {
    background: linear-gradient(135deg, #ede9fe, #ddd6fe) !important;
    border-color: #8b5cf6 !important;
  }
  .grid-cell.selected::after {
    content: '✓';
    position: absolute;
    top: 1px; right: 3px;
    font-size: 11px; font-weight: 900;
    color: #7c3aed; line-height: 1;
  }

  .grid-cell.wrong-marked {
    background: #fee2e2 !important;
    border-color: #ef4444 !important;
  }
  .grid-cell.wrong-marked::after {
    content: '✗';
    position: absolute;
    top: 1px; right: 3px;
    font-size: 11px; font-weight: 900;
    color: #ef4444; line-height: 1;
  }

  .grid-cell svg.shape { width: 70%; height: 70%; }

  /* checkmark overlay on found */
  .grid-cell.found::after {
    content: '✓';
    position: absolute;
    top: 1px; right: 3px;
    font-size: 11px;
    font-weight: 900;
    color: #16a34a;
    line-height: 1;
  }

  /* RESULT */
  .result-banner { background: white; border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow); margin-bottom: 12px; display: none; }
  .result-banner.show { display: block; animation: slideDown 0.3s ease; }
  .result-text { font-size: 21px; font-weight: 900; color: #334155; margin-bottom: 4px; }
  .result-sub  { font-size: 14px; font-weight: 600; color: #64748b; }

  /* TIMER */
  .timer-bar {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 12px;
  }
  .timer-display {
    font-size: 22px; font-weight: 900; color: var(--accent);
    background: white; border-radius: 50px; padding: 6px 18px;
    box-shadow: var(--shadow); min-width: 90px; text-align: center;
    border: 2px solid #bbf7d0;
  }
  .timer-display.warning { color: #ef4444; border-color: #fca5a5; animation: pulse 0.5s ease-in-out infinite; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    padding: 12px 26px; border: none; border-radius: 50px;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(0,0,0,0.09);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.14); }
  .btn:active { transform: translateY(0); }
  .btn-start { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
  .btn-check { background: linear-gradient(135deg, #f97316, #facc15); color: white; }
  .btn-next  { background: linear-gradient(135deg, #22c55e, #4ade80); color: white; }

  /* ANIMATIONS */
  @keyframes foundPop  { 0%{transform:scale(0.7);opacity:0.5} 100%{transform:scale(1);opacity:1} }
  @keyframes shake     { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse     { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes popIn     { 0%{transform:scale(0.4);opacity:0} 100%{transform:scale(1);opacity:1} }

  .star { position: fixed; pointer-events: none; font-size: 22px; animation: floatStar 1.4s ease-out forwards; z-index: 200; }
  @keyframes floatStar { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.5)} }

  .hidden { display: none !important; }
</style>
</head>

<header>
  <div class="logo">🔍 Rejtett Ábra</div>
  <div class="subtitle">Keresd meg mind!</div>
</header>

<div class="top-bar">
  <button class="settings-toggle-btn" onclick="toggleSettings()">⚙️ Beállítások</button>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="settings-row">
    <div class="setting-group">
      <label>Elemtípus</label>
      <select id="elem-type" onchange="updateElemType()">
        <option value="emoji" selected>Emoji</option>
        <option value="shape">Formák</option>
        <option value="jelek">Jelek</option>
      </select>
    </div>
    <div class="setting-group" id="emoji-cat-group">
      <label>Emoji kategória</label>
      <select id="emoji-cat">
        <option value="animals" selected>Állatok</option>
        <option value="plants">Növények</option>
        <option value="vehicles">Járművek</option>
        <option value="mixed">Vegyes</option>
      </select>
    </div>
    <div class="setting-group" id="jelek-cat-group" style="display:none">
      <label>Jelkészlet</label>
      <select id="jelek-cat">
        <option value="math" selected>Matematikai (+, −, ×, ÷, =)</option>
        <option value="geo">Geometriai (★, ♥, ♦, ♠, ♣)</option>
        <option value="arrow">Nyilak (←, ↑, →, ↓, ↖, ↗)</option>
        <option value="basic">Alapjelek (/, \, |, @, #, ~)</option>
        <option value="all">Mind a négy</option>
      </select>
    </div>
    <div class="setting-group" id="shape-cat-group" style="display:none">
      <label>Nehezítés</label>
      <select id="shape-distract">
        <option value="easy">Könnyű (más szín+forma)</option>
        <option value="medium" selected>Közepes (hasonló szín)</option>
        <option value="hard">Nehéz (azonos szín)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Rács mérete</label>
      <select id="grid-size">
        <option value="4">4 × 4 (16)</option>
        <option value="5">5 × 5 (25)</option>
        <option value="6" selected>6 × 6 (36)</option>
        <option value="7">7 × 7 (49)</option>
        <option value="8">8 × 8 (64)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Keresett ábrák</label>
      <select id="target-count">
        <option value="1">1 féle</option>
        <option value="2" selected>2 féle</option>
        <option value="3">3 féle</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Számláló</label>
      <select id="show-counter">
        <option value="yes" selected>Látható</option>
        <option value="no">Rejtett</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Időlimit</label>
      <select id="time-limit">
        <option value="0">Nincs</option>
        <option value="30">30 mp</option>
        <option value="60" selected>60 mp</option>
        <option value="90">90 mp</option>
        <option value="120">2 perc</option>
      </select>
    </div>
  </div>
</div>

<div class="game-container">

  <div class="status-bar">
    <div class="status-msg" id="status-msg">Nyomj a Start gombra!</div>
  </div>

  <div class="timer-bar hidden" id="timer-bar">
    <span style="font-size:14px;font-weight:800;color:#64748b">⏱</span>
    <div class="timer-display" id="timer-display">60</div>
  </div>

  <div class="target-strip hidden" id="target-strip">
    <div class="target-label">Keresed:</div>
    <div class="target-items" id="target-items"></div>
  </div>

  <div class="progress-wrap hidden" id="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="search-section hidden" id="search-section">
    <div class="search-grid" id="search-grid"></div>
  </div>

  <div class="result-banner" id="result-banner">
    <div class="result-text" id="result-text"></div>
    <div class="result-sub"  id="result-sub"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="start-btn" onclick="startGame()">🚀 Start</button>
    <button class="btn btn-check hidden" id="check-btn" onclick="checkAnswers()">Ellenőrzés</button>
    <button class="btn btn-next hidden" id="next-btn" onclick="startGame()">Következő ▶</button>
  </div>

</div>

<script>
// ── DATA ──
const EMOJI_POOLS = {
  animals:  ['🐶','🐱','🐰','🦊','🐻','🐼','🐯','🐮','🐷','🐸','🐵','🦁','🐧','🦉','🐺'],
  plants:   ['🌵','🍄','🌴','🌻','🍁','🍀','🌾','🎋','🌲','🪨'],
  vehicles: ['🚂','✈️','🚀','🚁','⛵','🚒','🚑','🛸','🚜','🏍'],
};

const COLORS = [
  { id:'red',    hex:'#ef4444' },
  { id:'yellow', hex:'#facc15' },
  { id:'green',  hex:'#22c55e' },
  { id:'blue',   hex:'#3b82f6' },
];
const SHAPES_LIST = ['circle','square','triangle'];
const SIZES_LIST  = ['normal','large','hollow'];

// ── JELEK DATA ──
// Each sign is identified by a category + id string: "cat:id"
const JELEK_POOLS = {
  math:  ['math:plus','math:minus','math:times','math:div','math:eq','math:lt','math:gt'],
  geo:   ['geo:star','geo:heart','geo:diamond','geo:spade','geo:club'],
  arrow: ['arrow:left','arrow:up','arrow:right','arrow:down','arrow:nw','arrow:ne'],
  basic: ['basic:slash','basic:bslash','basic:pipe','basic:at','basic:hash','basic:tilde'],
};

function makeJelSVG(key) {
  const ns  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox','0 0 48 48');
  svg.classList.add('shape');
  const stroke = '#1e293b';
  const sw = '4';
  const fill = 'none';

  const [cat, id] = key.split(':');
  const lc = stroke; // line color

  if (cat === 'math') {
    if (id === 'plus') {
      addLine(svg,ns,24,8,24,40,lc,sw); addLine(svg,ns,8,24,40,24,lc,sw);
    } else if (id === 'minus') {
      addLine(svg,ns,8,24,40,24,lc,sw);
    } else if (id === 'times') {
      addLine(svg,ns,10,10,38,38,lc,sw); addLine(svg,ns,38,10,10,38,lc,sw);
    } else if (id === 'div') {
      addLine(svg,ns,8,24,40,24,lc,sw);
      addCircleFill(svg,ns,24,12,3.5,lc); addCircleFill(svg,ns,24,36,3.5,lc);
    } else if (id === 'eq') {
      addLine(svg,ns,8,18,40,18,lc,sw); addLine(svg,ns,8,30,40,30,lc,sw);
    } else if (id === 'lt') {
      addPolyline(svg,ns,'38,10 10,24 38,38',lc,sw);
    } else if (id === 'gt') {
      addPolyline(svg,ns,'10,10 38,24 10,38',lc,sw);
    }
  } else if (cat === 'geo') {
    if (id === 'star') {
      // 5-pointed star
      const pts = starPoints(24,24,20,8,5);
      addPolygonFill(svg,ns,pts,lc);
    } else if (id === 'heart') {
      // heart path
      const path = document.createElementNS(ns,'path');
      path.setAttribute('d','M24,38 C24,38 6,26 6,16 C6,10 10,7 14,7 C18,7 22,10 24,13 C26,10 30,7 34,7 C38,7 42,10 42,16 C42,26 24,38 24,38 Z');
      path.setAttribute('fill',lc); svg.appendChild(path);
    } else if (id === 'diamond') {
      addPolygonFill(svg,ns,'24,5 43,24 24,43 5,24',lc);
    } else if (id === 'spade') {
      const path = document.createElementNS(ns,'path');
      path.setAttribute('d','M24,4 C24,4 6,16 6,26 C6,32 10,36 16,34 C14,38 12,42 8,43 L40,43 C36,42 34,38 32,34 C38,36 42,32 42,26 C42,16 24,4 24,4 Z');
      path.setAttribute('fill',lc); svg.appendChild(path);
    } else if (id === 'club') {
      const path = document.createElementNS(ns,'path');
      path.setAttribute('d','M24,4 C20,4 17,7 17,11 C17,13 18,15 19,16 C16,15 12,15 10,18 C8,21 9,25 12,27 C15,29 19,28 21,26 C19,30 17,36 14,39 L34,39 C31,36 29,30 27,26 C29,28 33,29 36,27 C39,25 40,21 38,18 C36,15 32,15 29,16 C30,15 31,13 31,11 C31,7 28,4 24,4 Z');
      path.setAttribute('fill',lc); svg.appendChild(path);
    }
  } else if (cat === 'arrow') {
    if (id === 'left')  addArrow(svg,ns,40,24,8,24,lc,sw);
    else if (id==='right') addArrow(svg,ns,8,24,40,24,lc,sw);
    else if (id==='up')    addArrow(svg,ns,24,40,24,8,lc,sw);
    else if (id==='down')  addArrow(svg,ns,24,8,24,40,lc,sw);
    else if (id==='nw')    addArrow(svg,ns,38,38,10,10,lc,sw);
    else if (id==='ne')    addArrow(svg,ns,10,38,38,10,lc,sw);
  } else if (cat === 'basic') {
    if (id === 'slash')  addLine(svg,ns,34,8,14,40,lc,sw);
    else if (id==='bslash') addLine(svg,ns,14,8,34,40,lc,sw);
    else if (id==='pipe')   addLine(svg,ns,24,6,24,42,lc,sw);
    else if (id==='at') {
      const path = document.createElementNS(ns,'path');
      path.setAttribute('d','M30,18 C28,14 24,12 20,14 C16,16 14,20 15,25 C16,30 20,33 25,32 C28,31 30,29 30,26 L30,18 M30,26 C30,30 33,33 37,32 C41,31 43,26 42,21 C40,13 33,8 25,8 C16,8 9,15 9,24 C9,33 16,40 25,40 C29,40 32,39 35,37');
      path.setAttribute('stroke',lc); path.setAttribute('stroke-width',sw);
      path.setAttribute('fill','none'); path.setAttribute('stroke-linecap','round');
      svg.appendChild(path);
    } else if (id==='hash') {
      addLine(svg,ns,16,8,12,40,lc,sw); addLine(svg,ns,28,8,24,40,lc,sw);
      addLine(svg,ns,7,18,41,18,lc,sw); addLine(svg,ns,6,30,40,30,lc,sw);
    } else if (id==='tilde') {
      const path = document.createElementNS(ns,'path');
      path.setAttribute('d','M8,24 C12,16 16,16 20,24 C24,32 28,32 32,24 C36,16 40,16 42,20');
      path.setAttribute('stroke',lc); path.setAttribute('stroke-width',sw);
      path.setAttribute('fill','none'); path.setAttribute('stroke-linecap','round');
      svg.appendChild(path);
    }
  }
  return svg;
}

// SVG helper functions
function addLine(svg,ns,x1,y1,x2,y2,stroke,sw){
  const l=document.createElementNS(ns,'line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',stroke);l.setAttribute('stroke-width',sw);l.setAttribute('stroke-linecap','round');
  svg.appendChild(l);
}
function addPolyline(svg,ns,points,stroke,sw){
  const p=document.createElementNS(ns,'polyline');
  p.setAttribute('points',points);p.setAttribute('stroke',stroke);p.setAttribute('stroke-width',sw);
  p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');
  svg.appendChild(p);
}
function addPolygonFill(svg,ns,points,fill){
  const p=document.createElementNS(ns,'polygon');
  p.setAttribute('points',points);p.setAttribute('fill',fill);
  svg.appendChild(p);
}
function addCircleFill(svg,ns,cx,cy,r,fill){
  const c=document.createElementNS(ns,'circle');
  c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);c.setAttribute('fill',fill);
  svg.appendChild(c);
}
function addArrow(svg,ns,x1,y1,x2,y2,stroke,sw){
  addLine(svg,ns,x1,y1,x2,y2,stroke,sw);
  // arrowhead: perpendicular lines at tip
  const angle = Math.atan2(y2-y1,x2-x1);
  const len = 10;
  const a1 = angle + Math.PI*0.75;
  const a2 = angle - Math.PI*0.75;
  addLine(svg,ns,x2,y2, Math.round(x2+len*Math.cos(a1)), Math.round(y2+len*Math.sin(a1)),stroke,sw);
  addLine(svg,ns,x2,y2, Math.round(x2+len*Math.cos(a2)), Math.round(y2+len*Math.sin(a2)),stroke,sw);
}
function starPoints(cx,cy,outer,inner,n){
  const pts=[];
  for(let i=0;i<n*2;i++){
    const r=i%2===0?outer:inner;
    const a=Math.PI/n*i - Math.PI/2;
    pts.push(Math.round(cx+r*Math.cos(a))+','+Math.round(cy+r*Math.sin(a)));
  }
  return pts.join(' ');
}

// ── STATE ──
let gameState    = {};
let settingsOpen = false;
let timerInterval = null;

// ── UTILS ──
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}
function pick(a,n){return shuffle(a).slice(0,n);}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function setStatus(m){document.getElementById('status-msg').textContent=m;}

function spawnStars(x,y,n){
  ['⭐','🌟','✨','💫'].slice(0,n).forEach((s,i)=>{
    const el=document.createElement('div');el.className='star';el.textContent=s;
    el.style.left=(x+(Math.random()-.5)*80)+'px';el.style.top=(y+(Math.random()-.5)*40)+'px';
    el.style.animationDelay=(i*0.1)+'s';document.body.appendChild(el);
    setTimeout(()=>el.remove(),1800);
  });
}

function toggleSettings(){settingsOpen=!settingsOpen;document.getElementById('settings-panel').classList.toggle('open',settingsOpen);}
function updateElemType(){
  const v=document.getElementById('elem-type').value;
  document.getElementById('emoji-cat-group').style.display  = v==='emoji'  ? '' : 'none';
  document.getElementById('shape-cat-group').style.display  = v==='shape'  ? '' : 'none';
  document.getElementById('jelek-cat-group').style.display  = v==='jelek'  ? '' : 'none';
}

// ── SVG ──
function makeSVG(colorId,shape,size){
  const hex=COLORS.find(c=>c.id===colorId)?.hex||'#888';
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  const isLarge=size==='large',isHollow=size==='hollow';
  svg.setAttribute('viewBox','0 0 48 48');svg.classList.add('shape');
  if(isLarge)svg.classList.add('large');
  const sc=isLarge?1.15:1;
  let el;
  if(shape==='circle'){el=document.createElementNS(ns,'circle');el.setAttribute('cx','24');el.setAttribute('cy','24');el.setAttribute('r',String(Math.round(20*sc)));}
  else if(shape==='square'){el=document.createElementNS(ns,'rect');const m=Math.round(4/sc),s=48-m*2;el.setAttribute('x',String(m));el.setAttribute('y',String(m));el.setAttribute('width',String(s));el.setAttribute('height',String(s));el.setAttribute('rx','4');}
  else{el=document.createElementNS(ns,'polygon');el.setAttribute('points',isLarge?'24,2 46,46 2,46':'24,4 44,44 4,44');}
  el.setAttribute('fill',hex);el.setAttribute('stroke','rgba(0,0,0,0.10)');el.setAttribute('stroke-width','1.5');
  svg.appendChild(el);
  if(isHollow){const h=document.createElementNS(ns,'circle');h.setAttribute('cx','24');h.setAttribute('cy',shape==='triangle'?'31':'24');h.setAttribute('r',shape==='circle'?'9':'8');h.setAttribute('fill','white');svg.appendChild(h);}
  return svg;
}

// ── ITEM KEY SYSTEM ──
// Emoji: key = the emoji character
// Shape: key = "colorId_shapeId_sizeId"

function makeRenderFn(elemType, key) {
  if (elemType === 'emoji') {
    return () => { const s = document.createElement('span'); s.textContent = key; return s; };
  } else if (elemType === 'jelek') {
    return () => makeJelSVG(key);
  } else {
    const [colorId, shapeId, sizeId] = key.split('_');
    return () => makeSVG(colorId, shapeId, sizeId);
  }
}

// ── GENERATE PUZZLE ──
function generatePuzzle(elemType, emojiCat, shapeDistract, gridSize, targetCount, timeLimitSecs) {
  const total = gridSize * gridSize;

  let allPool, targets;

  if (elemType === 'emoji') {
    let pool;
    if (emojiCat === 'mixed') {
      pool = [...EMOJI_POOLS.animals, ...EMOJI_POOLS.plants, ...EMOJI_POOLS.vehicles];
    } else {
      pool = EMOJI_POOLS[emojiCat];
    }
    pool = shuffle(pool);
    targets = pool.slice(0, targetCount);
    const distractors = pool.slice(targetCount);
    allPool = [...targets, ...distractors];
  } else if (elemType === 'jelek') {
    const jelekCat = document.getElementById('jelek-cat').value;
    let pool;
    if (jelekCat === 'all') {
      pool = [...JELEK_POOLS.math, ...JELEK_POOLS.geo, ...JELEK_POOLS.arrow, ...JELEK_POOLS.basic];
    } else {
      pool = JELEK_POOLS[jelekCat];
    }
    pool = shuffle(pool);
    targets = pool.slice(0, Math.min(targetCount, pool.length));
    const distractors = pool.slice(targets.length);
    allPool = [...targets, ...distractors];
  } else {
    // shape mode: build target keys, then distractor keys
    targets = [];
    const usedKeys = new Set();
    while (targets.length < targetCount) {
      const col = rand(COLORS).id;
      const sh  = rand(SHAPES_LIST);
      const sz  = 'normal';
      const k   = col+'_'+sh+'_'+sz;
      if (!usedKeys.has(k)) { targets.push(k); usedKeys.add(k); }
    }

    // Distractors depend on difficulty
    allPool = [...targets];
    const neededDistractors = Math.min(15, total - targetCount);
    let attempts = 0;
    while (allPool.length < targetCount + neededDistractors && attempts < 500) {
      attempts++;
      let col, sh, sz;
      if (shapeDistract === 'hard') {
        // same color as a target, different shape/size
        const tgt = rand(targets);
        const [tc] = tgt.split('_');
        col = tc;
        sh  = rand(SHAPES_LIST);
        sz  = 'normal';
      } else if (shapeDistract === 'medium') {
        // same color OR same shape as target, but not exact match
        const tgt = rand(targets);
        const [tc, ts] = tgt.split('_');
        col = Math.random() < 0.5 ? tc : rand(COLORS).id;
        sh  = Math.random() < 0.5 ? ts : rand(SHAPES_LIST);
        sz  = 'normal';
      } else {
        col = rand(COLORS).id;
        sh  = rand(SHAPES_LIST);
        sz  = 'normal';
      }
      const k = col+'_'+sh+'_'+sz;
      if (!usedKeys.has(k)) { allPool.push(k); usedKeys.add(k); }
    }
  }

  // How many of each target appear in the grid
  // More targets = fewer of each; scale by grid size
  const targetOccurrences = {};
  targets.forEach(t => {
    targetOccurrences[t] = Math.max(1, Math.floor(total * 0.08)); // ~8% of grid
  });

  // Build grid array
  const cells = [];
  // Fill targets
  targets.forEach(t => {
    for (let i = 0; i < targetOccurrences[t]; i++) cells.push(t);
  });
  // Fill rest with distractors (cycle through allPool excluding targets)
  const distractorPool = allPool.filter(k => !targets.includes(k));
  while (cells.length < total) {
    cells.push(rand(distractorPool.length > 0 ? distractorPool : allPool));
  }

  const gridCells = shuffle(cells).slice(0, total);

  return {
    elemType, targets, targetOccurrences, gridCells,
    gridSize, timeLimitSecs,
    found: {},         // targetKey -> count found so far
    totalFound: 0,
    totalToFind: targets.reduce((s,t) => s + targetOccurrences[t], 0),
    phase: 'playing',
  };
}

// ── START ──
function startGame() {
  clearInterval(timerInterval);

  const elemType     = document.getElementById('elem-type').value;
  const emojiCat     = document.getElementById('emoji-cat').value;
  const shapeDistract= document.getElementById('shape-distract').value;
  const gridSize     = parseInt(document.getElementById('grid-size').value);
  const targetCount  = parseInt(document.getElementById('target-count').value);
  const timeLimitSecs= parseInt(document.getElementById('time-limit').value);

  const showCounter = document.getElementById('show-counter').value === 'yes';
  gameState = generatePuzzle(elemType, emojiCat, shapeDistract, gridSize, targetCount, timeLimitSecs);
  // jelekCat is read inside generatePuzzle directly
  gameState.showCounter = showCounter;
  gameState.targets.forEach(t => { gameState.found[t] = 0; });

  // UI
  document.getElementById('result-banner').style.display = 'none';
  document.getElementById('result-banner').classList.remove('show');
  document.getElementById('start-btn').textContent = '🔄 Új játék';
  document.getElementById('start-btn').classList.remove('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  // show Ellenőrzés only in hidden-counter mode
  if (showCounter) {
    document.getElementById('check-btn').classList.add('hidden');
  } else {
    document.getElementById('check-btn').classList.remove('hidden');
  }
  document.getElementById('target-strip').classList.remove('hidden');
  document.getElementById('search-section').classList.remove('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-fill').style.background = 'linear-gradient(90deg,#22c55e,#4ade80)';

  renderTargetStrip();
  renderGrid();

  // Timer
  if (timeLimitSecs > 0) {
    document.getElementById('timer-bar').classList.remove('hidden');
    gameState.timeLeft = timeLimitSecs;
    updateTimerDisplay();
    timerInterval = setInterval(tickTimer, 1000);
  } else {
    document.getElementById('timer-bar').classList.add('hidden');
  }

  setStatus('Keresd meg az összes keresett ábrát!');
}

// ── TIMER ──
function tickTimer() {
  if (gameState.phase !== 'playing') { clearInterval(timerInterval); return; }
  gameState.timeLeft--;
  updateTimerDisplay();
  if (gameState.timeLeft <= 0) {
    clearInterval(timerInterval);
    gameOver();
  }
}

function updateTimerDisplay() {
  const d = document.getElementById('timer-display');
  d.textContent = gameState.timeLeft + ' mp';
  d.classList.toggle('warning', gameState.timeLeft <= 10);
}

function gameOver() {
  gameState.phase = 'done';
  document.getElementById('check-btn').classList.add('hidden');
  setStatus('⏰ Lejárt az idő!');
  document.getElementById('result-text').textContent = '⏰ Lejárt az idő!';
  document.getElementById('result-sub').textContent  = `Megtaláltál ${gameState.totalFound} / ${gameState.totalToFind} ábrát`;
  showResult();
}

// ── RENDER TARGET STRIP ──
function renderTargetStrip() {
  const container = document.getElementById('target-items');
  container.innerHTML = '';
  gameState.targets.forEach(t => {
    const wrap = document.createElement('div');
    wrap.className = 'target-counter';
    wrap.dataset.targetKey = t;

    const card = document.createElement('div');
    card.className = 'target-item';
    card.appendChild(makeRenderFn(gameState.elemType, t)());

    const badge = document.createElement('div');
    badge.className = 'counter-badge';
    badge.id = 'badge-' + CSS.escape(t);
    badge.textContent = `0 / ${gameState.targetOccurrences[t]}`;

    const sub = document.createElement('div');
    sub.className = 'counter-sub';
    sub.textContent = 'találat';

    wrap.appendChild(card);
    if (gameState.showCounter) {
      wrap.appendChild(badge);
      wrap.appendChild(sub);
    }
    container.appendChild(wrap);
  });
}

// ── RENDER GRID ──
function renderGrid() {
  const grid = document.getElementById('search-grid');
  const size = gameState.gridSize;

  // Responsive cell size
  const maxW = Math.min(660, window.innerWidth - 40);
  const cellSize = Math.floor((maxW - 14*2 - (size-1)*5) / size);

  grid.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
  grid.innerHTML = '';

  gameState.gridCells.forEach((key, idx) => {
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.style.width  = cellSize + 'px';
    cell.style.height = cellSize + 'px';
    cell.style.fontSize = Math.floor(cellSize * 0.52) + 'px';

    const inner = makeRenderFn(gameState.elemType, key)();
    if (inner.tagName === 'svg') {
      inner.style.width  = Math.floor(cellSize * 0.62) + 'px';
      inner.style.height = Math.floor(cellSize * 0.62) + 'px';
    }
    cell.appendChild(inner);
    cell.dataset.key = key;
    cell.dataset.idx = idx;
    cell.addEventListener('click', () => onCellClick(cell, key, idx));
    grid.appendChild(cell);
  });
}

// ── CELL CLICK ──
function onCellClick(cell, key, idx) {
  if (gameState.phase !== 'playing') return;
  if (cell.classList.contains('found') || cell.classList.contains('selected')) return;

  if (gameState.targets.includes(key)) {
    // correct!
    if (gameState.showCounter) {
      cell.classList.add('found');
    } else {
      cell.classList.add('selected');
    }
    gameState.found[key]++;
    gameState.totalFound++;

    if (gameState.showCounter) {
      // visible counter mode: immediate feedback
      const badge = document.getElementById('badge-' + CSS.escape(key));
      if (badge) {
        badge.textContent = `${gameState.found[key]} / ${gameState.targetOccurrences[key]}`;
        if (gameState.found[key] >= gameState.targetOccurrences[key]) badge.classList.add('done');
      }
      const r = cell.getBoundingClientRect();
      spawnStars(r.left + r.width/2, r.top, 3);
      const pct = (gameState.totalFound / gameState.totalToFind) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';
      setStatus(`${gameState.totalFound} / ${gameState.totalToFind} megtalálva`);
      if (gameState.totalFound >= gameState.totalToFind) {
        clearInterval(timerInterval);
        setTimeout(() => finishGame(), 400);
      }
    }
    // hidden counter: neutral purple mark, no green/red feedback yet

  } else {
    if (gameState.showCounter) {
      // visible counter: flash and disappear
      cell.classList.add('wrong-click');
      setTimeout(() => cell.classList.remove('wrong-click'), 400);
    } else {
      // hidden counter: neutral purple mark, toggleable
      cell.classList.add('selected');
    }
  }
}

// ── TOGGLE WRONG MARK (hidden counter mode: click again to unmark) ──
// Handled by re-click check above: wrong-marked cells are skipped.
// To allow unmarking, override:
document.addEventListener('click', function(e) {
  const cell = e.target.closest('.grid-cell');
  if (!cell) return;
  if (!gameState || gameState.phase !== 'playing') return;
  if (gameState.showCounter) return;
  // If already selected (neutral mark), allow removal on second click
  if (cell.classList.contains('selected')) {
    const key = cell.dataset.key;
    cell.classList.remove('selected');
    // undo the count
    if (gameState.targets.includes(key)) {
      gameState.found[key] = Math.max(0, (gameState.found[key]||0) - 1);
      gameState.totalFound = Math.max(0, gameState.totalFound - 1);
    }
    e.stopImmediatePropagation();
  }
}, true); // capture phase so it runs before the click listener

// ── CHECK ANSWERS (hidden counter mode) ──
function checkAnswers() {
  if (gameState.phase !== 'playing') return;
  clearInterval(timerInterval);
  gameState.phase = 'done';
  document.getElementById('check-btn').classList.add('hidden');

  let correctFound = 0, wrongMarked = 0, missed = 0;

  document.querySelectorAll('.grid-cell').forEach(cell => {
    const key = cell.dataset.key;
    const isTarget = gameState.targets.includes(key);
    const isSelected = cell.classList.contains('selected');

    cell.classList.remove('selected'); // remove neutral style first

    if (isTarget && isSelected) {
      // correctly selected — show green
      cell.classList.add('found');
      correctFound++;
      const r = cell.getBoundingClientRect();
      setTimeout(() => spawnStars(r.left + r.width/2, r.top, 2), Math.random()*400);
    } else if (!isTarget && isSelected) {
      // falsely selected — show red
      cell.classList.add('wrong-marked');
      wrongMarked++;
    } else if (isTarget && !isSelected) {
      // missed target — highlight in orange
      cell.style.background = 'linear-gradient(135deg,#fff7ed,#ffedd5)';
      cell.style.borderColor = '#f97316';
      missed++;
    }
    // non-target, not selected: leave as is
  });

  // update progress to reflect correct
  const pct = (correctFound / gameState.totalToFind) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-fill').style.background = 'linear-gradient(90deg,#f97316,#facc15)';

  let icon, text, sub;
  const total = gameState.totalToFind;
  if (correctFound === total && wrongMarked === 0) {
    icon = '🎉'; text = 'Tökéletes!';
    sub = `${correctFound}/${total} helyes, 0 téves jelölés`;
  } else if (correctFound >= Math.ceil(total * 0.6)) {
    icon = '👍'; text = 'Szép munka!';
    sub = `${correctFound}/${total} helyes, ${wrongMarked} téves, ${missed} kihagyott`;
  } else {
    icon = '🙈'; text = 'Próbáld újra!';
    sub = `${correctFound}/${total} helyes – narancs = kihagyott`;
  }

  setStatus(icon + ' ' + text);
  document.getElementById('result-text').textContent = icon + ' ' + text;
  document.getElementById('result-sub').textContent  = sub;
  showResult();
}

// ── FINISH ──
function finishGame() {
  gameState.phase = 'done';
  clearInterval(timerInterval);

  const timeUsed = gameState.timeLimitSecs > 0
    ? gameState.timeLimitSecs - (gameState.timeLeft || 0)
    : null;

  let icon = '🎉', text = 'Szuper! Mindent megtaláltál!';
  let sub  = `${gameState.totalFound} / ${gameState.totalToFind} ábra`;
  if (timeUsed !== null) sub += ` – ${timeUsed} mp alatt`;

  setStatus(icon + ' ' + text);
  document.getElementById('result-text').textContent = icon + ' ' + text;
  document.getElementById('result-sub').textContent  = sub;

  document.getElementById('check-btn').classList.add('hidden');
  // big star burst
  spawnStars(window.innerWidth/2, window.innerHeight/3, 4);

  showResult();
}

function showResult() {
  document.getElementById('next-btn').classList.remove('hidden');
  document.getElementById('start-btn').classList.add('hidden');
  const banner = document.getElementById('result-banner');
  banner.style.display = 'block';
  banner.classList.add('show');
}
</script>
