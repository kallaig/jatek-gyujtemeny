<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formamásolás</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --white: #ffffff;
    --orange: #F97316;
    --orange-dark: #C2410C;
    --blue: #3B82F6;
    --blue-dark: #1D4ED8;
    --green: #22C55E;
    --green-dark: #15803D;
    --red: #EF4444;
    --yellow: #FCD34D;
    --cell-off: #FDE8D0;
    --cell-border: #FDBA74;
    --cell-on: #F97316;
    --cell-user: #3B82F6;
    --text: #431407;
    --muted: #A8764A;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 48px;
    gap: 14px;
    color: var(--text);
  }

  h1 {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 900;
    color: var(--orange);
    text-align: center;
  }

  /* Settings */
  .settings-toggle {
    background: var(--white);
    border: 2.5px solid var(--cell-border);
    border-radius: 50px;
    padding: 7px 18px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.88rem;
    color: var(--orange-dark);
    cursor: pointer;
  }
  .settings-toggle:hover { background: var(--cell-off); }

  .settings-panel {
    background: var(--white);
    border-radius: 18px;
    padding: 18px 22px;
    box-shadow: 0 4px 18px rgba(249,115,22,0.10);
    width: min(460px, 100%);
    display: none;
    flex-direction: column;
    gap: 14px;
  }
  .settings-panel.open { display: flex; }

  .settings-title { font-weight: 900; font-size: 1rem; color: var(--orange-dark); }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .setting-label { font-weight: 700; font-size: 0.88rem; color: var(--text); flex: 1; }
  .setting-label small { display: block; font-size: 0.72rem; color: var(--muted); }

  .toggle-group {
    display: flex;
    border-radius: 50px;
    border: 2px solid var(--cell-border);
    overflow: hidden;
    flex-wrap: wrap;
  }
  .toggle-group button {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.78rem;
    border: none;
    padding: 6px 11px;
    cursor: pointer;
    background: var(--white);
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
  }
  .toggle-group button.active { background: var(--orange); color: white; }

  input[type=range] {
    -webkit-appearance: none;
    height: 7px;
    border-radius: 8px;
    background: var(--cell-off);
    outline: none;
    cursor: pointer;
    width: 110px;
    flex-shrink: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--orange);
    cursor: pointer;
  }

  .setting-value { font-weight: 900; font-size: 0.95rem; color: var(--orange-dark); min-width: 40px; text-align: right; }

  .apply-btn {
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 9px 22px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.92rem;
    cursor: pointer;
    align-self: flex-end;
    box-shadow: 0 4px 0 var(--orange-dark);
    transition: transform 0.1s;
  }
  .apply-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--orange-dark); }

  /* Status */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--white);
    border-radius: 50px;
    padding: 7px 20px;
    box-shadow: 0 2px 10px rgba(249,115,22,0.10);
    font-weight: 900;
    font-size: 0.88rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .badge {
    border-radius: 50px;
    padding: 3px 12px;
    font-size: 0.85rem;
    font-weight: 900;
    color: white;
    background: var(--orange);
  }

  .phase {
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    font-weight: 900;
    color: var(--orange-dark);
    text-align: center;
    min-height: 1.5rem;
  }

  /* Game area */
  .game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .two-col {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
  }

  .panel-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .panel-label {
    font-weight: 900;
    font-size: 0.82rem;
    color: var(--muted);
  }

  /* Grid */
  .grid {
    display: grid;
    gap: 4px;
    background: var(--white);
    border-radius: 12px;
    padding: 8px;
    box-shadow: 0 3px 14px rgba(249,115,22,0.10);
    border: 2.5px solid var(--cell-border);
  }

  .cell {
    border-radius: 6px;
    border: 2px solid var(--cell-border);
    background: var(--cell-off);
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cell.readonly { cursor: default; }
  .cell.on       { background: var(--cell-on); border-color: var(--orange-dark); }
  .cell.user-on  { background: var(--cell-user); border-color: var(--blue-dark); }
  .cell.correct  { background: var(--green); border-color: var(--green-dark); animation: pop 0.3s cubic-bezier(0.34,1.6,0.64,1); }
  .cell.wrong    { background: var(--red); border-color: #b91c1c; animation: shake 0.4s ease; }
  .cell.missed   { background: var(--yellow); border-color: #d97706; }
  .cell:not(.readonly):hover { transform: scale(1.1); }
  .cell:not(.readonly):active { transform: scale(0.9); }

  /* Choice options */
  .choice-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: min(420px, 100%);
  }

  .choice-card {
    background: var(--white);
    border-radius: 14px;
    padding: 8px;
    cursor: pointer;
    border: 3px solid var(--cell-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    transition: border-color 0.15s, transform 0.12s;
    box-shadow: 0 2px 8px rgba(249,115,22,0.08);
  }
  .choice-card:hover { border-color: var(--blue); transform: scale(1.03); }
  .choice-card.correct-choice { border-color: var(--green); background: #F0FFF4; }
  .choice-card.wrong-choice   { border-color: var(--red); background: #FFF5F5; }

  .choice-letter {
    font-weight: 900;
    font-size: 0.95rem;
    color: var(--muted);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.98rem;
    border: none;
    border-radius: 50px;
    padding: 10px 24px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
  .btn-primary { background: var(--orange); color: white; }
  .btn-primary:hover { background: var(--orange-dark); }
  .btn-check   { background: var(--blue-dark); color: white; box-shadow: 0 4px 0 #1e3a8a; }
  .btn-clear   { background: var(--red); color: white; }

  .result {
    font-weight: 900;
    font-size: clamp(0.95rem, 3.5vw, 1.3rem);
    text-align: center;
    min-height: 1.6rem;
  }
  .result.success { color: var(--green-dark); }
  .result.fail    { color: var(--red); }
  .stars { font-size: 1.5rem; letter-spacing: 4px; min-height: 1.8rem; text-align: center; }

  @keyframes pop   { 0%{transform:scale(0.8)} 60%{transform:scale(1.18)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
</style>
</head>
<body>

<h1>🖊️ Formamásolás</h1>

<button class="settings-toggle" id="settingsToggle">⚙️ Beállítások</button>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-title">Játék beállítások</div>
  <div class="setting-row">
    <div class="setting-label">Feladat típusa</div>
    <div class="toggle-group" id="modeGroup">
      <button data-val="draw" class="active">Rajzolós</button>
      <button data-val="choice">Választós</button>
      <button data-val="random">Vegyes</button>
    </div>
  </div>

  <div class="setting-row">
    <div class="setting-label">Rács mérete<small>csak rácshoz</small></div>
    <input type="range" id="sizeSlider" min="3" max="7" value="4">
    <span class="setting-value" id="sizeVal">4×4</span>
  </div>

  <div class="setting-row">
    <div class="setting-label">Bejelölt cellák<small>csak rácshoz</small></div>
    <input type="range" id="cellsSlider" min="2" max="12" value="5">
    <span class="setting-value" id="cellsVal">5</span>
  </div>

  <button class="apply-btn" id="applyBtn">Alkalmaz</button>
</div>

<div class="status-bar">
  <span class="badge" id="roundBadge">1. feladat</span>
  <span>⭐ <span id="scoreVal">0</span> pont</span>
  <span>✅ <span id="correctVal">0</span> helyes</span>
</div>

<div class="phase" id="phaseText">Nyomd meg a gombot a kezdéshez!</div>

<div class="game-area" id="gameArea"></div>

<div class="result" id="result"></div>
<div class="stars"  id="stars"></div>

<div class="btn-row">
  <button class="btn btn-clear"   id="clearBtn" style="display:none">🗑️ Törlés</button>
  <button class="btn btn-check"   id="checkBtn" style="display:none">✅ Ellenőrzés</button>
  <button class="btn btn-primary" id="mainBtn">▶ Kezdés</button>
</div>

<script>
  // ── Config ────────────────────────────────────────────
  let cfg = { mode: 'draw', size: 4, cells: 5 };
  let score = 0, roundCount = 0, correctCount = 0, consecutiveCorrect = 0;
  let phase = 'idle', isRetry = false;
  let currentMode = 'draw';
  let currentPattern = [], userPattern = [];

  // ── Grid helpers ──────────────────────────────────────
  function generateGridPattern(size, count) {
    const all = Array.from({ length: size * size }, (_, i) => i);
    return all.sort(() => Math.random() - 0.5).slice(0, count);
  }

  function makeGridEl(size, pattern, interactive, small) {
    const maxW = small
      ? Math.min(window.innerWidth / 2 - 36, 140)
      : Math.min(window.innerWidth - 48, 300);
    const cellPx = Math.max(small ? 14 : 28, Math.floor((maxW - 20) / size) - 4);

    const grid = document.createElement('div');
    grid.className = 'grid';
    if (small) { grid.style.padding = '5px'; grid.style.gap = '2px'; }
    grid.style.gridTemplateColumns = `repeat(${size}, ${cellPx}px)`;

    for (let i = 0; i < size * size; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (interactive ? '' : ' readonly') + (pattern.includes(i) ? ' on' : '');
      cell.style.width = cell.style.height = cellPx + 'px';
      cell.dataset.idx = i;
      if (interactive) {
        cell.addEventListener('click', () => {
          if (phase !== 'drawing') return;
          if (cell.classList.contains('user-on')) {
            cell.classList.replace('user-on', 'cell');
            cell.classList.add('cell'); // keep base
            cell.className = 'cell';
            userPattern = userPattern.filter(x => x !== i);
          } else {
            cell.classList.add('user-on');
            userPattern.push(i);
          }
        });
      }
      grid.appendChild(cell);
    }
    return grid;
  }

  // ── Settings UI ───────────────────────────────────────
  const sizeSlider  = document.getElementById('sizeSlider');
  const cellsSlider = document.getElementById('cellsSlider');

  function updateDisplays() {
    const s = parseInt(sizeSlider.value);
    document.getElementById('sizeVal').textContent  = `${s}×${s}`;
    const maxCells = Math.floor(s * s * 0.7);
    cellsSlider.max = maxCells;
    if (parseInt(cellsSlider.value) > maxCells) cellsSlider.value = maxCells;
    document.getElementById('cellsVal').textContent = cellsSlider.value;
  }

  sizeSlider.addEventListener('input', updateDisplays);
  cellsSlider.addEventListener('input', updateDisplays);
  updateDisplays();

  document.querySelectorAll('.toggle-group').forEach(group => {
    group.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  });

  document.getElementById('settingsToggle').addEventListener('click', () => {
    document.getElementById('settingsPanel').classList.toggle('open');
  });

  document.getElementById('applyBtn').addEventListener('click', () => {
    cfg.mode      = document.querySelector('#modeGroup .active').dataset.val;
    cfg.size      = parseInt(sizeSlider.value);
    cfg.cells     = parseInt(cellsSlider.value);
    document.getElementById('settingsPanel').classList.remove('open');
    resetGame();
  });

  // ── DOM ───────────────────────────────────────────────
  const gameArea    = document.getElementById('gameArea');
  const phaseText   = document.getElementById('phaseText');
  const resultEl    = document.getElementById('result');
  const starsEl     = document.getElementById('stars');
  const mainBtn     = document.getElementById('mainBtn');
  const clearBtn    = document.getElementById('clearBtn');
  const checkBtn    = document.getElementById('checkBtn');
  const scoreValEl  = document.getElementById('scoreVal');
  const correctValEl= document.getElementById('correctVal');
  const roundBadge  = document.getElementById('roundBadge');

  // ── Build draw mode ───────────────────────────────────
  function buildDrawMode() {
    userPattern = [];
    const area = document.createElement('div');
    area.className = 'two-col';

    const srcWrap = document.createElement('div');
    srcWrap.className = 'panel-wrap';
    const srcLbl = document.createElement('div'); srcLbl.className = 'panel-label'; srcLbl.textContent = '📺 Minta';
    srcWrap.appendChild(srcLbl);
    srcWrap.appendChild(makeGridEl(cfg.size, currentPattern, false, false));

    const dstWrap = document.createElement('div');
    dstWrap.className = 'panel-wrap';
    const dstLbl = document.createElement('div'); dstLbl.className = 'panel-label'; dstLbl.textContent = '✏️ Másold le!';
    dstWrap.appendChild(dstLbl);
    dstWrap.appendChild(makeGridEl(cfg.size, [], true, false));

    area.appendChild(srcWrap);
    area.appendChild(dstWrap);
    return area;
  }

  // ── Build choice mode ─────────────────────────────────
  function buildChoiceMode() {
    const area = document.createElement('div');
    area.className = 'game-area';

    // Source
    const srcWrap = document.createElement('div');
    srcWrap.className = 'panel-wrap';
    const srcLbl = document.createElement('div'); srcLbl.className = 'panel-label'; srcLbl.textContent = '📺 Melyik a másolata?';
    srcWrap.appendChild(srcLbl);
    srcWrap.appendChild(makeGridEl(cfg.size, currentPattern, false, false));
      area.appendChild(srcWrap);

      // 4 options: 1 correct + 3 wrong
      const wrongPatterns = [];
      let tries = 0;
      while (wrongPatterns.length < 3 && tries < 100) {
        tries++;
        const w = generateGridPattern(cfg.size, currentPattern.length);
        const isDupe = wrongPatterns.some(p => arraysEqual(p, w)) || arraysEqual(w, currentPattern);
        if (!isDupe) wrongPatterns.push(w);
      }

      const options = [currentPattern, ...wrongPatterns].sort(() => Math.random() - 0.5);
      const letters = ['A','B','C','D'];
      const optGrid = document.createElement('div');
      optGrid.className = 'choice-options';

      options.forEach((opt, i) => {
        const card = document.createElement('div');
        card.className = 'choice-card';
        const lbl = document.createElement('div'); lbl.className = 'choice-letter'; lbl.textContent = letters[i];
        card.appendChild(lbl);
        card.appendChild(makeGridEl(cfg.size, opt, false, true));
        card.addEventListener('click', () => {
          if (phase !== 'drawing') return;
          const isCorrect = arraysEqual(opt, currentPattern);
          // Mark cards
          options.forEach((o, j) => {
            if (arraysEqual(o, currentPattern)) optGrid.children[j].classList.add('correct-choice');
          });
          if (!isCorrect) card.classList.add('wrong-choice');
          finishRound(isCorrect);
        });
        optGrid.appendChild(card);
      });
      area.appendChild(optGrid);

    return area;
  }

  // ── Check draw (grid only) ────────────────────────────
  function checkDrawAnswer() {
    phase = 'result';
    checkBtn.style.display = 'none';
    clearBtn.style.display = 'none';
    const isCorrect = arraysEqual(userPattern, currentPattern);
    const cells = gameArea.querySelectorAll('.cell:not(.readonly)');
    cells.forEach(cell => {
      const idx = parseInt(cell.dataset.idx);
      const inUser    = userPattern.includes(idx);
      const inCorrect = currentPattern.includes(idx);
      if (inUser && inCorrect)  cell.className = 'cell correct';
      else if (inUser)          cell.className = 'cell wrong';
      else if (inCorrect)       cell.className = 'cell missed';
    });
    finishRound(isCorrect);
  }

  // ── Finish round ──────────────────────────────────────
  function finishRound(isCorrect) {
    phase = 'result';
    checkBtn.style.display = 'none';
    clearBtn.style.display = 'none';
    if (isCorrect) {
      isRetry = false;
      consecutiveCorrect++;
      correctCount++;
      correctValEl.textContent = correctCount;
      score += 10 + cfg.size * 2;
      scoreValEl.textContent = score;
      resultEl.textContent = '🎉 Helyes! Szuper!';
      resultEl.className = 'result success';
      starsEl.textContent = consecutiveCorrect >= 3 ? '⭐⭐⭐' : consecutiveCorrect >= 2 ? '⭐⭐' : '⭐';
      mainBtn.textContent = '▶ Következő feladat';
    } else {
      isRetry = true;
      consecutiveCorrect = 0;
      resultEl.textContent = '😅 Nem egészen… Próbáld újra!';
      resultEl.className = 'result fail';
      starsEl.textContent = '';
      mainBtn.textContent = '🔄 Újra';
    }
    mainBtn.style.display = 'inline-block';
  }

  // ── New round ─────────────────────────────────────────
  function newRound() {
    const retrying = isRetry;
    isRetry = false;
    if (!retrying) roundCount++;
    roundBadge.textContent = `${roundCount}. feladat`;
    resultEl.textContent = ''; resultEl.className = 'result';
    starsEl.textContent = '';
    userPattern = []; phase = 'drawing';
    mainBtn.style.display = 'none';
    clearBtn.style.display = 'none';
    checkBtn.style.display = 'none';
    gameArea.innerHTML = '';

    if (!retrying) {
      currentMode = cfg.mode === 'random'
        ? (Math.random() < 0.5 ? 'draw' : 'choice') : cfg.mode;
      currentPattern = generateGridPattern(cfg.size, cfg.cells);
    }

    if (currentMode === 'draw') {
      phaseText.textContent = '✏️ Másold le a rácsot!';
      gameArea.appendChild(buildDrawMode());
      clearBtn.style.display = 'inline-block';
      checkBtn.style.display = 'inline-block';
    } else {
      phaseText.textContent = '👆 Melyik a helyes másolat?';
      gameArea.appendChild(buildChoiceMode());
    }
  }

  // ── Reset ─────────────────────────────────────────────
  function resetGame() {
    score = 0; roundCount = 0; correctCount = 0; consecutiveCorrect = 0; isRetry = false;
    scoreValEl.textContent = '0'; correctValEl.textContent = '0';
    roundBadge.textContent = '1. feladat';
    resultEl.textContent = ''; starsEl.textContent = '';
    phase = 'idle';
    mainBtn.textContent = '▶ Kezdés';
    mainBtn.style.display = 'inline-block';
    clearBtn.style.display = 'none';
    checkBtn.style.display = 'none';
    phaseText.textContent = 'Nyomd meg a gombot a kezdéshez!';
    gameArea.innerHTML = '';
  }

  function arraysEqual(a, b) {
    if (a.length !== b.length) return false;
    const sa = [...a].sort((x,y)=>x-y), sb = [...b].sort((x,y)=>x-y);
    return sa.every((v,i) => v === sb[i]);
  }

  // ── Events ────────────────────────────────────────────
  mainBtn.addEventListener('click', () => { if (phase === 'idle' || phase === 'result') newRound(); });
  clearBtn.addEventListener('click', () => {
    if (phase !== 'drawing') return;
    userPattern = [];
    gameArea.querySelectorAll('.cell:not(.readonly)').forEach(c => { c.className = 'cell'; });
  });
  checkBtn.addEventListener('click', () => { if (phase === 'drawing') checkDrawAnswer(); });
</script>
</body>
</html>
