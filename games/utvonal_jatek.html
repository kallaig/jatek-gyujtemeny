<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Útvonal játék</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F0F7FF;
    --white: #ffffff;
    --blue: #3B82F6;
    --blue-dark: #1D4ED8;
    --blue-light: #DBEAFE;
    --green: #22C55E;
    --green-dark: #15803D;
    --red: #EF4444;
    --orange: #F97316;
    --yellow: #FCD34D;
    --purple: #7C3AED;
    --cell: #DBEAFE;
    --cell-border: #93C5FD;
    --text: #1E3A5F;
    --muted: #6B8DB5;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 12px 48px; gap: 12px; color: var(--text);
  }
  h1 { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 900; color: var(--blue-dark); text-align: center; }

  /* Mode bar */
  .mode-bar {
    display: flex; background: var(--white); border-radius: 50px;
    padding: 5px; gap: 4px;
    box-shadow: 0 2px 10px rgba(59,130,246,0.12);
    flex-wrap: wrap; justify-content: center;
  }
  .mode-btn {
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.82rem;
    border: none; border-radius: 50px; padding: 7px 16px;
    cursor: pointer; background: transparent; color: var(--muted);
    white-space: nowrap; transition: background 0.15s, color 0.15s;
  }
  .mode-btn.active { background: var(--blue); color: white; }

  /* Settings */
  .settings-toggle {
    background: var(--white); border: 2.5px solid var(--cell-border);
    border-radius: 50px; padding: 6px 16px;
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.85rem;
    color: var(--blue-dark); cursor: pointer;
  }
  .settings-toggle:hover { background: var(--blue-light); }

  .settings-panel {
    background: var(--white); border-radius: 18px; padding: 16px 20px;
    box-shadow: 0 4px 18px rgba(59,130,246,0.10);
    width: min(420px, 100%); display: none; flex-direction: column; gap: 12px;
  }
  .settings-panel.open { display: flex; }
  .settings-title { font-weight: 900; font-size: 0.95rem; color: var(--blue-dark); }

  .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .setting-label { font-weight: 700; font-size: 0.85rem; color: var(--text); flex: 1; }
  .setting-label small { display: block; font-size: 0.70rem; color: var(--muted); }
  .setting-value { font-weight: 900; font-size: 0.9rem; color: var(--blue-dark); min-width: 36px; text-align: right; }

  input[type=range] {
    -webkit-appearance: none; height: 7px; border-radius: 8px;
    background: var(--cell); outline: none; cursor: pointer; width: 110px; flex-shrink: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px;
    border-radius: 50%; background: var(--blue); cursor: pointer;
  }

  .toggle-group { display: flex; border-radius: 50px; border: 2px solid var(--cell-border); overflow: hidden; }
  .toggle-group button {
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.78rem;
    border: none; padding: 6px 11px; cursor: pointer; background: var(--white); color: var(--muted);
    transition: background 0.15s, color 0.15s;
  }
  .toggle-group button.active { background: var(--blue); color: white; }

  .apply-btn {
    background: var(--blue); color: white; border: none; border-radius: 50px;
    padding: 8px 20px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.9rem;
    cursor: pointer; align-self: flex-end; box-shadow: 0 4px 0 var(--blue-dark); transition: transform 0.1s;
  }
  .apply-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--blue-dark); }

  /* Status */
  .status-bar {
    display: flex; align-items: center; gap: 10px; background: var(--white);
    border-radius: 50px; padding: 6px 18px;
    box-shadow: 0 2px 10px rgba(59,130,246,0.10);
    font-weight: 900; font-size: 0.85rem; flex-wrap: wrap; justify-content: center;
  }
  .badge { border-radius: 50px; padding: 3px 12px; font-size: 0.82rem; font-weight: 900; color: white; background: var(--blue); }

  .phase {
    font-size: clamp(0.88rem, 3vw, 1.05rem); font-weight: 900;
    color: var(--blue-dark); text-align: center; min-height: 1.4rem; padding: 0 8px;
  }

  /* Instruction box */
  .instr-box {
    background: var(--white); border-radius: 14px; padding: 10px 18px;
    font-weight: 900; font-size: 1rem; color: var(--blue-dark);
    box-shadow: 0 2px 8px rgba(59,130,246,0.10); text-align: center;
    max-width: min(380px, 90vw); line-height: 1.7;
  }
  .instr-box.icon-mode { font-size: 1.6rem; letter-spacing: 6px; }

  /* Grid */
  .grid-outer { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .col-row { display: flex; padding-left: 26px; gap: 4px; }
  .coord-lbl { font-weight: 900; font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; justify-content: center; }
  .grid-body { display: flex; gap: 4px; }
  .row-lbls { display: flex; flex-direction: column; gap: 4px; }
  .grid-wrap-inner {
    background: var(--white); border-radius: 12px; padding: 8px;
    box-shadow: 0 3px 14px rgba(59,130,246,0.12); border: 2.5px solid var(--cell-border);
    touch-action: none; /* prevent scroll while drawing */
  }
  .grid { display: grid; gap: 4px; }

  .cell {
    background: var(--cell); border-radius: 7px; border: 2px solid var(--cell-border);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.08s; user-select: none;
    -webkit-tap-highlight-color: transparent; touch-action: none;
    position: relative;
  }
  .cell.start-c  { background: #BBF7D0; border-color: var(--green-dark); }
  .cell.end-c    { background: #FEF9C3; border-color: var(--orange); }
  .cell.drawn    { background: #BFDBFE; border-color: var(--blue); }
  .cell.correct-c { background: #BBF7D0; border-color: var(--green-dark); animation: pop 0.3s cubic-bezier(0.34,1.6,0.64,1); }
  .cell.wrong-c   { background: #FECACA; border-color: var(--red); animation: shake 0.4s ease; }
  .cell.missed-c  { background: #FEF9C3; border-color: var(--orange); }
  .cell.player-c  { background: #BFDBFE; border-color: var(--blue); }
  .cell.target-c  { background: #FEF9C3; border-color: var(--orange); }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.95rem;
    border: none; border-radius: 50px; padding: 10px 22px; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12); transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-check { background: var(--green-dark); color: white; box-shadow: 0 4px 0 #14532d; }
  .btn-clear { background: var(--red); color: white; }

  .result { font-weight: 900; font-size: clamp(0.9rem, 3.5vw, 1.2rem); text-align: center; min-height: 1.5rem; }
  .result.success { color: var(--green-dark); }
  .result.fail    { color: var(--red); }
  .stars { font-size: 1.4rem; letter-spacing: 4px; min-height: 1.7rem; text-align: center; }

  @keyframes pop   { 0%{transform:scale(0.8)} 60%{transform:scale(1.18)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
</style>
</head>

<h1>🗺️ Útvonal játék</h1>

<div class="mode-bar">
  <button class="mode-btn active" data-mode="navigate">➡️ Navigálj!</button>
  <button class="mode-btn" data-mode="distance">📏 Távolság</button>
</div>

<button class="settings-toggle" id="settingsToggle">⚙️ Beállítások</button>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-title">Beállítások</div>

  <div class="setting-row">
    <div class="setting-label">Rács mérete<small>3×3 – 8×8</small></div>
    <input type="range" id="sizeSlider" min="3" max="8" value="4">
    <span class="setting-value" id="sizeVal">4×4</span>
  </div>

  <div class="setting-row" id="navAnswerRow">
    <div class="setting-label">Válasz módja<small>navigálj módhoz</small></div>
    <div class="toggle-group" id="navAnswerGroup">
      <button data-val="draw" class="active">Útvonal rajz</button>
      <button data-val="tap">Célmező tap</button>
    </div>
  </div>

  <div class="setting-row" id="instrStyleRow">
    <div class="setting-label">Utasítás stílusa</div>
    <div class="toggle-group" id="instrStyleGroup">
      <button data-val="text" class="active">Szöveges</button>
      <button data-val="icon">Csak nyilak</button>
    </div>
  </div>

  <div class="setting-row" id="stepsRow">
    <div class="setting-label">Lépések száma</div>
    <input type="range" id="stepsSlider" min="1" max="20" value="3">
    <span class="setting-value" id="stepsVal2">3</span>
  </div>

  <div class="setting-row" id="distDiffRow" style="display:none">
    <div class="setting-label">Nehézség<small>távolság módhoz</small></div>
    <div class="toggle-group" id="distDiffGroup">
      <button data-val="easy" class="active">Könnyű</button>
      <button data-val="medium">Közepes</button>
      <button data-val="hard">Nehéz</button>
    </div>
  </div>

  <button class="apply-btn" id="applyBtn">Alkalmaz</button>
</div>

<div class="status-bar">
  <span class="badge" id="roundBadge">1. feladat</span>
  <span>⭐ <span id="scoreVal">0</span> pont</span>
  <span>✅ <span id="correctVal">0</span> helyes</span>
</div>

<div class="phase" id="phaseText">Válassz módot és nyomd meg a gombot!</div>
<div id="gameArea" style="display:flex;flex-direction:column;align-items:center;gap:12px"></div>
<div class="result" id="result"></div>
<div class="stars"  id="stars"></div>

<div class="btn-row">
  <button class="btn btn-clear"   id="clearBtn"  style="display:none">🗑️ Törlés</button>
  <button class="btn btn-check"   id="checkBtn"  style="display:none">✅ Ellenőrzés</button>
  <button class="btn btn-primary" id="mainBtn">▶ Kezdés</button>
</div>

<script>
  const DIR_LABELS = { up:'fel', down:'le', left:'balra', right:'jobbra' };
  const DIR_ICONS  = { up:'↑', down:'↓', left:'←', right:'→' };
  const DIRS = ['up','down','left','right'];
  const OPPOSITE = { up:'down', down:'up', left:'right', right:'left' };

  let cfg = { size: 4, mode: 'navigate', navAnswer: 'draw', instrStyle: 'text', steps: 3, distDiff: 'easy' };
  let score = 0, roundCount = 0, correctCount = 0, consecutiveCorrect = 0;
  let phase = 'idle', isRetry = false;

  let startPos, targetPos, navInstructions;
  let distA, distB, obstacles, shortestDist;
  let drawnPath = [], tapSelected = null;
  let currentGridEl = null;
  let navCtrl = null, distCtrl = null;

  // ── DOM ───────────────────────────────────────────────
  const gameArea     = document.getElementById('gameArea');
  const phaseText    = document.getElementById('phaseText');
  const resultEl     = document.getElementById('result');
  const starsEl      = document.getElementById('stars');
  const mainBtn      = document.getElementById('mainBtn');
  const checkBtn     = document.getElementById('checkBtn');
  const clearBtn     = document.getElementById('clearBtn');
  const scoreValEl   = document.getElementById('scoreVal');
  const correctValEl = document.getElementById('correctVal');
  const roundBadge   = document.getElementById('roundBadge');

  // ── Settings ──────────────────────────────────────────
  const sizeSlider  = document.getElementById('sizeSlider');
  const stepsSlider = document.getElementById('stepsSlider');

  function updateDisplays() {
    document.getElementById('sizeVal').textContent   = `${sizeSlider.value}×${sizeSlider.value}`;
    document.getElementById('stepsVal2').textContent = stepsSlider.value;
  }
  sizeSlider.addEventListener('input', updateDisplays);
  stepsSlider.addEventListener('input', updateDisplays);
  updateDisplays();

  document.querySelectorAll('.toggle-group').forEach(g => {
    g.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        g.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  });

  function updateSettingsVisibility() {
    const isNav  = cfg.mode === 'navigate';
    const isDist = cfg.mode === 'distance';
    document.getElementById('navAnswerRow').style.display  = isNav  ? 'flex' : 'none';
    document.getElementById('instrStyleRow').style.display = isNav  ? 'flex' : 'none';
    document.getElementById('stepsRow').style.display      = isNav  ? 'flex' : 'none';
    document.getElementById('distDiffRow').style.display   = isDist ? 'flex' : 'none';
  }

  document.getElementById('settingsToggle').addEventListener('click', () => {
    document.getElementById('settingsPanel').classList.toggle('open');
  });

  document.getElementById('applyBtn').addEventListener('click', () => {
    cfg.size      = parseInt(sizeSlider.value);
    cfg.navAnswer  = document.querySelector('#navAnswerGroup .active').dataset.val;
    cfg.instrStyle = document.querySelector('#instrStyleGroup .active').dataset.val;
    cfg.steps      = parseInt(stepsSlider.value);
    cfg.distDiff   = document.querySelector('#distDiffGroup .active').dataset.val;
    document.getElementById('settingsPanel').classList.remove('open');
    startRound();
  });

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      cfg.mode = btn.dataset.mode;
      updateSettingsVisibility();
      resetUI();
    });
  });
  updateSettingsVisibility();

  // ── Helpers ───────────────────────────────────────────
  function rnd(n) { return Math.floor(Math.random() * n); }
  function rndPos() { return { x: rnd(cfg.size), y: rnd(cfg.size) }; }
  function posEq(a, b) { return a.x === b.x && a.y === b.y; }
  function posKey(p) { return `${p.x},${p.y}`; }
  function manhattan(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }

  function applyDir(pos, dir) {
    const p = { ...pos };
    if (dir==='up'    && p.y>0)              p.y--;
    if (dir==='down'  && p.y<cfg.size-1)     p.y++;
    if (dir==='left'  && p.x>0)              p.x--;
    if (dir==='right' && p.x<cfg.size-1)     p.x++;
    return p;
  }

  // BFS shortest distance avoiding obstacles
  function bfsDist(start, end, size, walls) {
    const wallSet = new Set((walls||[]).map(posKey));
    if (wallSet.has(posKey(start)) || wallSet.has(posKey(end))) return Infinity;
    const queue = [[start, 0]];
    const visited = new Set([posKey(start)]);
    while (queue.length) {
      const [cur, d] = queue.shift();
      if (posEq(cur, end)) return d;
      for (const dir of DIRS) {
        const np = applyDir(cur, dir);
        const key = posKey(np);
        if (!visited.has(key) && !wallSet.has(key) && np.x>=0 && np.x<size && np.y>=0 && np.y<size) {
          visited.add(key); queue.push([np, d+1]);
        }
      }
    }
    return Infinity;
  }

  // Check if path is valid (connected A→B, all adjacent, avoids walls)
  function validatePath(path, start, end, walls) {
    const wallSet = new Set((walls||[]).map(posKey));
    if (!path.length) return false;
    if (!posEq(path[0], start)) return false;
    if (!posEq(path[path.length-1], end)) return false;
    for (let i = 1; i < path.length; i++) {
      if (manhattan(path[i], path[i-1]) !== 1) return false;
      if (wallSet.has(posKey(path[i]))) return false;
    }
    return true;
  }

  // ── Shaped navigate paths ─────────────────────────────
  // Named patterns – all defined as direction sequences
  const SHAPE_PATTERNS = [
    { name: 'L alak',      dirs: ['down','down','right','right'] },
    { name: 'T alak',      dirs: ['right','right','right','up','left','left'] },
    { name: 'Z alak',      dirs: ['right','right','down','left','left'] },
    { name: 'négyzet',     dirs: ['right','right','down','down','left','left','up','up'] },
    { name: 'lépcső',      dirs: ['right','down','right','down','right'] },
    { name: 'fordított L', dirs: ['right','right','down','down'] },
    { name: 'S alak',      dirs: ['right','down','right','down'] },
    { name: 'nyíl',        dirs: ['right','right','right','down','left','left','down','right','right','right'] },
  ];

  function tryShapedPath(start, size) {
    const pattern = SHAPE_PATTERNS[rnd(SHAPE_PATTERNS.length)];
    let pos = { ...start };
    const path = [{ ...pos }];
    for (const dir of pattern.dirs) {
      const np = applyDir(pos, dir);
      if (posEq(np, pos)) return null; // hit wall
      pos = np;
      path.push({ ...pos });
    }
    return path;
  }

  function genInstructions(start, steps) {
    // Try shaped path first (50% chance)
    if (Math.random() < 0.5 && steps >= 4) {
      const shaped = tryShapedPath(start, cfg.size);
      if (shaped && shaped.length - 1 <= steps) {
        const instrs = [];
        for (let i = 1; i < shaped.length; i++) {
          const dx = shaped[i].x - shaped[i-1].x;
          const dy = shaped[i].y - shaped[i-1].y;
          if (dx===1) instrs.push('right');
          else if (dx===-1) instrs.push('left');
          else if (dy===1) instrs.push('down');
          else if (dy===-1) instrs.push('up');
        }
        return { instrs, end: shaped[shaped.length-1] };
      }
    }
    // Regular random path, no immediate backtrack
    let pos = { ...start };
    const instrs = [];
    let lastDir = null;
    for (let i = 0; i < steps; i++) {
      const ok = DIRS.filter(d => {
        if (lastDir && d === OPPOSITE[lastDir]) return false;
        if (d==='up'    && pos.y===0)          return false;
        if (d==='down'  && pos.y===cfg.size-1) return false;
        if (d==='left'  && pos.x===0)          return false;
        if (d==='right' && pos.x===cfg.size-1) return false;
        return true;
      });
      if (!ok.length) break;
      const dir = ok[rnd(ok.length)];
      instrs.push(dir); lastDir = dir;
      pos = applyDir(pos, dir);
    }
    return { instrs, end: pos };
  }

  // ── Generate obstacles ────────────────────────────────
  function genObstacles(size, a, b, count) {
    const forbidden = new Set([posKey(a), posKey(b)]);
    const walls = [];
    let tries = 0;
    while (walls.length < count && tries < 200) {
      tries++;
      const p = { x: rnd(size), y: rnd(size) };
      const key = posKey(p);
      if (forbidden.has(key)) continue;
      if (walls.some(w => posKey(w) === key)) continue;
      // Check path still exists with this wall
      const testWalls = [...walls, p];
      if (bfsDist(a, b, size, testWalls) === Infinity) continue;
      walls.push(p);
      forbidden.add(key);
    }
    return walls;
  }

  // ── Cell size ─────────────────────────────────────────
  function cpx() {
    return Math.max(34, Math.floor((Math.min(window.innerWidth - 80, 340)) / cfg.size) - 4);
  }

  // ── Build grid ────────────────────────────────────────
  function buildGrid(opts = {}) {
    const px = cpx();
    const outer = document.createElement('div');
    outer.className = 'grid-outer';

    // Col labels
    const colRow = document.createElement('div'); colRow.className = 'col-row';
    for (let c = 0; c < cfg.size; c++) {
      const l = document.createElement('div'); l.className = 'coord-lbl';
      l.style.width = (px+4)+'px'; l.textContent = String.fromCharCode(65+c);
      colRow.appendChild(l);
    }
    outer.appendChild(colRow);

    const body = document.createElement('div'); body.className = 'grid-body';
    const rowLbls = document.createElement('div'); rowLbls.className = 'row-lbls';
    for (let r = 0; r < cfg.size; r++) {
      const l = document.createElement('div'); l.className = 'coord-lbl';
      l.style.height = (px+4)+'px'; l.style.width = '22px'; l.textContent = r+1;
      rowLbls.appendChild(l);
    }
    body.appendChild(rowLbls);

    const wrap = document.createElement('div'); wrap.className = 'grid-wrap-inner';
    const grid = document.createElement('div'); grid.className = 'grid';
    grid.style.gridTemplateColumns = `repeat(${cfg.size}, ${px}px)`;

    const wallSet = new Set((opts.walls||[]).map(posKey));

    for (let r = 0; r < cfg.size; r++) {
      for (let c = 0; c < cfg.size; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.width = cell.style.height = px+'px';
        cell.style.fontSize = Math.floor(px*0.48)+'px';
        cell.dataset.col = c; cell.dataset.row = r;
        const pos = {x:c, y:r};
        const key = posKey(pos);

        if (wallSet.has(key)) {
          cell.classList.add('wall-c');
          cell.style.background = '#334155';
          cell.style.borderColor = '#1e293b';
          cell.style.cursor = 'default';
        } else if (opts.start   && posEq(pos, opts.start))   { cell.classList.add('start-c'); cell.textContent = '😊'; }
        else if (opts.end     && posEq(pos, opts.end))     { cell.classList.add('end-c');   cell.textContent = '⭐'; }
        else if (opts.markerA && posEq(pos, opts.markerA)) { cell.classList.add('start-c'); cell.textContent = '🔵'; }
        else if (opts.markerB && posEq(pos, opts.markerB)) { cell.classList.add('end-c');   cell.textContent = '🔴'; }

        grid.appendChild(cell);
      }
    }

    wrap.appendChild(grid); body.appendChild(wrap); outer.appendChild(body);
    outer._grid = grid; outer._wrap = wrap;
    return outer;
  }

  function getCell(grid, x, y) {
    return grid.querySelector(`[data-col="${x}"][data-row="${y}"]`);
  }

  // ── Draw interaction ──────────────────────────────────
  function attachDraw(wrap, grid, startP, endP, wallsArr, onUpdate) {
    const wallSet = new Set((wallsArr||[]).map(posKey));
    let active = false;
    let path = [];
    let lastCellKey = null; // track last cell entered during drag

    function posFromPoint(clientX, clientY) {
      const els = document.elementsFromPoint(clientX, clientY);
      for (const el of els) {
        if (el.dataset && el.dataset.col !== undefined && el.closest('.grid') === grid) {
          return { x: parseInt(el.dataset.col), y: parseInt(el.dataset.row) };
        }
      }
      return null;
    }

    function redraw() {
      const pathSet = new Set(path.map(posKey));
      grid.querySelectorAll('.cell').forEach(cell => {
        if (cell.classList.contains('wall-c')) return;
        const pos = { x: parseInt(cell.dataset.col), y: parseInt(cell.dataset.row) };
        cell.classList.remove('drawn','start-c','end-c','correct-c','wrong-c','hint-c');
        cell.textContent = '';
        if (posEq(pos, startP)) {
          cell.classList.add('start-c');
          cell.textContent = endP ? '🔵' : '😊';
        } else if (endP && posEq(pos, endP)) {
          cell.classList.add('end-c');
          cell.textContent = '🔴';
        } else if (pathSet.has(posKey(pos))) {
          cell.classList.add('drawn');
        }
      });
      onUpdate([...path]);
    }

    function step(pos) {
      if (!pos || wallSet.has(posKey(pos))) return;

      // Tapping startP always resets
      if (posEq(pos, startP)) {
        if (path.length === 0 || !posEq(path[0], startP)) {
          path = [{...startP}]; redraw();
        }
        return;
      }

      if (path.length === 0) return; // must start from startP first

      const last = path[path.length-1];
      if (posEq(pos, last)) return; // same cell

      // Undo: stepped back to previous cell
      if (path.length >= 2 && posEq(pos, path[path.length-2])) {
        path.pop(); redraw(); return;
      }

      if (manhattan(last, pos) !== 1) return; // not adjacent
      if (path.some(p => posEq(p, pos))) return; // already in path

      path.push({x: pos.x, y: pos.y});
      redraw();
    }

    // pointerdown: start drawing
    wrap.addEventListener('pointerdown', e => {
      if (phase !== 'playing') return;
      e.preventDefault();
      active = true;
      lastCellKey = null;
      wrap.setPointerCapture(e.pointerId);
      const pos = posFromPoint(e.clientX, e.clientY);
      if (!pos) return;
      lastCellKey = posKey(pos);
      step(pos);
    });

    // pointermove: extend path while dragging
    wrap.addEventListener('pointermove', e => {
      if (!active || phase !== 'playing') return;
      e.preventDefault();
      const pos = posFromPoint(e.clientX, e.clientY);
      if (!pos) return;
      const key = posKey(pos);
      if (key === lastCellKey) return; // still in same cell, skip
      lastCellKey = key;
      step(pos);
    });

    wrap.addEventListener('pointerup',     () => { active = false; lastCellKey = null; });
    wrap.addEventListener('pointercancel', () => { active = false; lastCellKey = null; });

    // Per-cell pointerenter: fires when finger/mouse enters a new cell during drag
    // This is the most reliable cross-platform way to detect cell entry
    grid.querySelectorAll('.cell:not(.wall-c)').forEach(cell => {
      cell.addEventListener('pointerenter', e => {
        if (!active || phase !== 'playing') return;
        const pos = { x: parseInt(cell.dataset.col), y: parseInt(cell.dataset.row) };
        const key = posKey(pos);
        if (key === lastCellKey) return;
        lastCellKey = key;
        step(pos);
      });
      // Single tap: pointerup on a cell without drag
      cell.addEventListener('pointerup', e => {
        if (phase !== 'playing') return;
        const pos = { x: parseInt(cell.dataset.col), y: parseInt(cell.dataset.row) };
        step(pos);
      });
    });

    redraw();
    return {
      getPath: () => [...path],
      reset:   () => { path = []; lastCellKey = null; redraw(); }
    };
  }

  // ── Navigate mode ─────────────────────────────────────
  function buildNavigate() {
    startPos = rndPos();
    const { instrs, end } = genInstructions(startPos, cfg.steps);
    navInstructions = instrs; targetPos = end;
    drawnPath = []; tapSelected = null;

    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:12px;';

    const instrBox = document.createElement('div');
    instrBox.className = 'instr-box' + (cfg.instrStyle === 'icon' ? ' icon-mode' : '');
    instrBox.textContent = cfg.instrStyle === 'icon'
      ? instrs.map(d => DIR_ICONS[d]).join('  ')
      : instrs.map(d => DIR_LABELS[d]).join('     ');
    wrap.appendChild(instrBox);

    if (cfg.navAnswer === 'draw') {
      const g = buildGrid({ start: startPos });
      wrap.appendChild(g);
      currentGridEl = g._grid;
      navCtrl = attachDraw(g._wrap, g._grid, startPos, null, [], path => { drawnPath = path; });
    } else {
      let selCell = null;
      const g = buildGrid({ start: startPos });
      currentGridEl = g._grid;
      g._grid.querySelectorAll('.cell').forEach(cell => {
        const pos = { x: parseInt(cell.dataset.col), y: parseInt(cell.dataset.row) };
        if (posEq(pos, startPos)) return;
        cell.style.cursor = 'pointer';
        cell.addEventListener('click', () => {
          if (phase !== 'playing') return;
          if (selCell) selCell.classList.remove('drawn');
          selCell = cell; cell.classList.add('drawn');
          tapSelected = { ...pos };
        });
      });
      wrap.appendChild(g);
    }
    gameArea.appendChild(wrap);
  }

  function checkNavigate() {
    if (cfg.navAnswer === 'draw') {
      const last = drawnPath[drawnPath.length-1];
      const correct = !!last && posEq(last, targetPos);
      const tc = getCell(currentGridEl, targetPos.x, targetPos.y);
      if (correct) {
        drawnPath.forEach(p => { const c = getCell(currentGridEl,p.x,p.y); if(c){c.classList.remove('drawn','start-c'); c.classList.add('correct-c');} });
        if (tc) tc.textContent = '⭐';
      } else {
        if (last) { const lc = getCell(currentGridEl,last.x,last.y); if(lc) lc.classList.add('wrong-c'); }
        setTimeout(() => { if(tc){tc.classList.add('hint-c'); tc.textContent='⭐';} }, 500);
      }
      finishRound(correct);
    } else {
      const correct = !!tapSelected && posEq(tapSelected, targetPos);
      const tc = getCell(currentGridEl, targetPos.x, targetPos.y);
      if (correct) {
        const sc = getCell(currentGridEl, tapSelected.x, tapSelected.y);
        if (sc) { sc.classList.remove('drawn'); sc.classList.add('correct-c'); sc.textContent='⭐'; }
      } else {
        if (tapSelected) { const sc=getCell(currentGridEl,tapSelected.x,tapSelected.y); if(sc) sc.classList.add('wrong-c'); }
        setTimeout(()=>{ if(tc){tc.classList.add('hint-c'); tc.textContent='⭐';} }, 500);
      }
      finishRound(correct);
    }
  }

  // ── Distance mode ─────────────────────────────────────
  function buildDistance() {
    const size = cfg.size;
    // Generate A and B far enough apart
    const minDist = cfg.distDiff === 'easy' ? 2 : cfg.distDiff === 'medium' ? 3 : 4;
    distA = rndPos();
    do { distB = rndPos(); } while (manhattan(distA, distB) < minDist || posEq(distA, distB));

    // Obstacles by difficulty
    const obCount = cfg.distDiff === 'easy' ? 0 : cfg.distDiff === 'medium' ? Math.floor(size*1.2) : Math.floor(size*2);
    obstacles = genObstacles(size, distA, distB, obCount);
    shortestDist = bfsDist(distA, distB, size, obstacles);

    drawnPath = [];
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:12px;';

    // Difficulty badge
    const diffBadge = document.createElement('div');
    diffBadge.style.cssText = 'font-weight:900;font-size:0.85rem;color:var(--muted);';
    const diffNames = { easy:'Könnyű – nincs akadály', medium:'Közepes – néhány akadály', hard:'Nehéz – sok akadály' };
    diffBadge.textContent = diffNames[cfg.distDiff];
    wrap.appendChild(diffBadge);

    const g = buildGrid({ markerA: distA, markerB: distB, walls: obstacles });
    wrap.appendChild(g);
    currentGridEl = g._grid;
    distCtrl = attachDraw(g._wrap, g._grid, distA, distB, obstacles, path => { drawnPath = path; });
    gameArea.appendChild(wrap);
  }

  function checkDistance() {
    const p = drawnPath;
    const wallSet = new Set(obstacles.map(posKey));

    const ok_start = p.length > 0 && posEq(p[0], distA);
    const ok_end   = p.length > 0 && posEq(p[p.length-1], distB);
    const ok_adj   = p.every((pos,i) => i===0 || manhattan(pos,p[i-1])===1);
    const ok_walls = p.every(pos => !wallSet.has(posKey(pos)));
    const pathLen  = p.length - 1;
    const isValid  = ok_start && ok_end && ok_adj && ok_walls;
    const isShortest = isValid && pathLen === shortestDist;

    if (!isValid) {
      // Show error
      p.forEach((pos,i) => {
        if (i===0) return;
        const c = getCell(currentGridEl, pos.x, pos.y);
        if (c && !posEq(pos,distB)) c.classList.add('wrong-c');
      });
      let msg = '😅 ';
      if (!ok_start) msg += 'A 🔵-tól kell indulni!';
      else if (!ok_end) msg += `Érd el a 🔴-t! (${shortestDist} lépés a legrövidebb)`;
      else if (!ok_adj) msg += 'Csak szomszédos mezőkre lépj!';
      else if (!ok_walls) msg += 'Az akadályokon nem lehet átmenni!';
      resultEl.textContent = msg;
      resultEl.className = 'result fail';
      finishRound(false, true);
    } else if (isShortest) {
      // Perfect
      p.forEach(pos => {
        const c = getCell(currentGridEl,pos.x,pos.y);
        if (c) { c.classList.remove('drawn','start-c','end-c'); c.classList.add('correct-c'); c.textContent=''; }
      });
      const ca=getCell(currentGridEl,distA.x,distA.y); if(ca){ca.textContent='🔵';}
      const cb=getCell(currentGridEl,distB.x,distB.y); if(cb){cb.textContent='🔴';}
      finishRound(true);
    } else {
      // Valid but not shortest
      p.forEach(pos => {
        const c = getCell(currentGridEl,pos.x,pos.y);
        if (c) { c.classList.remove('drawn','start-c','end-c'); c.classList.add('correct-c'); c.textContent=''; }
      });
      const ca=getCell(currentGridEl,distA.x,distA.y); if(ca){ca.textContent='🔵';}
      const cb=getCell(currentGridEl,distB.x,distB.y); if(cb){cb.textContent='🔴';}
      resultEl.textContent = `✅ Összekötötted! De a legrövidebb út csak ${shortestDist} lépés – te ${pathLen}-et léptél.`;
      resultEl.className = 'result success';
      finishRound(true, true);
    }
  }

  // ── Finish ────────────────────────────────────────────
  function finishRound(correct, skipMsg) {
    phase = 'result';
    checkBtn.style.display = 'none';
    clearBtn.style.display = 'none';
    if (correct) {
      isRetry = false; consecutiveCorrect++; correctCount++;
      correctValEl.textContent = correctCount;
      score += 10 + cfg.size; scoreValEl.textContent = score;
      if (!skipMsg) { resultEl.textContent = '🎉 Helyes! Szuper!'; resultEl.className = 'result success'; }
      starsEl.textContent = consecutiveCorrect>=3 ? '⭐⭐⭐' : consecutiveCorrect>=2 ? '⭐⭐' : '⭐';
      mainBtn.textContent = '▶ Következő feladat';
    } else {
      isRetry = true; consecutiveCorrect = 0;
      if (!skipMsg) { resultEl.textContent = '😅 Nem egészen… Próbáld újra!'; resultEl.className = 'result fail'; }
      starsEl.textContent = '';
      mainBtn.textContent = '🔄 Újra';
    }
    mainBtn.style.display = 'inline-block';
  }

  // ── Start round ───────────────────────────────────────
  function startRound() {
    const retrying = isRetry; isRetry = false;
    if (!retrying) roundCount++;
    roundBadge.textContent = `${roundCount}. feladat`;
    resultEl.textContent = ''; resultEl.className = 'result';
    starsEl.textContent = '';
    phase = 'playing';
    mainBtn.style.display = 'none';
    checkBtn.style.display = 'none';
    clearBtn.style.display = 'none';
    gameArea.innerHTML = '';
    navCtrl = null; distCtrl = null; drawnPath = []; tapSelected = null;

    if (cfg.mode === 'navigate') {
      phaseText.textContent = cfg.navAnswer === 'draw'
        ? '✏️ Rajzold meg az útvonalat az utasítások alapján!'
        : '👆 Koppints arra a mezőre, ahova kerülsz!';
      buildNavigate();
      checkBtn.style.display = 'inline-block';
      if (cfg.navAnswer === 'draw') clearBtn.style.display = 'inline-block';
    } else {
      phaseText.textContent = '✏️ Kösd össze a 🔵-t a 🔴-val!';
      buildDistance();
      checkBtn.style.display = 'inline-block';
      clearBtn.style.display = 'inline-block';
    }
  }

  function resetUI() {
    gameArea.innerHTML = ''; resultEl.textContent = ''; resultEl.className = 'result';
    starsEl.textContent = ''; checkBtn.style.display = 'none'; clearBtn.style.display = 'none';
    mainBtn.textContent = '▶ Kezdés'; mainBtn.style.display = 'inline-block';
    phase = 'idle'; isRetry = false;
    phaseText.textContent = 'Válassz módot és nyomd meg a gombot!';
  }

  mainBtn.addEventListener('click',  () => { if (phase==='idle'||phase==='result') startRound(); });
  checkBtn.addEventListener('click', () => { if (phase!=='playing') return; cfg.mode==='navigate' ? checkNavigate() : checkDistance(); });
  clearBtn.addEventListener('click', () => {
    if (phase!=='playing') return;
    if (navCtrl)  { navCtrl.reset();  drawnPath=[]; }
    if (distCtrl) { distCtrl.reset(); drawnPath=[]; }
  });
</script>
</body>
