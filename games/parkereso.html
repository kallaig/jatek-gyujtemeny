<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Párkereső</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf4ff;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 18px;
    --accent: #9333ea;
    --accent-dark: #7e22ce;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 15%, rgba(147,51,234,0.10) 0%, transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(236,72,153,0.08) 0%, transparent 40%);
    overflow-x: hidden;
  }
  header { text-align: center; padding: 18px 16px 4px; }
  .logo { font-size: clamp(22px,5vw,34px); font-weight: 900; color: var(--accent-dark); letter-spacing: -0.5px; }
  .subtitle { font-size: 14px; color: #64748b; font-weight: 600; margin-top: 3px; }

  .top-bar { max-width: 700px; margin: 10px auto 0; padding: 0 14px; display: flex; justify-content: flex-end; }
  .settings-toggle-btn {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; padding: 7px 16px;
    border: 2px solid #e9d5ff; border-radius: 50px; cursor: pointer;
    background: white; color: #64748b; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.2s;
  }
  .settings-toggle-btn:hover { border-color: var(--accent); color: var(--accent-dark); }

  .settings-panel {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    max-width: 700px; margin: 8px auto 0; overflow: hidden;
    max-height: 0; transition: max-height 0.35s ease, padding 0.3s ease; padding: 0 22px;
  }
  .settings-panel.open { max-height: 360px; padding: 18px 22px; }
  .settings-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
  .setting-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
  .setting-group label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
  .setting-group select {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: #334155;
    background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 11px; padding: 7px 11px;
    cursor: pointer; outline: none; transition: border-color 0.2s;
  }
  .setting-group select:focus { border-color: var(--accent); }

  .game-container { max-width: 700px; margin: 0 auto; padding: 12px 14px 50px; }
  .status-bar { background: white; border-radius: var(--radius); padding: 12px 18px; margin-bottom: 12px; box-shadow: var(--shadow); text-align: center; }
  .status-msg { font-size: 16px; font-weight: 800; color: #334155; }

  .timer-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
  .timer-display {
    font-size: 22px; font-weight: 900; color: var(--accent);
    background: white; border-radius: 50px; padding: 6px 18px;
    box-shadow: var(--shadow); min-width: 90px; text-align: center;
    border: 2px solid #e9d5ff;
  }
  .timer-display.warning { color: #ef4444; border-color: #fca5a5; animation: pulse 0.5s ease-in-out infinite; }

  .target-strip {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 12px 16px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .target-label { font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .target-sequences { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .target-seq { display: flex; align-items: center; gap: 4px; }
  .target-cell {
    width: 52px; height: 52px; border-radius: 12px;
    background: linear-gradient(135deg, #f3e8ff, #ede9fe);
    border: 3px solid #a855f7;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
  }
  .target-cell svg.shape { width: 30px; height: 30px; }
  .target-arrow { font-size: 18px; color: #c4b5fd; font-weight: 900; }

  .counter-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
    justify-content: center;
  }
  .counter-badge {
    font-size: 15px; font-weight: 900; color: var(--accent-dark);
    background: white; border-radius: 50px;
    padding: 5px 14px; border: 2px solid #e9d5ff;
    box-shadow: var(--shadow);
  }
  .counter-badge.done { background: #dcfce7; color: #16a34a; border-color: #86efac; }

  .dir-hint { font-size: 13px; font-weight: 700; color: #94a3b8; text-align: center; margin-bottom: 8px; }

  .progress-wrap { background: #e2e8f0; border-radius: 99px; height: 8px; margin-bottom: 12px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#a855f7,#ec4899); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

  .search-section { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; margin-bottom: 12px; }
  .search-grid { display: grid; gap: 5px; justify-content: center; }

  .grid-cell {
    aspect-ratio: 1; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; cursor: pointer;
    transition: transform 0.12s, background 0.15s, border-color 0.15s;
    border: 2px solid #e2e8f0; background: #f8fafc;
    user-select: none; position: relative;
  }
  .grid-cell:hover:not(.found) { background: #faf5ff; border-color: #c4b5fd; transform: scale(1.06); }

  /* Selecting: first cell of a sequence being built */
  .grid-cell.sel-start {
    background: linear-gradient(135deg,#ede9fe,#ddd6fe) !important;
    border-color: #8b5cf6 !important;
    transform: scale(1.08);
  }
  /* Additional cells in current selection */
  .grid-cell.sel-cont {
    background: linear-gradient(135deg,#f3e8ff,#ede9fe) !important;
    border-color: #a855f7 !important;
    transform: scale(1.06);
  }
  /* Neutral mark (wrong guess, waits for check) */
  .grid-cell.marked {
    background: linear-gradient(135deg,#ede9fe,#ddd6fe) !important;
    border-color: #8b5cf6 !important;
  }
  .grid-cell.marked::after {
    content:'✓'; position:absolute; top:2px; right:4px;
    font-size:10px; font-weight:900; color:#7c3aed; line-height:1;
  }
  /* After check: correct */
  .grid-cell.correct {
    background: linear-gradient(135deg,#d1fae5,#a7f3d0) !important;
    border-color: #22c55e !important;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .grid-cell.correct::after {
    content:'✓'; position:absolute; top:2px; right:4px;
    font-size:10px; font-weight:900; color:#16a34a; line-height:1;
  }
  /* After check: wrong */
  .grid-cell.wrong {
    background: #fee2e2 !important;
    border-color: #ef4444 !important;
  }
  .grid-cell.wrong::after {
    content:'✗'; position:absolute; top:2px; right:4px;
    font-size:10px; font-weight:900; color:#ef4444; line-height:1;
  }
  /* After check: missed target */
  .grid-cell.missed {
    background: linear-gradient(135deg,#fff7ed,#ffedd5) !important;
    border-color: #f97316 !important;
  }

  .grid-cell svg.shape { width: 62%; height: 62%; }

  .result-banner { background: white; border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow); margin-bottom: 12px; display: none; }
  .result-banner.show { display: block; animation: slideDown 0.3s ease; }
  .result-text { font-size: 21px; font-weight: 900; color: #334155; margin-bottom: 4px; }
  .result-sub  { font-size: 14px; font-weight: 600; color: #64748b; }

  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    padding: 12px 26px; border: none; border-radius: 50px;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(0,0,0,0.09);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.14); }
  .btn:active { transform: translateY(0); }
  .btn-start { background: linear-gradient(135deg, #9333ea, #6366f1); color: white; }
  .btn-check { background: linear-gradient(135deg, #f97316, #facc15); color: white; }
  .btn-next  { background: linear-gradient(135deg, #9333ea, #7e22ce); color: white; }

  @keyframes popIn    { 0%{transform:scale(0.6);opacity:0} 100%{transform:scale(1);opacity:1} }
  @keyframes slideDown{ from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  .star { position:fixed; pointer-events:none; font-size:22px; animation:floatStar 1.4s ease-out forwards; z-index:200; }
  @keyframes floatStar{ 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.5)} }

  .hidden { display: none !important; }
</style>
</head>

<header>
  <div class="logo">🔗 Párkereső</div>
  <div class="subtitle">Keresd meg az együttjáró sorozatot!</div>
</header>

<div class="top-bar">
  <button class="settings-toggle-btn" onclick="toggleSettings()">⚙️ Beállítások</button>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="settings-row">
    <div class="setting-group">
      <label>Elemtípus</label>
      <select id="elem-type" onchange="updateElemType()">
        <option value="emoji" selected>Emoji</option>
        <option value="shape">Formák</option>
        <option value="jelek">Jelek</option>
      </select>
    </div>
    <div class="setting-group" id="emoji-cat-group">
      <label>Kategória</label>
      <select id="emoji-cat">
        <option value="animals" selected>Állatok</option>
        <option value="plants">Növények</option>
        <option value="vehicles">Járművek</option>
        <option value="mixed">Vegyes</option>
      </select>
    </div>
    <div class="setting-group hidden" id="jelek-cat-group">
      <label>Jelkészlet</label>
      <select id="jelek-cat">
        <option value="math" selected>Matematikai</option>
        <option value="geo">Geometriai</option>
        <option value="arrow">Nyilak</option>
        <option value="basic">Alapjelek</option>
        <option value="all">Mind a négy</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Rács mérete</label>
      <select id="grid-size">
        <option value="4">4 × 4</option>
        <option value="5">5 × 5</option>
        <option value="6" selected>6 × 6</option>
        <option value="7">7 × 7</option>
        <option value="8">8 × 8</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Sorozat hossza</label>
      <select id="seq-len">
        <option value="2" selected>2 elem (pár)</option>
        <option value="3">3 elem (hármas)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Mód</label>
      <select id="search-mode" onchange="updateSearchMode()">
        <option value="multi" selected>Több különböző sorozat</option>
        <option value="repeat">1 sorozat, többször elrejtve</option>
      </select>
    </div>
    <div class="setting-group" id="multi-count-group">
      <label>Sorozatok száma</label>
      <select id="target-count">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
      </select>
    </div>
    <div class="setting-group hidden" id="repeat-count-group">
      <label>Ismétlések száma</label>
      <select id="repeat-count">
        <option value="1">1×</option>
        <option value="2" selected>2×</option>
        <option value="3">3×</option>
        <option value="4">4×</option>
        <option value="5">5×</option>
        <option value="6">6×</option>
        <option value="7">7×</option>
        <option value="8">8×</option>
        <option value="9">9×</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Irány</label>
      <select id="direction">
        <option value="h" selected>Vízszintes →</option>
        <option value="v">Függőleges ↓</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Időlimit</label>
      <select id="time-limit">
        <option value="0">Nincs</option>
        <option value="30">30 mp</option>
        <option value="60" selected>60 mp</option>
        <option value="90">90 mp</option>
        <option value="120">2 perc</option>
      </select>
    </div>
  </div>
</div>

<div class="game-container">
  <div class="status-bar"><div class="status-msg" id="status-msg">Nyomj a Start gombra!</div></div>
  <div class="timer-bar hidden" id="timer-bar">
    <span style="font-size:14px;font-weight:800;color:#64748b">⏱</span>
    <div class="timer-display" id="timer-display">60</div>
  </div>
  <div class="target-strip hidden" id="target-strip">
    <div class="target-label">Keresed:</div>
    <div class="target-sequences" id="target-sequences"></div>
  </div>
  <div class="counter-row hidden" id="counter-row">
    <div class="counter-badge" id="counter-badge">0 / 0</div>
  </div>
  <div class="dir-hint hidden" id="dir-hint"></div>
  <div class="progress-wrap hidden" id="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="search-section hidden" id="search-section">
    <div class="search-grid" id="search-grid"></div>
  </div>
  <div class="result-banner" id="result-banner">
    <div class="result-text" id="result-text"></div>
    <div class="result-sub" id="result-sub"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="start-btn" onclick="startGame()">🚀 Start</button>
    <button class="btn btn-check hidden" id="check-btn" onclick="checkAnswers()">Ellenőrzés</button>
    <button class="btn btn-next hidden" id="next-btn" onclick="startGame()">Következő ▶</button>
  </div>
</div>

<script>
// ── DATA ──
const EMOJI_POOLS = {
  animals:  ['🐶','🐱','🐰','🦊','🐻','🐼','🐯','🐮','🐷','🐸','🐵','🦁','🐧','🦉','🐺'],
  plants:   ['🌵','🍄','🌴','🌻','🍁','🍀','🌾','🎋','🌲','🪨'],
  vehicles: ['🚂','✈️','🚀','🚁','⛵','🚒','🚑','🛸','🚜','🏍'],
};
const COLORS = [{id:'red',hex:'#ef4444'},{id:'yellow',hex:'#facc15'},{id:'green',hex:'#22c55e'},{id:'blue',hex:'#3b82f6'}];
const SHAPES_LIST = ['circle','square','triangle'];
const JELEK_POOLS = {
  math:  ['math:plus','math:minus','math:times','math:div','math:eq','math:lt','math:gt'],
  geo:   ['geo:star','geo:heart','geo:diamond','geo:spade','geo:club'],
  arrow: ['arrow:left','arrow:up','arrow:right','arrow:down','arrow:nw','arrow:ne'],
  basic: ['basic:slash','basic:bslash','basic:pipe','basic:at','basic:hash','basic:tilde'],
};

// ── STATE ──
let GS = {};            // gameState
let sel = null;         // current selection: [{row,col}]
let settingsOpen = false;
let timerInterval = null;

// ── UTILS ──
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}
function pick(a,n){return shuffle([...a]).slice(0,n);}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function setStatus(m){document.getElementById('status-msg').textContent=m;}
function spawnStars(x,y,n){['⭐','🌟','✨','💫'].slice(0,n).forEach((s,i)=>{const e=document.createElement('div');e.className='star';e.textContent=s;e.style.left=(x+(Math.random()-.5)*80)+'px';e.style.top=(y+(Math.random()-.5)*40)+'px';e.style.animationDelay=(i*.1)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),1800);});}

function toggleSettings(){settingsOpen=!settingsOpen;document.getElementById('settings-panel').classList.toggle('open',settingsOpen);}
function updateSearchMode(){
  const isRepeat = document.getElementById('search-mode').value === 'repeat';
  document.getElementById('multi-count-group').classList.toggle('hidden', isRepeat);
  document.getElementById('repeat-count-group').classList.toggle('hidden', !isRepeat);
}

function updateElemType(){
  const v=document.getElementById('elem-type').value;
  document.getElementById('emoji-cat-group').classList.toggle('hidden',v!=='emoji');
  document.getElementById('jelek-cat-group').classList.toggle('hidden',v!=='jelek');
}

// ── RENDER KEY → DOM NODE ──
function renderKey(elemType,key){
  if(elemType==='emoji'){const s=document.createElement('span');s.textContent=key;return s;}
  if(elemType==='jelek'){return makeJelSVG(key);}
  const[col,sh]=key.split('_');return makeShapeSVG(col,sh);
}

function makeShapeSVG(colorId,shape){
  const hex=COLORS.find(c=>c.id===colorId)?.hex||'#888';
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');svg.setAttribute('viewBox','0 0 48 48');svg.classList.add('shape');
  let el;
  if(shape==='circle'){el=document.createElementNS(ns,'circle');el.setAttribute('cx','24');el.setAttribute('cy','24');el.setAttribute('r','20');}
  else if(shape==='square'){el=document.createElementNS(ns,'rect');el.setAttribute('x','4');el.setAttribute('y','4');el.setAttribute('width','40');el.setAttribute('height','40');el.setAttribute('rx','4');}
  else{el=document.createElementNS(ns,'polygon');el.setAttribute('points','24,4 44,44 4,44');}
  el.setAttribute('fill',hex);el.setAttribute('stroke','rgba(0,0,0,0.10)');el.setAttribute('stroke-width','1.5');
  svg.appendChild(el);return svg;
}

function makeJelSVG(key){
  const ns='http://www.w3.org/2000/svg',svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 48 48');svg.classList.add('shape');
  const lc='#1e293b',sw='4';
  const[cat,id]=key.split(':');
  const aL=(x1,y1,x2,y2)=>{const l=document.createElementNS(ns,'line');l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.setAttribute('stroke',lc);l.setAttribute('stroke-width',sw);l.setAttribute('stroke-linecap','round');svg.appendChild(l);};
  const aPL=(pts)=>{const p=document.createElementNS(ns,'polyline');p.setAttribute('points',pts);p.setAttribute('stroke',lc);p.setAttribute('stroke-width',sw);p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');svg.appendChild(p);};
  const aPG=(pts,f)=>{const p=document.createElementNS(ns,'polygon');p.setAttribute('points',pts);p.setAttribute('fill',f||lc);svg.appendChild(p);};
  const aC=(cx,cy,r)=>{const c=document.createElementNS(ns,'circle');c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);c.setAttribute('fill',lc);svg.appendChild(c);};
  const aPath=(d,fill,stroke)=>{const p=document.createElementNS(ns,'path');p.setAttribute('d',d);if(fill)p.setAttribute('fill',fill);if(stroke){p.setAttribute('stroke',lc);p.setAttribute('stroke-width',sw);p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');}svg.appendChild(p);};
  const aArr=(x1,y1,x2,y2)=>{aL(x1,y1,x2,y2);const a=Math.atan2(y2-y1,x2-x1),len=10;aL(x2,y2,Math.round(x2+len*Math.cos(a+Math.PI*.75)),Math.round(y2+len*Math.sin(a+Math.PI*.75)));aL(x2,y2,Math.round(x2+len*Math.cos(a-Math.PI*.75)),Math.round(y2+len*Math.sin(a-Math.PI*.75)));};
  const sPts=(cx,cy,o,i,n)=>{const p=[];for(let j=0;j<n*2;j++){const r=j%2===0?o:i,a=Math.PI/n*j-Math.PI/2;p.push(Math.round(cx+r*Math.cos(a))+','+Math.round(cy+r*Math.sin(a)));}return p.join(' ');};

  if(cat==='math'){
    if(id==='plus'){aL(24,8,24,40);aL(8,24,40,24);}
    else if(id==='minus')aL(8,24,40,24);
    else if(id==='times'){aL(10,10,38,38);aL(38,10,10,38);}
    else if(id==='div'){aL(8,24,40,24);aC(24,12,3.5);aC(24,36,3.5);}
    else if(id==='eq'){aL(8,18,40,18);aL(8,30,40,30);}
    else if(id==='lt')aPL('38,10 10,24 38,38');
    else if(id==='gt')aPL('10,10 38,24 10,38');
  } else if(cat==='geo'){
    if(id==='star')aPG(sPts(24,24,20,8,5));
    else if(id==='heart')aPath('M24,38 C24,38 6,26 6,16 C6,10 10,7 14,7 C18,7 22,10 24,13 C26,10 30,7 34,7 C38,7 42,10 42,16 C42,26 24,38 24,38 Z',lc);
    else if(id==='diamond')aPG('24,5 43,24 24,43 5,24');
    else if(id==='spade')aPath('M24,4 C24,4 6,16 6,26 C6,32 10,36 16,34 C14,38 12,42 8,43 L40,43 C36,42 34,38 32,34 C38,36 42,32 42,26 C42,16 24,4 24,4 Z',lc);
    else if(id==='club')aPath('M24,4 C20,4 17,7 17,11 C17,13 18,15 19,16 C16,15 12,15 10,18 C8,21 9,25 12,27 C15,29 19,28 21,26 C19,30 17,36 14,39 L34,39 C31,36 29,30 27,26 C29,28 33,29 36,27 C39,25 40,21 38,18 C36,15 32,15 29,16 C30,15 31,13 31,11 C31,7 28,4 24,4 Z',lc);
  } else if(cat==='arrow'){
    if(id==='left')aArr(40,24,8,24);
    else if(id==='right')aArr(8,24,40,24);
    else if(id==='up')aArr(24,40,24,8);
    else if(id==='down')aArr(24,8,24,40);
    else if(id==='nw')aArr(38,38,10,10);
    else if(id==='ne')aArr(10,38,38,10);
  } else if(cat==='basic'){
    if(id==='slash')aL(34,8,14,40);
    else if(id==='bslash')aL(14,8,34,40);
    else if(id==='pipe')aL(24,6,24,42);
    else if(id==='hash'){aL(16,8,12,40);aL(28,8,24,40);aL(7,18,41,18);aL(6,30,40,30);}
    else if(id==='at')aPath('M30,18 C28,14 24,12 20,14 C16,16 14,20 15,25 C16,30 20,33 25,32 C28,31 30,29 30,26 L30,18 M30,26 C30,30 33,33 37,32 C41,31 43,26 42,21 C40,13 33,8 25,8 C16,8 9,15 9,24 C9,33 16,40 25,40 C29,40 32,39 35,37',null,true);
    else if(id==='tilde')aPath('M8,24 C12,16 16,16 20,24 C24,32 28,32 32,24 C36,16 40,16 42,20',null,true);
  }
  return svg;
}

// ── BUILD POOL ──
function buildPool(elemType){
  const et=elemType;
  if(et==='emoji'){
    const cat=document.getElementById('emoji-cat').value;
    if(cat==='mixed')return shuffle([...EMOJI_POOLS.animals,...EMOJI_POOLS.plants,...EMOJI_POOLS.vehicles]);
    return [...EMOJI_POOLS[cat]];
  }
  if(et==='jelek'){
    const cat=document.getElementById('jelek-cat').value;
    if(cat==='all')return shuffle([...JELEK_POOLS.math,...JELEK_POOLS.geo,...JELEK_POOLS.arrow,...JELEK_POOLS.basic]);
    return [...JELEK_POOLS[cat]];
  }
  // shapes
  const keys=[];
  COLORS.forEach(c=>SHAPES_LIST.forEach(s=>keys.push(c.id+'_'+s)));
  return shuffle(keys);
}

// ── GENERATE PUZZLE ──
function generatePuzzle(){
  const elemType    = document.getElementById('elem-type').value;
  const gridSize    = parseInt(document.getElementById('grid-size').value);
  const seqLen      = parseInt(document.getElementById('seq-len').value);
  const targetCount = parseInt(document.getElementById('target-count').value);
  const direction   = document.getElementById('direction').value;
  const timeLimit   = parseInt(document.getElementById('time-limit').value);

  const pool = buildPool(elemType);
  if(pool.length < seqLen) return null;

  const searchMode = document.getElementById('search-mode').value;
  const repeatCount = parseInt(document.getElementById('repeat-count').value);

  // Build target sequences
  const targets = []; // each: {seq:[key,...], placement:{row,col,dir} | null}
  const shuffledPool = shuffle(pool);

  if(searchMode === 'repeat'){
    // One sequence, repeated N times
    const seq = shuffledPool.slice(0, seqLen);
    if(seq.length < seqLen){ return null; }
    for(let t=0; t<repeatCount; t++){
      targets.push({seq: [...seq], placement:null});
    }
  } else {
    // Multiple distinct sequences
    const usedInTargets = new Set();
    for(let t=0; t<targetCount; t++){
      const avail = shuffledPool.filter(k=>!usedInTargets.has(k));
      if(avail.length < seqLen) break;
      const seq = avail.slice(0, seqLen);
      seq.forEach(k=>usedInTargets.add(k));
      targets.push({seq, placement:null});
    }
  }

  // 2D grid
  const grid = Array.from({length:gridSize},()=>Array(gridSize).fill(null));

  // Place each target sequence in the grid
  targets.forEach(tgt=>{
    let placed=false, tries=0;
    while(!placed && tries<300){
      tries++;
      let dir;
      if(direction==='h') dir='h';
      else if(direction==='v') dir='v';
      else dir=Math.random()<.5?'h':'v';

      let r,c;
      if(dir==='h'){r=Math.floor(Math.random()*gridSize);c=Math.floor(Math.random()*(gridSize-seqLen+1));}
      else{r=Math.floor(Math.random()*(gridSize-seqLen+1));c=Math.floor(Math.random()*gridSize);}

      let ok=true;
      for(let i=0;i<seqLen;i++){
        const cr=dir==='h'?r:r+i, cc=dir==='h'?c+i:c;
        if(grid[cr][cc]!==null){ok=false;break;}
      }
      if(!ok) continue;

      for(let i=0;i<seqLen;i++){
        const cr=dir==='h'?r:r+i, cc=dir==='h'?c+i:c;
        grid[cr][cc]=tgt.seq[i];
      }
      tgt.placement={row:r,col:c,dir};
      placed=true;
    }
  });

  // Fill remaining with filler (ALL pool items allowed as filler, including re-use)
  const fillerPool = shuffle(pool);
  let fi=0;
  for(let r=0;r<gridSize;r++){
    for(let c=0;c<gridSize;c++){
      if(grid[r][c]===null){
        grid[r][c]=fillerPool[fi%fillerPool.length];
        fi++;
      }
    }
  }

  return {
    elemType, gridSize, seqLen, direction, timeLimit,
    targets,   // [{seq, placement:{row,col,dir}}]
    grid,      // [row][col] = key
    // per-placement found status
    found: new Array(targets.length).fill(false),
    totalFound: 0,
    totalToFind: targets.filter(t=>t.placement!==null).length,
    // cells marked by user: Map of "r,c" -> 'marked'|'correct'|'wrong'
    markedCells: new Map(),
    phase: 'playing',
    timeLeft: timeLimit,
  };
}

// ── START ──
function startGame(){
  clearInterval(timerInterval);
  sel=null;

  const puzzle=generatePuzzle();
  if(!puzzle){alert('Nincs elég elem ehhez a beállításhoz!');return;}
  GS=puzzle;

  // UI
  ['result-banner'].forEach(id=>{const e=document.getElementById(id);e.style.display='none';e.classList.remove('show');});
  document.getElementById('start-btn').textContent='🔄 Új játék';
  document.getElementById('start-btn').classList.remove('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  document.getElementById('check-btn').classList.remove('hidden');
  ['target-strip','dir-hint','search-section'].forEach(id=>document.getElementById(id).classList.remove('hidden'));
  document.getElementById('counter-row').classList.add('hidden');
  document.getElementById('progress-wrap').classList.add('hidden');
  document.getElementById('progress-fill').style.width='0%';

  const dmap={h:'→ Vízszintes keresés',v:'↓ Függőleges keresés',both:'→ vagy ↓ keresés'};
  document.getElementById('dir-hint').textContent=dmap[GS.direction];

  renderTargetStrip();
  updateCounter();
  renderGrid();

  if(GS.timeLimit>0){
    document.getElementById('timer-bar').classList.remove('hidden');
    GS.timeLeft=GS.timeLimit;
    updateTimer();
    timerInterval=setInterval(tickTimer,1000);
  } else {
    document.getElementById('timer-bar').classList.add('hidden');
  }

  setStatus(`Kattints az első elemre, majd haladj a sorozat irányában!`);
}

function tickTimer(){
  if(GS.phase!=='playing'){clearInterval(timerInterval);return;}
  GS.timeLeft--;
  updateTimer();
  if(GS.timeLeft<=0){clearInterval(timerInterval);triggerCheck();}
}
function updateTimer(){
  const d=document.getElementById('timer-display');
  d.textContent=GS.timeLeft+' mp';
  d.classList.toggle('warning',GS.timeLeft<=10);
}

function updateCounter(){
  const b=document.getElementById('counter-badge');
  b.textContent=`${GS.totalFound} / ${GS.totalToFind} sorozat megtalálva`;
  b.classList.toggle('done',GS.totalFound>=GS.totalToFind);
  document.getElementById('progress-fill').style.width=(GS.totalFound/GS.totalToFind*100)+'%';
}

// ── RENDER TARGET STRIP ──
function renderTargetStrip(){
  const c=document.getElementById('target-sequences');
  c.innerHTML='';
  // In repeat mode all targets share the same seq — show only once + "× N"
  const searchMode = document.getElementById('search-mode').value;
  const seqsToShow = searchMode === 'repeat' ? [GS.targets[0]] : GS.targets;

  seqsToShow.forEach((tgt,ti)=>{
    const wrap=document.createElement('div');wrap.className='target-seq';
    tgt.seq.forEach((key,ki)=>{
      if(ki>0){const a=document.createElement('span');a.className='target-arrow';a.textContent=GS.direction==='v'?'↓':'→';wrap.appendChild(a);}
      const cell=document.createElement('div');cell.className='target-cell';
      cell.appendChild(renderKey(GS.elemType,key));wrap.appendChild(cell);
    });
    // repeat count badge hidden during play
    c.appendChild(wrap);
  });
}

// ── RENDER GRID ──
function renderGrid(){
  const gridEl=document.getElementById('search-grid');
  const sz=GS.gridSize;
  const maxW=Math.min(660,window.innerWidth-40);
  const cs=Math.floor((maxW-28-(sz-1)*5)/sz);

  gridEl.style.gridTemplateColumns=`repeat(${sz},${cs}px)`;
  gridEl.innerHTML='';

  for(let r=0;r<sz;r++){
    for(let c=0;c<sz;c++){
      const key=GS.grid[r][c];
      const cell=document.createElement('div');
      cell.className='grid-cell';
      cell.style.width=cs+'px';cell.style.height=cs+'px';
      cell.style.fontSize=Math.floor(cs*.5)+'px';
      cell.dataset.r=r;cell.dataset.c=c;
      const inner=renderKey(GS.elemType,key);
      if(inner.tagName==='svg'){inner.style.width=Math.floor(cs*.6)+'px';inner.style.height=Math.floor(cs*.6)+'px';}
      cell.appendChild(inner);
      cell.addEventListener('click',()=>onCellClick(r,c));
      gridEl.appendChild(cell);
    }
  }
}

function getCell(r,c){return document.querySelector(`.grid-cell[data-r="${r}"][data-c="${c}"]`);}

// ── CELL CLICK ──
function onCellClick(r,c){
  if(GS.phase!=='playing') return;
  const cellEl=getCell(r,c);
  if(!cellEl) return;

  // If cell already correctly found: ignore
  // allow re-clicking marked cells to unmark them (handled below)

  // If cell is marked (neutral): click again to unmark
  const cellState=GS.markedCells.get(`${r},${c}`);
  if(cellState==='marked'||cellState==='seq-correct'){
    GS.markedCells.delete(`${r},${c}`);
    cellEl.classList.remove('marked');
    // If this was part of a correct sequence, undo the found count
    if(cellState==='seq-correct'){
      // find which target placement this cell belonged to and un-found it
      GS.targets.forEach((tgt,ti)=>{
        if(!GS.found[ti]||!tgt.placement) return;
        const {row,col,dir}=tgt.placement;
        for(let i=0;i<GS.seqLen;i++){
          const tr=dir==='h'?row:row+i,tc=dir==='h'?col+i:col;
          if(tr===r&&tc===c){GS.found[ti]=false;GS.totalFound=Math.max(0,GS.totalFound-1);}
        }
      });
    }
    cancelSel();
    return;
  }

  if(!sel){
    // Start new selection
    cancelSel();
    sel=[{r,c}];
    cellEl.classList.add('sel-start');
    setStatus(`1 / ${GS.seqLen} – Kattints a következő szomszéd cellára!`);
    return;
  }

  // Extend selection: must be adjacent to last cell in correct direction
  const last=sel[sel.length-1];
  const dr=r-last.r, dc=c-last.c;
  const firstDir=sel.length>=2 ? {dr:sel[1].r-sel[0].r, dc:sel[1].c-sel[0].c} : null;

  // Check step is a single step
  const isStep=(dr===0&&dc===1)||(dr===1&&dc===0)||(dr===0&&dc===-1)||(dr===-1&&dc===0);
  if(!isStep){
    // Not adjacent: restart
    cancelSel();
    sel=[{r,c}];
    cellEl.classList.add('sel-start');
    setStatus(`1 / ${GS.seqLen} – Nem szomszédos! Újrakezdve.`);
    return;
  }

  // If direction is constrained, enforce it
  if(GS.direction==='h' && dr!==0){cancelSel();sel=[{r,c}];cellEl.classList.add('sel-start');setStatus(`Csak vízszintesen!`);return;}
  if(GS.direction==='v' && dc!==0){cancelSel();sel=[{r,c}];cellEl.classList.add('sel-start');setStatus(`Csak függőlegesen!`);return;}

  // If we already have 2+ cells, must continue in same direction
  if(firstDir && (dr!==firstDir.dr || dc!==firstDir.dc)){
    cancelSel();sel=[{r,c}];cellEl.classList.add('sel-start');
    setStatus(`Irányváltás! Újrakezdve.`);return;
  }

  sel.push({r,c});
  cellEl.classList.remove('sel-start');
  sel.forEach(({r:sr,c:sc},i)=>{
    const ce=getCell(sr,sc);
    if(ce){ce.classList.remove('sel-start','sel-cont');ce.classList.add(i===0?'sel-start':'sel-cont');}
  });
  setStatus(`${sel.length} / ${GS.seqLen} kijelölve`);

  if(sel.length===GS.seqLen) evaluateSel();
}

function cancelSel(){
  if(!sel) return;
  sel.forEach(({r,c})=>{
    const ce=getCell(r,c);
    if(ce) ce.classList.remove('sel-start','sel-cont');
  });
  sel=null;
}

function evaluateSel(){
  const cells=[...sel];
  sel=null;
  const keys=cells.map(({r,c})=>GS.grid[r][c]);

  // Find matching unfound target
  let matchIdx=-1;
  GS.targets.forEach((tgt,ti)=>{
    if(GS.found[ti]) return;
    if(!tgt.placement) return;
    const {row,col,dir}=tgt.placement;
    // Build expected cells for this placement
    const expected=tgt.seq.map((k,i)=>({
      r:dir==='h'?row:row+i,
      c:dir==='h'?col+i:col,
    }));
    // Check keys match AND positions match
    const keysOk=keys.every((k,i)=>k===tgt.seq[i]);
    const posOk=cells.every(({r,c},i)=>c===expected[i].c && r===expected[i].r);
    if(keysOk && posOk) matchIdx=ti;
  });

  // Remove sel highlighting
  cells.forEach(({r,c})=>{
    const ce=getCell(r,c);
    if(ce) ce.classList.remove('sel-start','sel-cont');
  });

  // Both correct and wrong: mark neutrally, only reveal at check
  // Store match status internally
  if(matchIdx>=0){
    GS.found[matchIdx]=true;
    GS.totalFound++;
  }
  cells.forEach(({r,c})=>{
    // Don't re-mark already-marked cells (unless they were part of a correct find)
    const existing=GS.markedCells.get(`${r},${c}`);
    if(existing==='seq-correct') return;
    const state=matchIdx>=0?'seq-correct':'marked';
    GS.markedCells.set(`${r},${c}`,state);
    const ce=getCell(r,c);
    if(ce){ce.classList.remove('sel-start','sel-cont','marked');ce.classList.add('marked');}
  });
  setStatus(matchIdx>=0
    ? 'Jelölve! Folytasd a keresést – ellenőrzéskor kiderül!'
    : 'Jelölve! Próbálj máshol is. (Kattintás = töröl)');
}

// ── CHECK ──
function checkAnswers(){
  if(GS.phase!=='playing') return;
  triggerCheck();
}

function triggerCheck(){
  clearInterval(timerInterval);
  GS.phase='done';
  cancelSel();
  document.getElementById('check-btn').classList.add('hidden');

  let wrongCells=0, missedSeqs=0;

  // First pass: mark all correctly-found placements green
  GS.targets.forEach((tgt,ti)=>{
    if(!GS.found[ti]||!tgt.placement) return;
    const {row,col,dir}=tgt.placement;
    for(let i=0;i<GS.seqLen;i++){
      const r=dir==='h'?row:row+i, c=dir==='h'?col+i:col;
      const ce=getCell(r,c);
      if(ce){ce.classList.remove('marked');ce.classList.add('correct');}
    }
  });

  // Second pass: reveal missed placements in orange
  GS.targets.forEach((tgt,ti)=>{
    if(GS.found[ti]) return;
    if(!tgt.placement) return;
    const {row,col,dir}=tgt.placement;
    for(let i=0;i<GS.seqLen;i++){
      const r=dir==='h'?row:row+i, c=dir==='h'?col+i:col;
      const ce=getCell(r,c);
      if(ce){ce.classList.remove('marked');ce.classList.add('missed');}
    }
    missedSeqs++;
  });

  // Third pass: mark wrongly-selected cells red
  GS.markedCells.forEach((state,key)=>{
    if(state!=='marked') return;  // 'seq-correct' already handled or 'marked'=wrong
    const[r,c]=key.split(',').map(Number);
    const ce=getCell(r,c);
    if(!ce) return;
    if(ce.classList.contains('correct')||ce.classList.contains('missed')) return;
    ce.classList.remove('marked');
    ce.classList.add('wrong');
    wrongCells++;
  });

  const correct=GS.totalFound, total=GS.totalToFind;
  document.getElementById('counter-row').classList.remove('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('progress-fill').style.width=(correct/total*100)+'%';
  updateCounter();
  let icon,text,sub;
  if(correct===total&&wrongCells===0){icon='🎉';text='Tökéletes!';sub=`${correct}/${total} sorozat, 0 téves jelölés`;}
  else if(correct>=Math.ceil(total*.6)){icon='👍';text='Szép munka!';sub=`${correct}/${total} sorozat, ${wrongCells} téves cella, ${missedSeqs} kihagyott`;}
  else{icon='🙈';text='Próbáld újra!';sub=`${correct}/${total} – narancs = kihagyott sorozat`;}

  setStatus(icon+' '+text);
  document.getElementById('result-text').textContent=icon+' '+text;
  document.getElementById('result-sub').textContent=sub;
  const b=document.getElementById('result-banner');b.style.display='block';b.classList.add('show');
  document.getElementById('next-btn').classList.remove('hidden');
  document.getElementById('start-btn').classList.add('hidden');
}

function finishGame(){
  GS.phase='done';
  clearInterval(timerInterval);
  document.getElementById('check-btn').classList.add('hidden');
  setStatus('🎉 Szuper! Mindent megtaláltál!');
  spawnStars(window.innerWidth/2,window.innerHeight/3,5);
  document.getElementById('result-text').textContent='🎉 Szuper! Mindent megtaláltál!';
  document.getElementById('result-sub').textContent=`${GS.totalFound}/${GS.totalToFind} sorozat`+(GS.timeLimit>0?` – ${GS.timeLimit-GS.timeLeft} mp alatt`:'');
  const b=document.getElementById('result-banner');b.style.display='block';b.classList.add('show');
  document.getElementById('next-btn').classList.remove('hidden');
  document.getElementById('start-btn').classList.add('hidden');
}
</script>
