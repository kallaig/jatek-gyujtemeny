<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #arena {
    flex: 1;
    display: flex;
    gap: 6px;
    padding: 6px 6px 0 6px;
  }
  .panel {
    flex: 1;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #222;
    transition: background-color 0.08s ease;
  }
  .hand-svg {
    width: min(40vw, 44vh);
    height: min(40vw, 44vh);
    opacity: 0;
    transition: opacity 0.1s ease;
  }
  .panel.lit .hand-svg { opacity: 1; }
  #controls {
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 0 24px;
  }
  #speed-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    max-width: 400px;
    height: 10px;
    border-radius: 5px;
    background: #333;
    outline: none;
    cursor: pointer;
  }
  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #eee;
    cursor: pointer;
  }
  #speed-slider::-moz-range-thumb {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #eee;
    cursor: pointer;
    border: none;
  }
  #stop-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    background: #e74c3c;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 14px rgba(231,76,60,0.5);
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  }
  #stop-btn:hover { transform: scale(1.08); }
  #stop-btn:active { transform: scale(0.95); }
  #stop-btn svg { width: 22px; height: 22px; fill: white; }
</style>
</head>
<body>
<!-- back-btn -->
<style>
.back-btn {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 9999;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 2px solid rgba(0,0,0,0.08);
  border-radius: 50px;
  padding: 8px 16px 8px 12px;
  font-family: sans-serif;
  font-size: 0.85rem;
  font-weight: 900;
  color: #333;
  text-decoration: none;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  transition: transform 0.15s, box-shadow 0.15s;
}
.back-btn:hover {
  transform: translateX(-3px);
  box-shadow: 0 5px 18px rgba(0,0,0,0.18);
}
</style>
<a class="back-btn" href="../index.html">← Vissza</a>


<div id="arena">
  <div class="panel" id="left">
    <svg class="hand-svg" id="left-hand" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="panel" id="right">
    <svg class="hand-svg" id="right-hand" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div id="controls">
  <input type="range" id="speed-slider" min="0" max="100" value="50">
  <button id="stop-btn">
    <svg id="btn-icon" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
  </button>
</div>

<script>
// buildHand(thumbRight):
//   thumbRight=true  → hüvelykujj jobb oldalon
//   thumbRight=false → hüvelykujj bal oldalon (tükrözött)
//
// Alaphelyzet (hüvelykujjak egymás felé):
//   bal panel:  thumbRight=true  (hüvelyk jobbra, azaz a középvonal felé)
//   jobb panel: thumbRight=false (hüvelyk balra, azaz a középvonal felé)
//
// Keresztezett:
//   bal panel:  thumbRight=false
//   jobb panel: thumbRight=true

function buildHand(thumbRight) {
  const sw = 5;
  const mirror = !thumbRight; // ha thumb bal oldalon kell → tükrözés
  const flip = mirror ? 'transform="scale(-1,1) translate(-120,0)"' : '';

  return `
<g ${flip}>
  <!-- Palm -->
  <rect x="22" y="68" width="76" height="58" rx="18" ry="18"
        fill="white" stroke="white" stroke-width="${sw}"/>

  <!-- Pinky (bal oldal) -->
  <rect x="22" y="32" width="16" height="46" rx="8" ry="8"
        fill="white" stroke="white" stroke-width="${sw}"/>

  <!-- Ring finger -->
  <rect x="42" y="20" width="16" height="58" rx="8" ry="8"
        fill="white" stroke="white" stroke-width="${sw}"/>

  <!-- Middle finger -->
  <rect x="62" y="14" width="16" height="64" rx="8" ry="8"
        fill="white" stroke="white" stroke-width="${sw}"/>

  <!-- Index finger (jobb oldal) -->
  <rect x="82" y="22" width="16" height="56" rx="8" ry="8"
        fill="white" stroke="white" stroke-width="${sw}"/>

  <!-- Thumb (jobb alsó sarok) -->
  <ellipse cx="108" cy="92" rx="10" ry="22"
           transform="rotate(30 108 92)"
           fill="white" stroke="white" stroke-width="${sw}"/>
</g>`;
}

// ─── App ──────────────────────────────────────────────────────────
const COLORS = ['#2ecc71', '#ff4757', '#ffd32a', '#1e90ff'];

const leftPanel  = document.getElementById('left');
const rightPanel = document.getElementById('right');
const leftSVG    = document.getElementById('left-hand');
const rightSVG   = document.getElementById('right-hand');
const slider     = document.getElementById('speed-slider');
const stopBtn    = document.getElementById('stop-btn');
const btnIcon    = document.getElementById('btn-icon');

let leftPrev = null, rightPrev = null;
let timer = null, running = true, flashCount = 0;

const STOP_ICON = '<rect x="5" y="5" width="14" height="14" rx="2"/>';
const PLAY_ICON = '<polygon points="6,4 20,12 6,20"/>';

function getInterval(val) {
  return Math.round(10000 - (val - 1) * (9920 / 99));
}

function pickColor(exclude) {
  const opts = COLORS.filter(c => c !== exclude);
  return opts[Math.floor(Math.random() * opts.length)];
}

function crossProbability() {
  if (flashCount <= 10) return 0;
  return Math.min(0.5, (flashCount - 10) * 0.02);
}

function flash() {
  flashCount++;
  const lColor = pickColor(leftPrev);
  const rColor = pickColor(rightPrev);
  const crossed = Math.random() < crossProbability();

  leftPanel.classList.remove('lit');
  rightPanel.classList.remove('lit');

  setTimeout(() => {
    leftPanel.style.backgroundColor  = lColor;
    rightPanel.style.backgroundColor = rColor;

    if (crossed) {
      // hüvelykujjak kifelé néznek
      leftSVG.innerHTML  = buildHand(false); // hüvelyk bal
      rightSVG.innerHTML = buildHand(true);  // hüvelyk jobb
    } else {
      // hüvelykujjak egymás felé néznek (alaphelyzet)
      leftSVG.innerHTML  = buildHand(true);  // hüvelyk jobb (középvonal felé)
      rightSVG.innerHTML = buildHand(false); // hüvelyk bal  (középvonal felé)
    }

    leftPanel.classList.add('lit');
    rightPanel.classList.add('lit');
  }, 60);

  leftPrev  = lColor;
  rightPrev = rColor;
}

function doStop() {
  if (timer) clearInterval(timer);
  timer = null;
  leftPanel.classList.remove('lit');
  rightPanel.classList.remove('lit');
  leftPanel.style.backgroundColor  = '#222';
  rightPanel.style.backgroundColor = '#222';
  leftPrev = null; rightPrev = null;
  running = false;
  stopBtn.style.background = '#27ae60';
  stopBtn.style.boxShadow = '0 0 14px rgba(39,174,96,0.5)';
  btnIcon.innerHTML = PLAY_ICON;
}

function doPlay() {
  running = true;
  stopBtn.style.background = '#e74c3c';
  stopBtn.style.boxShadow = '0 0 14px rgba(231,76,60,0.5)';
  btnIcon.innerHTML = STOP_ICON;
  startTimer();
}

function startTimer() {
  if (timer) clearInterval(timer);
  const val = parseInt(slider.value);
  if (val === 0) { doStop(); return; }
  flash();
  timer = setInterval(flash, getInterval(val));
}

stopBtn.addEventListener('click', () => { if (running) doStop(); else doPlay(); });
slider.addEventListener('input', () => { if (!running) doPlay(); else startTimer(); });

doPlay();
</script>
</body>
</html>
