<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forma Párosító</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8f0;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 18px;
    --accent: #f97316;
    --accent-dark: #ea580c;
    --cell: 70px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 8% 12%,  rgba(251,146,60,0.13) 0%, transparent 40%),
      radial-gradient(circle at 92% 88%, rgba(250,204,21,0.12) 0%, transparent 40%),
      radial-gradient(circle at 55% 45%, rgba(249,115,22,0.07) 0%, transparent 50%);
    overflow-x: hidden;
  }

  header { text-align: center; padding: 20px 16px 6px; }

  .logo {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900; color: var(--accent-dark);
    letter-spacing: -0.5px;
  }

  .subtitle { font-size: 14px; color: #64748b; font-weight: 600; margin-top: 3px; }

  /* ── SETTINGS ── */
  .top-bar {
    max-width: 700px; margin: 10px auto 0;
    padding: 0 14px; display: flex; justify-content: flex-end;
  }

  .settings-toggle-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700; padding: 7px 16px;
    border: 2px solid #fed7aa; border-radius: 50px; cursor: pointer;
    background: white; color: #64748b;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.2s;
  }
  .settings-toggle-btn:hover { border-color: var(--accent); color: var(--accent-dark); }

  .settings-panel {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); max-width: 700px;
    margin: 8px auto 0; overflow: hidden;
    max-height: 0; transition: max-height 0.35s ease, padding 0.3s ease;
    padding: 0 22px;
  }
  .settings-panel.open { max-height: 340px; padding: 18px 22px; }

  .settings-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }

  .setting-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }

  .setting-group label {
    font-size: 11px; font-weight: 800; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .setting-group select {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700; color: #334155;
    background: #f8fafc; border: 2px solid #e2e8f0;
    border-radius: 11px; padding: 7px 11px;
    cursor: pointer; outline: none; transition: border-color 0.2s;
  }
  .setting-group select:focus { border-color: var(--accent); }

  /* ── STATUS ── */
  .game-container { max-width: 700px; margin: 0 auto; padding: 12px 14px 50px; }

  .status-bar {
    background: white; border-radius: var(--radius);
    padding: 12px 18px; margin-bottom: 14px;
    box-shadow: var(--shadow); text-align: center;
  }
  .status-msg { font-size: 16px; font-weight: 800; color: #334155; }

  /* ── MAIN PLAY AREA ── */
  .play-area { display: flex; gap: 14px; align-items: flex-start; }

  .shown-panel, .answer-panel, .palette-panel {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 12px;
  }
  .shown-panel  { flex: 0 0 auto; min-width: 0; }
  .answer-panel { flex: 0 0 auto; min-width: 0; }
  .palette-panel { flex: 1 1 auto; min-width: 90px; }

  .panel-label {
    font-size: 11px; font-weight: 800; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.5px;
    text-align: center; margin-bottom: 10px;
  }

  .shown-col, .answer-col, .palette-col {
    display: flex; flex-direction: column; gap: 8px; align-items: center;
  }

  /* ── CELLS ── */
  .shape-cell {
    width: var(--cell); height: var(--cell);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.18s; position: relative;
  }

  svg.shape { width: 36px; height: 36px; display: block; }
  svg.shape.large { width: 52px; height: 52px; }

  .shown-cell {
    background: linear-gradient(135deg, #fff7ed, #ffedd5);
    border: 3px solid #fdba74;
  }

  .answer-slot {
    background: #f8fafc;
    border: 3px dashed #cbd5e1; cursor: pointer;
  }
  .answer-slot:hover { border-color: var(--accent); background: #fff7ed; }
  .answer-slot.filled {
    background: linear-gradient(135deg, #fef9c3, #fef3c7);
    border: 3px solid #facc15; cursor: pointer;
  }
  .answer-slot.correct {
    background: linear-gradient(135deg, #d1fae5, #a7f3d0) !important;
    border: 3px solid #22c55e !important;
    animation: celebrate 0.4s ease;
  }
  .answer-slot.wrong {
    background: linear-gradient(135deg, #fee2e2, #fca5a5) !important;
    border: 3px solid #ef4444 !important;
    animation: shake 0.4s ease;
  }

  .palette-btn {
    width: var(--cell); height: var(--cell);
    border-radius: 14px; border: 3px solid #e2e8f0;
    background: #f8fafc;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .palette-btn:hover {
    transform: scale(1.08); border-color: var(--accent);
    background: #fff7ed; box-shadow: 0 4px 14px rgba(249,115,22,0.2);
  }
  .palette-btn.selected {
    border-color: var(--accent-dark); background: #ffedd5;
    outline: 3px solid var(--accent); outline-offset: 2px;
    transform: scale(1.06);
  }

  .row-num {
    position: absolute; top: 3px; left: 6px;
    font-size: 11px; font-weight: 900; color: #94a3b8; line-height: 1;
  }

  /* ── RESULT ── */
  .result-banner {
    background: white; border-radius: var(--radius); padding: 16px;
    text-align: center; box-shadow: var(--shadow);
    margin-top: 14px; display: none;
  }
  .result-banner.show { display: block; animation: slideDown 0.3s ease; }
  .result-text { font-size: 21px; font-weight: 900; color: #334155; margin-bottom: 4px; }
  .result-sub  { font-size: 14px; font-weight: 600; color: #64748b; }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }

  .btn {
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    padding: 12px 26px; border: none; border-radius: 50px;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(0,0,0,0.09);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.14); }
  .btn:active { transform: translateY(0); }
  .btn-start { background: linear-gradient(135deg, #f97316, #facc15); color: white; }
  .btn-check { background: linear-gradient(135deg, #22c55e, #4ecdc4); color: white; }
  .btn-clear { background: #f1f5f9; color: #64748b; border: 2px solid #e2e8f0; }
  .btn-next  { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }

  /* ── ANIMATIONS ── */
  @keyframes celebrate { 0%,100%{transform:scale(1)} 50%{transform:scale(1.16) rotate(4deg)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { 0%{transform:scale(0.4);opacity:0} 100%{transform:scale(1);opacity:1} }

  .animate-in { animation: popIn 0.26s cubic-bezier(0.34,1.56,0.64,1); }

  .star {
    position: fixed; pointer-events: none; font-size: 22px;
    animation: floatStar 1.4s ease-out forwards; z-index: 200;
  }
  @keyframes floatStar {
    0%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:0;transform:translateY(-80px) scale(0.5)}
  }

  @media (max-width: 480px) {
    :root { --cell: 58px; }
    svg.shape { width: 36px; height: 36px; }
    .shape-cell { border-radius: 12px; }
    .palette-btn { border-radius: 12px; }
  }
  @media (max-width: 360px) {
    :root { --cell: 50px; }
    svg.shape { width: 30px; height: 30px; }
  }

  /* ── STYLE TOGGLE BUTTONS ── */
  .style-toggles {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }

  .style-toggle {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 800;
    padding: 6px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 50px;
    cursor: pointer;
    background: #f8fafc;
    color: #64748b;
    transition: all 0.15s;
    user-select: none;
  }

  .style-toggle:hover { border-color: var(--accent); color: var(--accent-dark); }

  .style-toggle.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 2px 8px rgba(249,115,22,0.35);
  }

  .hidden { display: none !important; }
</style>
</head>

<header>
  <div class="logo">🔷 Forma Párosító</div>
  <div class="subtitle">Találd meg a párját!</div>
</header>

<div class="top-bar">
  <button class="settings-toggle-btn" onclick="toggleSettings()">⚙️ Beállítások</button>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="settings-row">
    <div class="setting-group">
      <label>Mód</label>
      <select id="game-mode">
        <option value="color">Szín</option>
        <option value="shape">Forma</option>
        <option value="mixed" selected>Vegyes</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Képek száma</label>
      <select id="item-count">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Zavaró elemek</label>
      <select id="extra-count">
        <option value="0">Nincs</option>
        <option value="2" selected>+2 extra</option>
        <option value="4">+4 extra</option>
        <option value="6">+6 extra</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Stílus (több is választható)</label>
      <div class="style-toggles">
        <div class="style-toggle active" data-size="normal" onclick="toggleSize(this)">Normál</div>
        <div class="style-toggle" data-size="large" onclick="toggleSize(this)">Nagy</div>
        <div class="style-toggle" data-size="hollow" onclick="toggleSize(this)">Lyukas</div>
      </div>
    </div>
  </div>
</div>

<div class="game-container">

  <div class="status-bar">
    <div class="status-msg" id="status-msg">Nyomj a Start gombra!</div>
  </div>

  <div class="play-area" id="play-area" style="display:none">
    <div class="shown-panel">
      <div class="panel-label">Ezt láttad</div>
      <div class="shown-col" id="shown-col"></div>
    </div>
    <div class="answer-panel">
      <div class="panel-label">Ide rakd!</div>
      <div class="answer-col" id="answer-col"></div>
    </div>
    <div class="palette-panel">
      <div class="panel-label">Válassz!</div>
      <div class="palette-col" id="palette-col"></div>
    </div>
  </div>

  <div class="result-banner" id="result-banner">
    <div class="result-text" id="result-text"></div>
    <div class="result-sub"  id="result-sub"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="start-btn" onclick="startGame()">🚀 Start</button>
    <button class="btn btn-check hidden" id="check-btn" onclick="checkAnswer()">Ellenőrzés</button>
    <button class="btn btn-clear hidden" id="clear-btn" onclick="clearAnswers()">Töröl</button>
    <button class="btn btn-next  hidden" id="next-btn"  onclick="startGame()">Következő ▶</button>
  </div>

</div>

<script>
// ── CONFIG ──
const COLORS = [
  { id: 'red',    hex: '#ef4444' },
  { id: 'yellow', hex: '#facc15' },
  { id: 'green',  hex: '#22c55e' },
  { id: 'blue',   hex: '#3b82f6' },
];

const SHAPES = ['circle', 'square', 'triangle'];
const SIZES  = ['normal', 'large', 'hollow'];

// Key format: "colorId_shapeId_sizeId"
// color mode: shape=circle, size from setting
// shape mode: color=blue,   size from setting
// mixed mode: all three vary

function allKeys(mode, sizeMode) {
  // sizeMode is now an array of selected sizes
  const sizes = Array.isArray(sizeMode) ? sizeMode : [sizeMode];
  let colorShapePairs = [];
  if (mode === 'color') {
    colorShapePairs = COLORS.map(c => [c.id, 'circle']);
  } else if (mode === 'shape') {
    colorShapePairs = SHAPES.map(s => ['blue', s]);
  } else {
    COLORS.forEach(c => SHAPES.forEach(s => colorShapePairs.push([c.id, s])));
  }
  const keys = [];
  colorShapePairs.forEach(([c, s]) => sizes.forEach(sz => keys.push(c + '_' + s + '_' + sz)));
  return keys;
}

// ── SVG ──
// key = "colorId_shapeId_sizeId"
function makeSVG(colorId, shape, size) {
  const hex    = COLORS.find(c => c.id === colorId)?.hex || '#888';
  const ns     = 'http://www.w3.org/2000/svg';
  const svg    = document.createElementNS(ns, 'svg');
  const isLarge  = size === 'large';
  const isHollow = size === 'hollow';

  svg.setAttribute('viewBox', '0 0 48 48');
  svg.classList.add('shape');
  if (isLarge) svg.classList.add('large');

  // scale factor: large shapes fill more of viewBox
  const scale = isLarge ? 1.15 : 1.0;

  let mainEl;
  if (shape === 'circle') {
    mainEl = document.createElementNS(ns, 'circle');
    const r = Math.round(20 * scale);
    mainEl.setAttribute('cx', '24'); mainEl.setAttribute('cy', '24');
    mainEl.setAttribute('r', String(r));
  } else if (shape === 'square') {
    mainEl = document.createElementNS(ns, 'rect');
    const margin = Math.round(4 / scale);
    const size48 = 48 - margin * 2;
    mainEl.setAttribute('x', String(margin)); mainEl.setAttribute('y', String(margin));
    mainEl.setAttribute('width', String(size48)); mainEl.setAttribute('height', String(size48));
    mainEl.setAttribute('rx', '4');
  } else { // triangle
    if (isLarge) {
      mainEl = document.createElementNS(ns, 'polygon');
      mainEl.setAttribute('points', '24,2 46,46 2,46');
    } else {
      mainEl = document.createElementNS(ns, 'polygon');
      mainEl.setAttribute('points', '24,4 44,44 4,44');
    }
  }
  mainEl.setAttribute('fill', hex);
  mainEl.setAttribute('stroke', 'rgba(0,0,0,0.10)');
  mainEl.setAttribute('stroke-width', '1.5');
  svg.appendChild(mainEl);

  // hollow: white circle cutout in center
  if (isHollow) {
    const hole = document.createElementNS(ns, 'circle');
    const holeCy = shape === 'triangle' ? '31' : '24';
    hole.setAttribute('cx', '24');
    hole.setAttribute('cy', holeCy);
    hole.setAttribute('r', shape === 'circle' ? '9' : '8');
    hole.setAttribute('fill', 'white');
    svg.appendChild(hole);
  }

  return svg;
}

function svgFromKey(key) {
  const parts = key.split('_');
  // key: colorId_shapeId_sizeId  (size may be 'normal','large','hollow')
  // colorId and shapeId don't contain underscore… except 'blue' etc. Safe split:
  const sizeId  = parts[parts.length - 1];
  const shapeId = parts[parts.length - 2];
  const colorId = parts.slice(0, parts.length - 2).join('_');
  return makeSVG(colorId, shapeId, sizeId);
}

// ── STATE ──
let gameState = {};
let answerSlots = [];
let selectedPaletteIdx = null;
let settingsOpen = false;

// ── UTILS ──
function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function setStatus(m) { document.getElementById('status-msg').textContent = m; }

function spawnStars(x, y, n) {
  ['⭐','🌟','✨','💫'].slice(0,n).forEach((s,i) => {
    const el = document.createElement('div');
    el.className = 'star'; el.textContent = s;
    el.style.left = (x+(Math.random()-.5)*70)+'px';
    el.style.top  = (y+(Math.random()-.5)*30)+'px';
    el.style.animationDelay = (i*0.1)+'s';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  });
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-panel').classList.toggle('open', settingsOpen);
}

// ── START ──
function startGame() {
  const mode       = document.getElementById('game-mode').value;
  const itemCount  = parseInt(document.getElementById('item-count').value);
  const extraCount = parseInt(document.getElementById('extra-count').value);
  const selectedSizes = [...document.querySelectorAll('.style-toggle.active')].map(el => el.dataset.size);
  const sizeMode = selectedSizes.length === 0 ? ['normal'] : selectedSizes;

  const pool = allKeys(mode, sizeMode);

  // Pick a base set (smaller than itemCount so repetition is natural)
  const baseSize = Math.min(Math.max(2, Math.ceil(itemCount * 0.7)), itemCount, pool.length);
  const baseSet  = pick(pool, baseSize);

  // Build shown sequence (repetitions allowed)
  const shownSeq = [];
  for (let i = 0; i < itemCount; i++) {
    shownSeq.push(baseSet[Math.floor(Math.random() * baseSet.length)]);
  }

  // Palette: unique shown items + extras
  const shownUnique = [...new Set(shownSeq)];
  const extrasPool  = pool.filter(k => !shownUnique.includes(k));
  const extras      = pick(extrasPool, Math.min(extraCount, extrasPool.length));
  const palette     = shuffle([...shownUnique, ...extras]);

  gameState = { mode, sizeMode, itemCount, shownSeq, palette, phase: 'playing' };
  answerSlots = Array(itemCount).fill(null);
  selectedPaletteIdx = null;

  document.getElementById('result-banner').classList.remove('show');
  document.getElementById('play-area').style.display = 'flex';
  document.getElementById('check-btn').classList.remove('hidden');
  document.getElementById('clear-btn').classList.remove('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  const startBtn = document.getElementById('start-btn');
  startBtn.textContent = '🔄 Új játék';
  startBtn.classList.remove('hidden');

  renderShown(shownSeq);
  renderAnswerSlots(itemCount);
  renderPalette(palette);

  setStatus('Keresd meg a párját minden formának!');
}

// ── RENDER SHOWN ──
function renderShown(seq) {
  const col = document.getElementById('shown-col');
  col.innerHTML = '';
  seq.forEach((key, i) => {
    const cell = document.createElement('div');
    cell.className = 'shape-cell shown-cell animate-in';
    cell.style.animationDelay = (i * 0.06) + 's';
    cell.appendChild(svgFromKey(key));
    const num = document.createElement('span');
    num.className = 'row-num';
    num.textContent = i + 1;
    cell.appendChild(num);
    col.appendChild(cell);
  });
}

// ── RENDER ANSWER SLOTS ──
function renderAnswerSlots(count) {
  const col = document.getElementById('answer-col');
  col.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const cell = document.createElement('div');
    cell.className = 'shape-cell answer-slot';
    cell.dataset.idx = i;
    const num = document.createElement('span');
    num.className = 'row-num';
    num.textContent = i + 1;
    cell.appendChild(num);
    cell.addEventListener('click', () => onSlotClick(i));
    col.appendChild(cell);
  }
}

// ── RENDER PALETTE ──
function renderPalette(palette) {
  const col = document.getElementById('palette-col');
  col.innerHTML = '';
  palette.forEach((key, i) => {
    const btn = document.createElement('div');
    btn.className = 'palette-btn animate-in';
    btn.style.animationDelay = (i * 0.05) + 's';
    btn.appendChild(svgFromKey(key));
    btn.dataset.pidx = i;
    btn.dataset.key  = key;
    btn.addEventListener('click', () => onPaletteClick(i));
    col.appendChild(btn);
  });
}

// ── PALETTE CLICK ──
function onPaletteClick(pidx) {
  if (gameState.phase !== 'playing') return;
  const btns = document.querySelectorAll('.palette-btn');
  const btn  = [...btns].find(b => parseInt(b.dataset.pidx) === pidx);
  if (!btn) return;

  btns.forEach(b => b.classList.remove('selected'));
  if (selectedPaletteIdx === pidx) {
    selectedPaletteIdx = null;
    return;
  }
  selectedPaletteIdx = pidx;
  btn.classList.add('selected');

  const firstEmpty = answerSlots.indexOf(null);
  if (firstEmpty !== -1) onSlotClick(firstEmpty);
}

// ── SLOT CLICK ──
function onSlotClick(idx) {
  if (gameState.phase !== 'playing') return;

  if (answerSlots[idx] !== null) {
    answerSlots[idx] = null;
    refreshAnswerSlots();
    updateStatus();
    return;
  }

  if (selectedPaletteIdx === null) {
    setStatus('Először válassz egy formát a jobb oldali listából!');
    return;
  }

  const key = gameState.palette[selectedPaletteIdx];
  answerSlots[idx] = key;

  const btn = [...document.querySelectorAll('.palette-btn')]
    .find(b => parseInt(b.dataset.pidx) === selectedPaletteIdx);
  if (btn) btn.classList.remove('selected');

  selectedPaletteIdx = null;
  refreshAnswerSlots();
  updateStatus();
}

// ── REFRESH ANSWER SLOTS ──
function refreshAnswerSlots() {
  const slots = document.getElementById('answer-col').querySelectorAll('.answer-slot');
  slots.forEach((cell, i) => {
    const num = cell.querySelector('.row-num');
    cell.innerHTML = '';
    if (num) cell.appendChild(num);
    cell.className = 'shape-cell answer-slot';
    if (answerSlots[i] !== null) {
      cell.classList.add('filled');
      const svg = svgFromKey(answerSlots[i]);
      cell.insertBefore(svg, num);
    }
  });
}

function updateStatus() {
  const filled = answerSlots.filter(s => s !== null).length;
  const total  = answerSlots.length;
  if (filled === total) setStatus('Minden hely kitöltve! Nyomj Ellenőrzésre!');
  else setStatus(`${filled} / ${total} hely kitöltve`);
}

// ── CLEAR ──
function clearAnswers() {
  answerSlots = Array(gameState.itemCount).fill(null);
  selectedPaletteIdx = null;
  document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('selected'));
  refreshAnswerSlots();
  document.getElementById('result-banner').classList.remove('show');
  setStatus('Keresd meg a párját minden formának!');
}

// ── CHECK ──
function checkAnswer() {
  if (gameState.phase !== 'playing') return;
  gameState.phase = 'done';

  const { shownSeq, mode } = gameState;
  const slots = document.getElementById('answer-col').querySelectorAll('.answer-slot');
  let correct = 0;

  slots.forEach((cell, i) => {
    const expected = shownSeq[i];
    const given    = answerSlots[i];
    const num = cell.querySelector('.row-num');
    cell.innerHTML = '';
    if (num) cell.appendChild(num);
    cell.className = 'shape-cell answer-slot';

    // Compare based on mode
    const isCorrect = isMatch(given, expected, mode, gameState.sizeMode);

    if (isCorrect) {
      cell.insertBefore(svgFromKey(given), num);
      cell.classList.add('correct');
      correct++;
      const r = cell.getBoundingClientRect();
      setTimeout(() => spawnStars(r.left + r.width/2, r.top + r.height/2, 3), i * 90);
    } else {
      // Show correct answer
      cell.insertBefore(svgFromKey(expected), num);
      cell.classList.add('wrong');
    }
  });

  document.getElementById('check-btn').classList.add('hidden');
  document.getElementById('clear-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
  document.getElementById('start-btn').classList.add('hidden');

  const total = gameState.itemCount;
  let icon, text, sub;
  if (correct === total) {
    icon = '🎉'; text = 'Tökéletes! Mindent megtaláltál!'; sub = `${correct}/${total} – Bravo!`;
  } else if (correct >= Math.ceil(total * 0.6)) {
    icon = '👍'; text = 'Szép munka!'; sub = `${correct}/${total} helyes – majdnem!`;
  } else {
    icon = '🙈'; text = 'Próbáld újra!'; sub = `${correct}/${total} – a piros = helyes válasz`;
  }

  setStatus(icon + ' ' + text);
  document.getElementById('result-text').textContent = icon + ' ' + text;
  document.getElementById('result-sub').textContent  = sub;
  document.getElementById('result-banner').classList.add('show');
}

function parseKey(key) {
  const parts = key.split('_');
  const size  = parts[parts.length - 1];
  const shape = parts[parts.length - 2];
  const color = parts.slice(0, parts.length - 2).join('_');
  return { color, shape, size };
}

function isMatch(given, expected, mode, sizeMode) {
  if (!given) return false;
  const g = parseKey(given);
  const e = parseKey(expected);
  // if multiple sizes selected, size difference is meaningful → must match
  const sizes = Array.isArray(sizeMode) ? sizeMode : [sizeMode];
  const sizeOk = sizes.length > 1 ? g.size === e.size : true;
  if (mode === 'color') return g.color === e.color && sizeOk;
  if (mode === 'shape') return g.shape === e.shape && sizeOk;
  return g.color === e.color && g.shape === e.shape && sizeOk;
}
// ── STYLE TOGGLE ──
function toggleSize(el) {
  const active = document.querySelectorAll('.style-toggle.active');
  // prevent deselecting the last one
  if (el.classList.contains('active') && active.length === 1) return;
  el.classList.toggle('active');
}
