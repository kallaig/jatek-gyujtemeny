<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Képpárosító</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8f0;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 18px;
    --accent: #6366f1;
    --accent-dark: #4f46e5;
    --cell: 70px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 8% 12%,  rgba(251,146,60,0.13) 0%, transparent 40%),
      radial-gradient(circle at 92% 88%, rgba(250,204,21,0.12) 0%, transparent 40%),
      radial-gradient(circle at 55% 45%, rgba(249,115,22,0.07) 0%, transparent 50%);
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header { text-align: center; padding: 20px 16px 6px; }

  .logo {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900; color: var(--accent-dark);
    letter-spacing: -0.5px;
  }

  .subtitle { font-size: 14px; color: #64748b; font-weight: 600; margin-top: 3px; }

  /* ── SETTINGS ── */
  .top-bar {
    max-width: 700px; margin: 10px auto 0;
    padding: 0 14px; display: flex; justify-content: flex-end;
  }

  .settings-toggle-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700; padding: 7px 16px;
    border: 2px solid #c7d2fe; border-radius: 50px; cursor: pointer;
    background: white; color: #64748b;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.2s;
  }
  .settings-toggle-btn:hover { border-color: var(--accent); color: var(--accent-dark); }

  .settings-panel {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); max-width: 700px;
    margin: 8px auto 0; overflow: hidden;
    max-height: 0; transition: max-height 0.35s ease, padding 0.3s ease;
    padding: 0 22px;
  }
  .settings-panel.open { max-height: 260px; padding: 18px 22px; }

  .settings-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }

  .setting-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }

  .setting-group label {
    font-size: 11px; font-weight: 800; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .setting-group select {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700; color: #334155;
    background: #f8fafc; border: 2px solid #e2e8f0;
    border-radius: 11px; padding: 7px 11px;
    cursor: pointer; outline: none; transition: border-color 0.2s;
  }
  .setting-group select:focus { border-color: var(--accent); }

  /* ── STATUS ── */
  .game-container { max-width: 700px; margin: 0 auto; padding: 12px 14px 50px; }

  .status-bar {
    background: white; border-radius: var(--radius);
    padding: 12px 18px; margin-bottom: 14px;
    box-shadow: var(--shadow); text-align: center;
  }
  .status-msg { font-size: 16px; font-weight: 800; color: #334155; }

  /* ── MAIN PLAY AREA ── */
  .play-area {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  /* ── LEFT: shown column ── */
  .shown-panel {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px;
    flex: 0 0 auto;
    min-width: 0;
  }

  .panel-label {
    font-size: 11px; font-weight: 800; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.5px;
    text-align: center; margin-bottom: 10px;
  }

  .shown-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  /* ── MIDDLE: answer column ── */
  .answer-panel {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px;
    flex: 0 0 auto;
    min-width: 0;
  }

  .answer-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  /* ── RIGHT: palette panel ── */
  .palette-panel {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px;
    flex: 1 1 auto;
    min-width: 90px;
  }

  .palette-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  /* ── CELLS ── */
  .emoji-cell {
    width: var(--cell);
    height: var(--cell);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    flex-shrink: 0;
    user-select: none;
    transition: all 0.18s;
    position: relative;
  }

  /* shown cells: styled nicely */
  .shown-cell {
    background: linear-gradient(135deg, #eff6ff, #e0e7ff);
    border: 3px solid #a5b4fc;
  }

  /* answer slots */
  .answer-slot {
    background: #f8fafc;
    border: 3px dashed #cbd5e1;
    cursor: pointer;
  }
  .answer-slot:hover { border-color: var(--accent); background: #eef2ff; }
  .answer-slot.filled {
    background: linear-gradient(135deg, #fef9c3, #fef3c7);
    border: 3px solid #facc15;
    cursor: pointer;
  }
  .answer-slot.correct {
    background: linear-gradient(135deg, #d1fae5, #a7f3d0) !important;
    border: 3px solid #22c55e !important;
    animation: celebrate 0.4s ease;
  }
  .answer-slot.wrong {
    background: linear-gradient(135deg, #fee2e2, #fca5a5) !important;
    border: 3px solid #ef4444 !important;
    animation: shake 0.4s ease;
  }

  /* palette buttons */
  .palette-btn {
    width: var(--cell);
    height: var(--cell);
    border-radius: 14px;
    border: 3px solid #e2e8f0;
    background: #f8fafc;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; cursor: pointer;
    transition: all 0.15s; user-select: none;
  }
  .palette-btn:hover {
    transform: scale(1.08);
    border-color: var(--accent); background: #eef2ff;
    box-shadow: 0 4px 14px rgba(99,102,241,0.2);
  }
  .palette-btn.selected {
    border-color: var(--accent-dark); background: #e0e7ff;
    outline: 3px solid var(--accent); outline-offset: 2px;
    transform: scale(1.06);
  }
  /* .palette-btn.used — removed: elements can be reused */

  /* row number label */
  .row-num {
    position: absolute;
    top: 3px; left: 6px;
    font-size: 11px; font-weight: 900;
    color: #94a3b8; line-height: 1;
  }

  /* ── RESULT ── */
  .result-banner {
    background: white; border-radius: var(--radius); padding: 16px;
    text-align: center; box-shadow: var(--shadow);
    margin-top: 14px; display: none;
  }
  .result-banner.show { display: block; animation: slideDown 0.3s ease; }
  .result-text { font-size: 21px; font-weight: 900; color: #334155; margin-bottom: 4px; }
  .result-sub  { font-size: 14px; font-weight: 600; color: #64748b; }

  /* ── BUTTONS ── */
  .btn-row {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap; margin-top: 14px;
  }

  .btn {
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    padding: 12px 26px; border: none; border-radius: 50px;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.09);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.14); }
  .btn:active { transform: translateY(0); }
  .btn-start { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
  .btn-check { background: linear-gradient(135deg, #22c55e, #4ecdc4); color: white; }
  .btn-clear { background: #f1f5f9; color: #64748b; border: 2px solid #e2e8f0; }
  .btn-next  { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }

  /* ── ANIMATIONS ── */
  @keyframes celebrate { 0%,100%{transform:scale(1)} 50%{transform:scale(1.16) rotate(4deg)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { 0%{transform:scale(0.4);opacity:0} 100%{transform:scale(1);opacity:1} }

  .animate-in { animation: popIn 0.26s cubic-bezier(0.34,1.56,0.64,1); }

  .star {
    position: fixed; pointer-events: none; font-size: 22px;
    animation: floatStar 1.4s ease-out forwards; z-index: 200;
  }
  @keyframes floatStar {
    0%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:0;transform:translateY(-80px) scale(0.5)}
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    :root { --cell: 58px; }
    .emoji-cell { font-size: 28px; border-radius: 12px; }
    .palette-btn { font-size: 28px; border-radius: 12px; }
  }

  @media (max-width: 360px) {
    :root { --cell: 50px; }
    .emoji-cell { font-size: 24px; }
    .palette-btn { font-size: 24px; }
  }

  .hidden { display: none !important; }
</style>
</head>

<header>
  <div class="logo">🔍 Képpárosító</div>
  <div class="subtitle">Találd meg a párját!</div>
</header>

<div class="top-bar">
  <button class="settings-toggle-btn" onclick="toggleSettings()">⚙️ Beállítások</button>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="settings-row">
    <div class="setting-group">
      <label>Kategória</label>
      <select id="game-mode">
        <option value="animals" selected>Állatok</option>
        <option value="plants">Növények</option>
        <option value="vehicles">Járművek</option>
        <option value="mixed">Vegyes</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Képek száma</label>
      <select id="item-count">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Zavaró elemek</label>
      <select id="extra-count">
        <option value="0">Nincs</option>
        <option value="2" selected>+2 extra</option>
        <option value="4">+4 extra</option>
        <option value="6">+6 extra</option>
      </select>
    </div>
  </div>
</div>

<div class="game-container">

  <div class="status-bar">
    <div class="status-msg" id="status-msg">Nyomj a Start gombra!</div>
  </div>

  <div class="play-area" id="play-area" style="display:none">

    <!-- LEFT: shown -->
    <div class="shown-panel">
      <div class="panel-label">Ezt láttad</div>
      <div class="shown-col" id="shown-col"></div>
    </div>

    <!-- MIDDLE: answer slots -->
    <div class="answer-panel">
      <div class="panel-label">Ide rakd!</div>
      <div class="answer-col" id="answer-col"></div>
    </div>

    <!-- RIGHT: palette -->
    <div class="palette-panel">
      <div class="panel-label">Válassz!</div>
      <div class="palette-col" id="palette-col"></div>
    </div>

  </div>

  <div class="result-banner" id="result-banner">
    <div class="result-text" id="result-text"></div>
    <div class="result-sub"  id="result-sub"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="start-btn" onclick="startGame()">🚀 Start</button>
    <button class="btn btn-check hidden" id="check-btn" onclick="checkAnswer()">Ellenőrzés</button>
    <button class="btn btn-clear hidden" id="clear-btn" onclick="clearAnswers()">Töröl</button>
    <button class="btn btn-next  hidden" id="next-btn"  onclick="startGame()">Következő ▶</button>
  </div>

</div>

<script>
// ── POOLS ──
const POOLS = {
  animals:  ['🐶','🐱','🐰','🦊','🐻','🐼','🐯','🐮','🐷','🐸','🐵','🦁','🐧','🦉','🐺'],
  plants:   ['🌵','🍄','🌴','🌻','🍁','🍀','🌾','🎋','🌲','🪨'],
  vehicles: ['🚂','✈️','🚀','🚁','⛵','🚒','🚑','🛸','🚜','🏍'],
};

function allEmojis() {
  return [...POOLS.animals, ...POOLS.plants, ...POOLS.vehicles];
}

function poolFor(mode) {
  return mode === 'mixed' ? allEmojis() : POOLS[mode];
}

// ── STATE ──
let gameState = {};
let answerSlots = [];        // null | emoji string
let selectedPaletteIdx = null; // index in palette array
let settingsOpen = false;

// ── UTILS ──
function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function setStatus(m) { document.getElementById('status-msg').textContent = m; }

function spawnStars(x, y, n) {
  ['⭐','🌟','✨','💫'].slice(0,n).forEach((s,i) => {
    const el = document.createElement('div');
    el.className = 'star'; el.textContent = s;
    el.style.left = (x+(Math.random()-.5)*70)+'px';
    el.style.top  = (y+(Math.random()-.5)*30)+'px';
    el.style.animationDelay = (i*0.1)+'s';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  });
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-panel').classList.toggle('open', settingsOpen);
}

// ── START ──
function startGame() {
  const mode       = document.getElementById('game-mode').value;
  const itemCount  = parseInt(document.getElementById('item-count').value);
  const extraCount = parseInt(document.getElementById('extra-count').value);

  const pool = poolFor(mode);

  // Pick unique emojis for the shown sequence (may repeat within sequence)
  // Use a smaller base set so repetition is meaningful
  const baseSet = pick(pool, Math.min(Math.max(2, Math.ceil(itemCount * 0.7)), itemCount, pool.length));

  // Build shown sequence (itemCount items, drawn from baseSet, repetitions allowed)
  const shownSeq = [];
  for (let i = 0; i < itemCount; i++) {
    shownSeq.push(baseSet[Math.floor(Math.random() * baseSet.length)]);
  }

  // Build palette: all unique emojis from shownSeq + extras
  const shownUnique = [...new Set(shownSeq)];
  const extrasPool  = pool.filter(e => !shownUnique.includes(e));
  const extras      = pick(extrasPool, Math.min(extraCount, extrasPool.length));
  const palette     = shuffle([...shownUnique, ...extras]);

  gameState = { mode, itemCount, shownSeq, palette, phase: 'playing' };
  answerSlots = Array(itemCount).fill(null);
  selectedPaletteIdx = null;

  // UI
  document.getElementById('result-banner').classList.remove('show');
  document.getElementById('play-area').style.display = 'flex';
  document.getElementById('check-btn').classList.remove('hidden');
  document.getElementById('clear-btn').classList.remove('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  const startBtn = document.getElementById('start-btn');
  startBtn.textContent = '🔄 Új játék';
  startBtn.classList.remove('hidden');

  renderShown(shownSeq);
  renderAnswerSlots(itemCount);
  renderPalette(palette);

  setStatus('Keresd meg a párját minden képnek!');
}

// ── RENDER SHOWN ──
function renderShown(seq) {
  const col = document.getElementById('shown-col');
  col.innerHTML = '';
  seq.forEach((emoji, i) => {
    const cell = document.createElement('div');
    cell.className = 'emoji-cell shown-cell animate-in';
    cell.style.animationDelay = (i * 0.06) + 's';
    cell.textContent = emoji;
    // row number
    const num = document.createElement('span');
    num.className = 'row-num';
    num.textContent = i + 1;
    cell.appendChild(num);
    col.appendChild(cell);
  });
}

// ── RENDER ANSWER SLOTS ──
function renderAnswerSlots(count) {
  const col = document.getElementById('answer-col');
  col.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const cell = document.createElement('div');
    cell.className = 'emoji-cell answer-slot';
    cell.dataset.idx = i;
    // row number
    const num = document.createElement('span');
    num.className = 'row-num';
    num.textContent = i + 1;
    cell.appendChild(num);
    cell.addEventListener('click', () => onSlotClick(i));
    col.appendChild(cell);
  }
}

// ── RENDER PALETTE ──
function renderPalette(palette) {
  const col = document.getElementById('palette-col');
  col.innerHTML = '';
  palette.forEach((emoji, i) => {
    const btn = document.createElement('div');
    btn.className = 'palette-btn animate-in';
    btn.style.animationDelay = (i * 0.05) + 's';
    btn.textContent = emoji;
    btn.dataset.pidx = i;
    btn.dataset.emoji = emoji;
    btn.addEventListener('click', () => onPaletteClick(i));
    col.appendChild(btn);
  });
}

// ── PALETTE CLICK ──
function onPaletteClick(pidx) {
  if (gameState.phase !== 'playing') return;
  const btns = document.querySelectorAll('.palette-btn');
  const btn  = [...btns].find(b => parseInt(b.dataset.pidx) === pidx);
  if (!btn) return;

  // toggle selection
  btns.forEach(b => b.classList.remove('selected'));
  if (selectedPaletteIdx === pidx) {
    selectedPaletteIdx = null;
    return;
  }
  selectedPaletteIdx = pidx;
  btn.classList.add('selected');

  // auto-fill first empty slot
  const firstEmpty = answerSlots.indexOf(null);
  if (firstEmpty !== -1) onSlotClick(firstEmpty);
}

// ── SLOT CLICK ──
function onSlotClick(idx) {
  if (gameState.phase !== 'playing') return;

  // if slot filled: remove
  if (answerSlots[idx] !== null) {
    const removedEmoji = answerSlots[idx];
    answerSlots[idx] = null;
    refreshAnswerSlots();
    updateStatus();
    return;
  }

  if (selectedPaletteIdx === null) {
    setStatus('Először válassz egy képet a jobb oldali listából!');
    return;
  }

  const emoji = gameState.palette[selectedPaletteIdx];
  answerSlots[idx] = emoji;

  // mark palette btn used
  const btn = [...document.querySelectorAll('.palette-btn')]
    .find(b => parseInt(b.dataset.pidx) === selectedPaletteIdx);
  if (btn) { btn.classList.remove('selected'); }

  selectedPaletteIdx = null;
  refreshAnswerSlots();
  updateStatus();
}

function refreshAnswerSlots() {
  const slots = document.getElementById('answer-col').querySelectorAll('.answer-slot');
  slots.forEach((cell, i) => {
    // keep row number
    const num = cell.querySelector('.row-num');
    cell.innerHTML = '';
    if (num) cell.appendChild(num);
    cell.className = 'emoji-cell answer-slot';
    if (answerSlots[i] !== null) {
      cell.classList.add('filled');
      const txt = document.createTextNode(answerSlots[i]);
      cell.insertBefore(txt, num);
    }
  });
}

function updateStatus() {
  const filled = answerSlots.filter(s => s !== null).length;
  const total  = answerSlots.length;
  if (filled === total) setStatus('Minden hely kitöltve! Nyomj Ellenőrzésre!');
  else setStatus(`${filled} / ${total} hely kitöltve`);
}

// ── CLEAR ──
function clearAnswers() {
  answerSlots = Array(gameState.itemCount).fill(null);
  selectedPaletteIdx = null;
  document.querySelectorAll('.palette-btn').forEach(b => {
    b.classList.remove('selected');
  });
  refreshAnswerSlots();
  document.getElementById('result-banner').classList.remove('show');
  setStatus('Keresd meg a párját minden képnek!');
}

// ── CHECK ──
function checkAnswer() {
  if (gameState.phase !== 'playing') return;
  gameState.phase = 'done';

  const slots = document.getElementById('answer-col').querySelectorAll('.answer-slot');
  let correct = 0;

  slots.forEach((cell, i) => {
    const expected = gameState.shownSeq[i];
    const given    = answerSlots[i];
    const num = cell.querySelector('.row-num');
    cell.innerHTML = '';
    if (num) cell.appendChild(num);
    cell.className = 'emoji-cell answer-slot';

    if (given === expected) {
      const txt = document.createTextNode(given);
      cell.insertBefore(txt, num);
      cell.classList.add('correct');
      correct++;
      const r = cell.getBoundingClientRect();
      setTimeout(() => spawnStars(r.left + r.width/2, r.top + r.height/2, 3), i * 90);
    } else {
      // show correct answer
      const txt = document.createTextNode(expected);
      cell.insertBefore(txt, num);
      cell.classList.add('wrong');
    }
  });

  document.getElementById('check-btn').classList.add('hidden');
  document.getElementById('clear-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
  document.getElementById('start-btn').classList.add('hidden');

  const total = gameState.itemCount;
  let icon, text, sub;
  if (correct === total) {
    icon = '🎉'; text = 'Tökéletes! Mindent megtaláltál!'; sub = `${correct}/${total} – Bravo!`;
  } else if (correct >= Math.ceil(total * 0.6)) {
    icon = '👍'; text = 'Szép munka!'; sub = `${correct}/${total} helyes – majdnem!`;
  } else {
    icon = '🙈'; text = 'Próbáld újra!'; sub = `${correct}/${total} – a piros = helyes válasz`;
  }

  setStatus(icon + ' ' + text);
  document.getElementById('result-text').textContent = icon + ' ' + text;
  document.getElementById('result-sub').textContent  = sub;
  document.getElementById('result-banner').classList.add('show');
}
</script>
</body>
</html>
