<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melyik nem illik?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f9ff;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 18px;
    --accent: #0ea5e9;
    --accent-dark: #0284c7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 15%, rgba(14,165,233,0.10) 0%, transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(168,85,247,0.08) 0%, transparent 40%);
    overflow-x: hidden;
  }

  header { text-align: center; padding: 20px 16px 4px; }
  .logo { font-size: clamp(22px,5vw,36px); font-weight: 900; color: var(--accent-dark); letter-spacing: -0.5px; }
  .subtitle { font-size: 14px; color: #64748b; font-weight: 600; margin-top: 3px; }

  /* SETTINGS */
  .top-bar { max-width: 700px; margin: 10px auto 0; padding: 0 14px; display: flex; justify-content: flex-end; }
  .settings-toggle-btn {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; padding: 7px 16px;
    border: 2px solid #bae6fd; border-radius: 50px; cursor: pointer;
    background: white; color: #64748b; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.2s;
  }
  .settings-toggle-btn:hover { border-color: var(--accent); color: var(--accent-dark); }

  .settings-panel {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    max-width: 700px; margin: 8px auto 0; overflow: hidden;
    max-height: 0; transition: max-height 0.35s ease, padding 0.3s ease; padding: 0 22px;
  }
  .settings-panel.open { max-height: 320px; padding: 18px 22px; }
  .settings-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
  .setting-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
  .setting-group label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
  .setting-group select {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: #334155;
    background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 11px; padding: 7px 11px;
    cursor: pointer; outline: none; transition: border-color 0.2s;
  }
  .setting-group select:focus { border-color: var(--accent); }

  /* GAME */
  .game-container { max-width: 700px; margin: 0 auto; padding: 12px 14px 50px; }

  .status-bar { background: white; border-radius: var(--radius); padding: 12px 18px; margin-bottom: 14px; box-shadow: var(--shadow); text-align: center; }
  .status-msg { font-size: 16px; font-weight: 800; color: #334155; }

  /* SCORE */
  .score-row {
    display: flex; gap: 10px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap;
  }
  .score-badge {
    font-size: 14px; font-weight: 900; padding: 5px 16px;
    border-radius: 50px; background: white; box-shadow: var(--shadow);
    border: 2px solid #e2e8f0;
  }
  .score-badge.correct { border-color: #22c55e; color: #16a34a; }
  .score-badge.wrong   { border-color: #ef4444; color: #dc2626; }
  .score-badge.round   { border-color: #bae6fd; color: var(--accent-dark); }

  /* ITEMS ROW */
  .items-section {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 16px;
    margin-bottom: 14px;
  }

  .items-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 12px;
    justify-items: center;
  }
  /* ensure at least 2 columns (so no lone item on a row) */
  @media (max-width: 320px) {
    .items-row { grid-template-columns: repeat(2, 1fr); }
  }

  .item-card {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    width: 90px;
    background: #f8fafc; border-radius: 16px; border: 3px solid #e2e8f0;
    padding: 10px 6px 8px;
    cursor: pointer; transition: all 0.18s;
    user-select: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    flex-shrink: 0;
  }
  .item-card:hover { transform: scale(1.07); border-color: var(--accent); background: #f0f9ff; box-shadow: 0 4px 14px rgba(14,165,233,0.15); }

  .item-emoji { font-size: 42px; line-height: 1; }
  .item-emoji svg.shape { width: 44px; height: 44px; display: block; }

  /* After click */
  .item-card.selected {
    border-color: var(--accent); background: #e0f2fe;
    transform: scale(1.05);
  }
  .item-card.correct {
    border-color: #22c55e !important; background: #dcfce7 !important;
    animation: celebrate 0.4s ease;
  }
  .item-card.wrong {
    border-color: #ef4444 !important; background: #fee2e2 !important;
    animation: shake 0.4s ease;
  }
  .item-card.reveal {
    border-color: #22c55e !important; background: #dcfce7 !important;
    opacity: 0.7;
  }

  /* RESULT */
  .result-banner { background: white; border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow); margin-bottom: 14px; display: none; }
  .result-banner.show { display: block; animation: slideDown 0.3s ease; }
  .result-text { font-size: 22px; font-weight: 900; color: #334155; margin-bottom: 4px; }
  .result-sub  { font-size: 14px; font-weight: 600; color: #64748b; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    padding: 12px 26px; border: none; border-radius: 50px;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(0,0,0,0.09);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.14); }
  .btn:active { transform: translateY(0); }
  .btn-start   { background: linear-gradient(135deg, #0ea5e9, #6366f1); color: white; }
  .btn-next    { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; }
  .btn-finish  { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }

  /* ANIMATIONS */
  @keyframes celebrate { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15) rotate(4deg)} }
  @keyframes shake     { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn     { 0%{transform:scale(0.5);opacity:0} 100%{transform:scale(1);opacity:1} }

  .item-card.animate-in { animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1); }

  .star { position:fixed; pointer-events:none; font-size:22px; animation:floatStar 1.4s ease-out forwards; z-index:200; }
  @keyframes floatStar { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.5)} }

  @media (max-width: 480px) {
    .item-card { width: 76px; }
    .item-emoji { font-size: 34px; }
    .item-emoji svg.shape { width: 36px; height: 36px; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">🤔 Melyik nem illik?</div>
  <div class="subtitle">Keresd meg, melyik nem illik a sorba!</div>
</header>

<div class="top-bar">
  <button class="settings-toggle-btn" onclick="toggleSettings()">⚙️ Beállítások</button>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="settings-row">
    <div class="setting-group">
      <label>Elemtípus</label>
      <select id="elem-type" onchange="updateElemType()">
        <option value="emoji" selected>Emoji</option>
        <option value="shape">Formák</option>
        <option value="jelek">Jelek</option>
      </select>
    </div>
    <div class="setting-group" id="emoji-cat-group">
      <label>Fő kategória</label>
      <select id="emoji-main-cat">
        <option value="random" selected>Véletlenszerű</option>
        <option value="animals">Állatok</option>
        <option value="plants">Növények</option>
        <option value="vehicles">Járművek</option>
        <option value="fruits">Gyümölcsök</option>
      </select>
    </div>
    <div class="setting-group hidden" id="shape-cat-group">
      <label>Eltérés alapja</label>
      <select id="shape-diff">
        <option value="color" selected>Szín szerint</option>
        <option value="shape">Alak szerint</option>
        <option value="hollow">Lyukas/teli szerint</option>
      </select>
    </div>
    <div class="setting-group hidden" id="jelek-cat-group">
      <label>Fő jelkészlet</label>
      <select id="jelek-main-cat">
        <option value="random" selected>Véletlenszerű</option>
        <option value="math">Matematikai</option>
        <option value="geo">Geometriai</option>
        <option value="arrow">Nyilak</option>
        <option value="basic">Alapjelek</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Elemek száma</label>
      <select id="item-count">
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Körök száma</label>
      <select id="round-count">
        <option value="3">3</option>
        <option value="5" selected>5</option>
        <option value="8">8</option>
        <option value="10">10</option>
      </select>
    </div>
  </div>
</div>

<div class="game-container">

  <div class="status-bar">
    <div class="status-msg" id="status-msg">Nyomj a Start gombra!</div>
  </div>

  <div class="score-row hidden" id="score-row">
    <div class="score-badge round"  id="badge-round">1 / 5</div>
    <div class="score-badge correct" id="badge-correct">✓ 0</div>
    <div class="score-badge wrong"   id="badge-wrong">✗ 0</div>
  </div>

  <div class="items-section hidden" id="items-section">
    <div class="items-row" id="items-row"></div>
  </div>

  <div class="result-banner" id="result-banner">
    <div class="result-text" id="result-text"></div>
    <div class="result-sub"  id="result-sub"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start"  id="start-btn"  onclick="startGame()">🚀 Start</button>
    <button class="btn btn-next   hidden" id="next-btn"   onclick="nextRound()">Következő ▶</button>
    <button class="btn btn-finish hidden" id="finish-btn" onclick="showFinalResult()">Eredmény 🏁</button>
  </div>

</div>

<script>
// ── DATA ──
const EMOJI_POOLS = {
  animals:  ['🐶','🐱','🐰','🦊','🐻','🐼','🐯','🐮','🐷','🐸','🐵','🦁','🐧','🦉','🐺'],
  plants:   ['🌵','🍄','🌴','🌻','🍁','🍀','🌾','🎋','🌲','🪨'],
  vehicles: ['🚂','✈️','🚀','🚁','⛵','🚒','🚑','🛸','🚜','🏍'],
  fruits:   ['🍎','🍊','🍋','🍇','🍓','🍒','🍑','🥭','🍍','🥝','🍌','🍈','🍐','🫐','🍉'],
};
const EMOJI_CAT_LABELS = {
  animals:'Állat', plants:'Növény', vehicles:'Jármű', fruits:'Gyümölcs'
};

const COLORS = [
  {id:'red',hex:'#ef4444',label:'Piros'},
  {id:'yellow',hex:'#facc15',label:'Sárga'},
  {id:'green',hex:'#22c55e',label:'Zöld'},
  {id:'blue',hex:'#3b82f6',label:'Kék'},
];
const SHAPES_LIST = [
  {id:'circle',label:'Kör'},
  {id:'square',label:'Négyzet'},
  {id:'triangle',label:'Háromszög'},
];

const JELEK_POOLS = {
  math:  ['math:plus','math:minus','math:times','math:div','math:eq','math:lt','math:gt'],
  geo:   ['geo:star','geo:heart','geo:diamond','geo:spade','geo:club'],
  arrow: ['arrow:left','arrow:up','arrow:right','arrow:down','arrow:nw','arrow:ne'],
  basic: ['basic:slash','basic:bslash','basic:pipe','basic:at','basic:hash','basic:tilde'],
};

// ── STATE ──
let GS = {};
let settingsOpen = false;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function setStatus(m){document.getElementById('status-msg').textContent=m;}
function spawnStars(x,y,n){['⭐','🌟','✨','💫'].slice(0,n).forEach((s,i)=>{const e=document.createElement('div');e.className='star';e.textContent=s;e.style.left=(x+(Math.random()-.5)*80)+'px';e.style.top=(y+(Math.random()-.5)*40)+'px';e.style.animationDelay=(i*.1)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),1800);});}

function toggleSettings(){settingsOpen=!settingsOpen;document.getElementById('settings-panel').classList.toggle('open',settingsOpen);}

function updateElemType(){
  const v=document.getElementById('elem-type').value;
  document.getElementById('emoji-cat-group').classList.toggle('hidden',v!=='emoji');
  document.getElementById('shape-cat-group').classList.toggle('hidden',v!=='shape');
  document.getElementById('jelek-cat-group').classList.toggle('hidden',v!=='jelek');
}

// ── SVG ──
function makeShapeSVG(colorId,shape,hollow){
  const hex=COLORS.find(c=>c.id===colorId)?.hex||'#888';
  const ns='http://www.w3.org/2000/svg',svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 48 48');svg.classList.add('shape');
  let el;
  if(shape==='circle'){el=document.createElementNS(ns,'circle');el.setAttribute('cx','24');el.setAttribute('cy','24');el.setAttribute('r','20');}
  else if(shape==='square'){el=document.createElementNS(ns,'rect');el.setAttribute('x','4');el.setAttribute('y','4');el.setAttribute('width','40');el.setAttribute('height','40');el.setAttribute('rx','4');}
  else{el=document.createElementNS(ns,'polygon');el.setAttribute('points','24,4 44,44 4,44');}
  el.setAttribute('fill',hex);el.setAttribute('stroke','rgba(0,0,0,0.10)');el.setAttribute('stroke-width','1.5');
  svg.appendChild(el);
  if(hollow){
    const h=document.createElementNS(ns,'circle');
    h.setAttribute('cx','24');h.setAttribute('cy',shape==='triangle'?'31':'24');
    h.setAttribute('r',shape==='circle'?'9':'8');h.setAttribute('fill','white');
    svg.appendChild(h);
  }
  return svg;
}

function makeJelSVG(key){
  const ns='http://www.w3.org/2000/svg',svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 48 48');svg.classList.add('shape');
  const lc='#1e293b',sw='4';
  const[cat,id]=key.split(':');
  const aL=(x1,y1,x2,y2)=>{const l=document.createElementNS(ns,'line');l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.setAttribute('stroke',lc);l.setAttribute('stroke-width',sw);l.setAttribute('stroke-linecap','round');svg.appendChild(l);};
  const aPL=pts=>{const p=document.createElementNS(ns,'polyline');p.setAttribute('points',pts);p.setAttribute('stroke',lc);p.setAttribute('stroke-width',sw);p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');svg.appendChild(p);};
  const aPG=pts=>{const p=document.createElementNS(ns,'polygon');p.setAttribute('points',pts);p.setAttribute('fill',lc);svg.appendChild(p);};
  const aC=(cx,cy,r)=>{const c=document.createElementNS(ns,'circle');c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);c.setAttribute('fill',lc);svg.appendChild(c);};
  const aPath=(d,fill,stroke)=>{const p=document.createElementNS(ns,'path');p.setAttribute('d',d);if(fill)p.setAttribute('fill',lc);if(stroke){p.setAttribute('stroke',lc);p.setAttribute('stroke-width',sw);p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');}svg.appendChild(p);};
  const aArr=(x1,y1,x2,y2)=>{aL(x1,y1,x2,y2);const a=Math.atan2(y2-y1,x2-x1),len=10;aL(x2,y2,Math.round(x2+len*Math.cos(a+Math.PI*.75)),Math.round(y2+len*Math.sin(a+Math.PI*.75)));aL(x2,y2,Math.round(x2+len*Math.cos(a-Math.PI*.75)),Math.round(y2+len*Math.sin(a-Math.PI*.75)));};
  const sPts=(cx,cy,o,i2,n)=>{const p=[];for(let j=0;j<n*2;j++){const r=j%2===0?o:i2,a=Math.PI/n*j-Math.PI/2;p.push(Math.round(cx+r*Math.cos(a))+','+Math.round(cy+r*Math.sin(a)));}return p.join(' ');};
  if(cat==='math'){
    if(id==='plus'){aL(24,8,24,40);aL(8,24,40,24);}
    else if(id==='minus')aL(8,24,40,24);
    else if(id==='times'){aL(10,10,38,38);aL(38,10,10,38);}
    else if(id==='div'){aL(8,24,40,24);aC(24,12,3.5);aC(24,36,3.5);}
    else if(id==='eq'){aL(8,18,40,18);aL(8,30,40,30);}
    else if(id==='lt')aPL('38,10 10,24 38,38');
    else if(id==='gt')aPL('10,10 38,24 10,38');
  }else if(cat==='geo'){
    if(id==='star')aPG(sPts(24,24,20,8,5));
    else if(id==='heart')aPath('M24,38 C24,38 6,26 6,16 C6,10 10,7 14,7 C18,7 22,10 24,13 C26,10 30,7 34,7 C38,7 42,10 42,16 C42,26 24,38 24,38 Z',true);
    else if(id==='diamond')aPG('24,5 43,24 24,43 5,24');
    else if(id==='spade')aPath('M24,4 C24,4 6,16 6,26 C6,32 10,36 16,34 C14,38 12,42 8,43 L40,43 C36,42 34,38 32,34 C38,36 42,32 42,26 C42,16 24,4 24,4 Z',true);
    else if(id==='club')aPath('M24,4 C20,4 17,7 17,11 C17,13 18,15 19,16 C16,15 12,15 10,18 C8,21 9,25 12,27 C15,29 19,28 21,26 C19,30 17,36 14,39 L34,39 C31,36 29,30 27,26 C29,28 33,29 36,27 C39,25 40,21 38,18 C36,15 32,15 29,16 C30,15 31,13 31,11 C31,7 28,4 24,4 Z',true);
  }else if(cat==='arrow'){
    if(id==='left')aArr(40,24,8,24);else if(id==='right')aArr(8,24,40,24);
    else if(id==='up')aArr(24,40,24,8);else if(id==='down')aArr(24,8,24,40);
    else if(id==='nw')aArr(38,38,10,10);else if(id==='ne')aArr(10,38,38,10);
  }else if(cat==='basic'){
    if(id==='slash')aL(34,8,14,40);else if(id==='bslash')aL(14,8,34,40);
    else if(id==='pipe')aL(24,6,24,42);
    else if(id==='hash'){aL(16,8,12,40);aL(28,8,24,40);aL(7,18,41,18);aL(6,30,40,30);}
    else if(id==='at')aPath('M30,18 C28,14 24,12 20,14 C16,16 14,20 15,25 C16,30 20,33 25,32 C28,31 30,29 30,26 L30,18 M30,26 C30,30 33,33 37,32 C41,31 43,26 42,21 C40,13 33,8 25,8 C16,8 9,15 9,24 C9,33 16,40 25,40 C29,40 32,39 35,37',false,true);
    else if(id==='tilde')aPath('M8,24 C12,16 16,16 20,24 C24,32 28,32 32,24 C36,16 40,16 42,20',false,true);
  }
  return svg;
}

function renderKey(elemType,key){
  if(elemType==='emoji'){const s=document.createElement('span');s.textContent=key;s.style.fontSize='42px';s.style.lineHeight='1';return s;}
  if(elemType==='jelek')return makeJelSVG(key);
  const parts=key.split('_');
  const hollow=parts[parts.length-1]==='hollow';
  const sh=hollow?parts[parts.length-2]:parts[parts.length-1];
  const col=parts.slice(0,hollow?parts.length-2:parts.length-1).join('_');
  return makeShapeSVG(col,sh,hollow);
}

// ── GENERATE ROUND ──
// Returns: { items:[{key,cat,isOdd}], oddIdx, mainCatLabel, oddCatLabel }
function generateRound(elemType, mainCatSetting, shapeDiff, jelekMainCat, itemCount){

  if(elemType==='emoji'){
    const allCats = Object.keys(EMOJI_POOLS);
    // Pick main category
    const mainCat = mainCatSetting==='random' ? rand(allCats) : mainCatSetting;
    // Pick odd category (different from main)
    const oddCat  = rand(allCats.filter(c=>c!==mainCat));

    const mainPool = shuffle([...EMOJI_POOLS[mainCat]]);
    const oddPool  = shuffle([...EMOJI_POOLS[oddCat]]);

    const mainItems = mainPool.slice(0, itemCount-1).map(k=>({key:k, cat:mainCat, isOdd:false}));
    const oddItem   = {key:oddPool[0], cat:oddCat, isOdd:true};

    const items = shuffle([...mainItems, oddItem]);
    const oddIdx = items.findIndex(i=>i.isOdd);
    return { items, oddIdx, mainCatLabel:EMOJI_CAT_LABELS[mainCat], oddCatLabel:EMOJI_CAT_LABELS[oddCat] };
  }

  if(elemType==='shape'){
    if(shapeDiff==='color'){
      // All same shape, different color — each item independently hollow or solid
      const shape = rand(SHAPES_LIST).id;
      const mainColor = rand(COLORS);
      const oddColor  = rand(COLORS.filter(c=>c.id!==mainColor.id));
      const mainItems = Array.from({length:itemCount-1},()=>{
        const sfx=Math.random()<0.5?'_hollow':'';
        return {key:mainColor.id+'_'+shape+sfx, cat:mainColor.id, isOdd:false};
      });
      const oddSfx = Math.random()<0.5?'_hollow':'';
      const oddItem = {key:oddColor.id+'_'+shape+oddSfx, cat:oddColor.id, isOdd:true};
      const items = shuffle([...mainItems, oddItem]);
      const oddIdx = items.findIndex(i=>i.isOdd);
      return { items, oddIdx, mainCatLabel:mainColor.label, oddCatLabel:oddColor.label };
    } else if(shapeDiff==='shape'){
      // All same color, different shape — each item independently hollow or solid
      const color = rand(COLORS).id;
      const mainShape = rand(SHAPES_LIST);
      const oddShape  = rand(SHAPES_LIST.filter(s=>s.id!==mainShape.id));
      const mainItems = Array.from({length:itemCount-1},()=>{
        const sfx=Math.random()<0.5?'_hollow':'';
        return {key:color+'_'+mainShape.id+sfx, cat:mainShape.id, isOdd:false};
      });
      const oddSfx = Math.random()<0.5?'_hollow':'';
      const oddItem = {key:color+'_'+oddShape.id+oddSfx, cat:oddShape.id, isOdd:true};
      const items = shuffle([...mainItems, oddItem]);
      const oddIdx = items.findIndex(i=>i.isOdd);
      return { items, oddIdx, mainCatLabel:mainShape.label, oddCatLabel:oddShape.label };
    } else {
      // All same color+shape, odd one is hollow vs teli (or vice versa)
      const color = rand(COLORS).id;
      const shape = rand(SHAPES_LIST).id;
      const mainHollow = Math.random()<0.5;
      const mainSfx = mainHollow ? '_hollow' : '';
      const oddSfx  = mainHollow ? '' : '_hollow';
      const mainItems = Array.from({length:itemCount-1},()=>({key:color+'_'+shape+mainSfx, cat:'solid', isOdd:false}));
      const oddItem   = {key:color+'_'+shape+oddSfx, cat:'hollow', isOdd:true};
      const items = shuffle([...mainItems, oddItem]);
      const oddIdx = items.findIndex(i=>i.isOdd);
      return { items, oddIdx, mainCatLabel:mainHollow?'Lyukas':'Teli', oddCatLabel:mainHollow?'Teli':'Lyukas' };
    }
  }

  // jelek
  const allJelCats = Object.keys(JELEK_POOLS);
  const mainCat = jelekMainCat==='random' ? rand(allJelCats) : jelekMainCat;
  const oddCat  = rand(allJelCats.filter(c=>c!==mainCat));
  const catLabels = {math:'Matematikai',geo:'Geometriai',arrow:'Nyíl',basic:'Alapjel'};

  const mainPool = shuffle([...JELEK_POOLS[mainCat]]);
  const oddPool  = shuffle([...JELEK_POOLS[oddCat]]);

  const mainItems = mainPool.slice(0, itemCount-1).map(k=>({key:k, cat:mainCat, isOdd:false}));
  const oddItem   = {key:oddPool[0], cat:oddCat, isOdd:true};
  const items = shuffle([...mainItems, oddItem]);
  const oddIdx = items.findIndex(i=>i.isOdd);
  return { items, oddIdx, mainCatLabel:catLabels[mainCat], oddCatLabel:catLabels[oddCat] };
}

// ── START GAME ──
function startGame(){
  const elemType    = document.getElementById('elem-type').value;
  const mainCat     = document.getElementById('emoji-main-cat').value;
  const shapeDiff   = document.getElementById('shape-diff').value;
  const jelekCat    = document.getElementById('jelek-main-cat').value;
  const itemCount   = parseInt(document.getElementById('item-count').value);
  const roundCount  = parseInt(document.getElementById('round-count').value);

  GS = {
    elemType, mainCat, shapeDiff, jelekCat, itemCount, roundCount,
    currentRound: 0,
    correctCount: 0,
    wrongCount: 0,
    phase: 'playing',
  };

  document.getElementById('result-banner').style.display='none';
  document.getElementById('result-banner').classList.remove('show');
  document.getElementById('start-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  document.getElementById('finish-btn').classList.add('hidden');
  document.getElementById('score-row').classList.remove('hidden');
  document.getElementById('items-section').classList.remove('hidden');

  startRound();
}

function startRound(){
  GS.currentRound++;
  GS.phase = 'playing';

  document.getElementById('next-btn').classList.add('hidden');
  document.getElementById('finish-btn').classList.add('hidden');
  document.getElementById('result-banner').style.display='none';
  document.getElementById('result-banner').classList.remove('show');

  // Generate this round's items
  const round = generateRound(GS.elemType, GS.mainCat, GS.shapeDiff, GS.jelekCat, GS.itemCount);
  GS.currentRound_data = round;

  updateScoreBadges();
  renderItems(round);
  setStatus(`Melyik nem illik a sorba?`);
}

function updateScoreBadges(){
  document.getElementById('badge-round').textContent   = `${GS.currentRound} / ${GS.roundCount}`;
  document.getElementById('badge-correct').textContent = `✓ ${GS.correctCount}`;
  document.getElementById('badge-wrong').textContent   = `✗ ${GS.wrongCount}`;
}

// ── RENDER ITEMS ──
function renderItems(round){
  const row = document.getElementById('items-row');
  row.innerHTML='';
  // Set grid columns so no row has exactly 1 item
  const n = round.items.length;
  // Find largest cols where n % cols !== 1, prefer 4 then 3 then 2
  let cols = 4;
  for(let c=4; c>=2; c--){
    if(n % c !== 1){ cols=c; break; }
  }
  // If still 1 remainder, use cols that gives 2 on last row
  if(n % cols === 1) cols = Math.ceil(n/2);
  row.style.gridTemplateColumns = `repeat(${cols}, minmax(80px, 100px))`;

  round.items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'item-card animate-in';
    card.style.animationDelay = (i*0.06)+'s';
    card.dataset.idx = i;

    const emojiWrap = document.createElement('div');
    emojiWrap.className = 'item-emoji';
    emojiWrap.appendChild(renderKey(GS.elemType, item.key));
    card.appendChild(emojiWrap);

    card.addEventListener('click', ()=>onItemClick(i, card, item, round));
    row.appendChild(card);
  });
}

// ── ITEM CLICK ──
function onItemClick(idx, card, item, round){
  if(GS.phase!=='playing') return;
  GS.phase = 'answered';

  const correct = item.isOdd;

  // Show result on all cards
  document.querySelectorAll('.item-card').forEach((c,i)=>{
    const it = round.items[i];
    if(it.isOdd){
      c.classList.add(i===idx ? 'correct' : 'reveal');
    } else if(i===idx){
      c.classList.add('wrong');
    }
  });

  if(correct){
    GS.correctCount++;
    const r = card.getBoundingClientRect();
    spawnStars(r.left+r.width/2, r.top, 4);
    setStatus(`Helyes! Ez volt az eltérő: ${round.oddCatLabel} a többi ${round.mainCatLabel} között.`);
  } else {
    GS.wrongCount++;
    setStatus(`Nem! A nem illő elem: ${round.oddCatLabel} volt a többi ${round.mainCatLabel} között.`);
  }

  updateScoreBadges();

  // Show next/finish button
  setTimeout(()=>{
    if(GS.currentRound >= GS.roundCount){
      document.getElementById('finish-btn').classList.remove('hidden');
    } else {
      document.getElementById('next-btn').classList.remove('hidden');
    }
  }, 800);
}

function nextRound(){
  startRound();
}

// ── FINAL RESULT ──
function showFinalResult(){
  const total = GS.roundCount;
  const correct = GS.correctCount;

  document.getElementById('items-section').classList.add('hidden');
  document.getElementById('finish-btn').classList.add('hidden');

  let icon, text, sub;
  if(correct === total){
    icon='🎉'; text='Tökéletes! Mindent jól!'; sub=`${correct}/${total} helyes válasz`;
  } else if(correct >= Math.ceil(total*0.7)){
    icon='👍'; text='Szép munka!'; sub=`${correct}/${total} helyes`;
  } else if(correct >= Math.ceil(total*0.4)){
    icon='🙈'; text='Elég jó!'; sub=`${correct}/${total} helyes`;
  } else {
    icon='😮'; text='Próbáld újra!'; sub=`${correct}/${total} helyes`;
  }

  setStatus(icon+' '+text);
  document.getElementById('result-text').textContent = icon+' '+text;
  document.getElementById('result-sub').textContent  = sub;
  const b=document.getElementById('result-banner');
  b.style.display='block'; b.classList.add('show');

  document.getElementById('start-btn').textContent='🔄 Új játék';
  document.getElementById('start-btn').classList.remove('hidden');
  document.getElementById('score-row').classList.add('hidden');
}
</script>
