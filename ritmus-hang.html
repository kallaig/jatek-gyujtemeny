<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritmusjáték</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8EC;
      --ti-color: #FF6B6B;
      --ti-shadow: #c94b4b;
      --taa-color: #4ECDC4;
      --taa-shadow: #2da89f;
      --text: #3a2a1a;
      --note-color: #FFD166;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      color: var(--text);
      margin-bottom: 0.3rem;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: #8a7060;
      margin-bottom: 3rem;
      font-weight: 700;
    }

    /* Buttons row */
    .buttons {
      display: flex;
      gap: clamp(1.5rem, 5vw, 4rem);
      justify-content: center;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    /* Button wrapper holds label + button */
    .btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .btn-label {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 700;
      color: #8a7060;
      letter-spacing: 0.05em;
    }

    /* The beat buttons */
    .beat-btn {
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      transition: transform 0.08s, box-shadow 0.08s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
    }

    .beat-btn::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      transform: scale(0.9);
    }

    .beat-btn:active {
      transform: scale(0.91) translateY(6px) !important;
    }

    /* TI button - small */
    .btn-ti {
      width: clamp(110px, 22vw, 160px);
      height: clamp(110px, 22vw, 160px);
      font-size: clamp(2rem, 5vw, 3rem);
      background: var(--ti-color);
      box-shadow: 0 8px 0 var(--ti-shadow), 0 12px 30px rgba(255,107,107,0.35);
    }

    .btn-ti::after {
      background: radial-gradient(circle, rgba(255,180,180,0.6), transparent 70%);
    }

    /* TÁ button - big */
    .btn-taa {
      width: clamp(170px, 35vw, 250px);
      height: clamp(170px, 35vw, 250px);
      font-size: clamp(2.5rem, 6vw, 4rem);
      background: var(--taa-color);
      box-shadow: 0 10px 0 var(--taa-shadow), 0 16px 40px rgba(78,205,196,0.35);
    }

    .btn-taa::after {
      background: radial-gradient(circle, rgba(150,255,250,0.5), transparent 70%);
    }

    /* Pressed state */
    .beat-btn.pressed {
      transform: scale(0.91) translateY(6px);
    }

    .btn-ti.pressed {
      box-shadow: 0 3px 0 var(--ti-shadow), 0 6px 20px rgba(255,107,107,0.25);
    }
    .btn-taa.pressed {
      box-shadow: 0 4px 0 var(--taa-shadow), 0 8px 25px rgba(78,205,196,0.25);
    }

    /* Ripple effect */
    .ripple {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: rippleOut 0.6s ease-out forwards;
      z-index: 10;
    }

    @keyframes rippleOut {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }

    /* Rhythm display */
    .rhythm-display {
      margin-top: 2.5rem;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      max-width: 600px;
    }

    .beat-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 900;
      border-radius: 50px;
      padding: 0.3rem 0.8rem;
      animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      color: white;
    }

    .beat-dot.ti {
      background: var(--ti-color);
      box-shadow: 0 3px 0 var(--ti-shadow);
    }

    .beat-dot.taa {
      background: var(--taa-color);
      box-shadow: 0 3px 0 var(--taa-shadow);
    }

    @keyframes popIn {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* Action buttons row */
    .action-row {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Check button */
    .check-btn {
      background: #FFD166;
      border: none;
      color: #5a4010;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      padding: 0.6rem 1.8rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 0 #c9a030;
      transition: all 0.1s;
    }

    .check-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #c9a030;
    }

    .check-btn:hover {
      background: #ffc940;
    }

    /* Clear button */
    .clear-btn {
      background: none;
      border: 3px solid #d0c0b0;
      color: #a09080;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background: #f0e8e0;
      border-color: #b0a090;
      color: #7a6a60;
    }

    /* Rhythm display hidden by default */
    .rhythm-display {
      margin-top: 2rem;
      min-height: 60px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      max-width: 600px;
    }

    .rhythm-display.visible {
      display: flex;
    }

    /* Keyboard hint */
    .hint {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #b0a090;
      font-weight: 700;
    }

    kbd {
      background: #e8ddd0;
      border: 2px solid #c0b0a0;
      border-radius: 6px;
      padding: 2px 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      color: #8a7060;
    }
    /* Start screen */
    .start-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .start-box {
      text-align: center;
      padding: 2rem;
    }
    .start-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    .start-box h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .start-box p {
      color: #8a7060;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 2rem;
    }
    .start-btn {
      background: #FF6B6B;
      border: none;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      padding: 0.8rem 2.5rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #c94b4b;
      transition: all 0.1s;
    }
    .start-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #c94b4b;
    }
  </style>
</head>
<body>
<!-- back-btn -->
<style>
.back-btn {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 9999;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 2px solid rgba(0,0,0,0.08);
  border-radius: 50px;
  padding: 8px 16px 8px 12px;
  font-family: sans-serif;
  font-size: 0.85rem;
  font-weight: 900;
  color: #333;
  text-decoration: none;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  transition: transform 0.15s, box-shadow 0.15s;
}
.back-btn:hover {
  transform: translateX(-3px);
  box-shadow: 0 5px 18px rgba(0,0,0,0.18);
}
</style>
<a class="back-btn" href="../index.html">← Vissza</a>


  <!-- Start screen -->
  <div id="startScreen" class="start-screen">
    <div class="start-box">
      <div class="start-icon">🎵</div>
      <h1>Ritmusjáték</h1>
      <p>Ismerd fel a rövid és hosszú szótagokat!</p>
      <button id="startBtn" class="start-btn">▶ Kezdjük!</button>
    </div>
  </div>

  <!-- Main app (hidden until start) -->
  <div id="mainApp" style="display:none">
  <div class="container">
    <h1>🎵 Ritmusjáték</h1>
    <p class="subtitle">Nyomd meg a gombokat – érezd a ritmust!</p>

    <div class="buttons">
      <!-- TI button -->
      <div class="btn-wrap">
        <span class="btn-label">rövid szótag</span>
        <button class="beat-btn btn-ti" id="btnTi" title="Ti – rövid hang">ti</button>
      </div>

      <!-- TÁ button -->
      <div class="btn-wrap">
        <span class="btn-label">hosszú szótag</span>
        <button class="beat-btn btn-taa" id="btnTaa" title="Táááá – hosszú hang">tá</button>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="action-row">
      <button class="check-btn" id="checkBtn">🔍 Ellenőrzés</button>
      <button class="clear-btn" id="clearBtn">✕ Törlés</button>
    </div>

    <!-- Rhythm record (hidden until check) -->
    <div class="rhythm-display" id="rhythmDisplay"></div>

    <p class="hint">
      Billentyűzet: <kbd>T</kbd> = ti &nbsp;|&nbsp; <kbd>Space</kbd> = tá
    </p>
  </div>
  </div><!-- end mainApp -->

  <script>
    // --- Audio engine ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let ctx = null;

    // The start button click creates & unlocks the context, THEN shows the app.
    // This guarantees ctx is running before any tone is scheduled.
    document.getElementById('startBtn').addEventListener('click', () => {
      ctx = new AudioContext();
      ctx.resume().then(() => {
        // Play silent buffer to fully unlock
        const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        // Show main UI
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
      });
    });

    // Compressor + master gain for maximum loudness
    let compressor = null;
    let masterGain = null;

    function setupChain() {
      compressor = ctx.createDynamicsCompressor();
      compressor.threshold.value = -6;
      compressor.knee.value      = 3;
      compressor.ratio.value     = 20;
      compressor.attack.value    = 0.001;
      compressor.release.value   = 0.1;

      masterGain = ctx.createGain();
      masterGain.gain.value = 1.4;

      compressor.connect(masterGain);
      masterGain.connect(ctx.destination);
    }

    function playTone(freq, duration, type = 'sine', fadeIn = 0.01, vol = 0.95) {
      if (!ctx) return;
      if (!compressor) setupChain();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(compressor);
      osc.type = type;
      const t = ctx.currentTime;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + fadeIn);
      gain.gain.setValueAtTime(vol, t + duration - 0.05);
      gain.gain.linearRampToValueAtTime(0, t + duration);
      osc.start(t);
      osc.stop(t + duration + 0.05);
    }

    function playTi()  { playTone(520, 0.18, 'triangle', 0.008); }
    function playTaa() { playTone(370, 0.65, 'sine',     0.015, 1.6); }

    // --- Ripple ---
    function spawnRipple(x, y, color) {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.cssText = `left:${x}px;top:${y}px;width:80px;height:80px;background:${color};`;
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 700);
    }

    // --- Rhythm log ---
    const display = document.getElementById('rhythmDisplay');
    let beatLog = [];

    function addBeat(type) {
      beatLog.push(type);
      if (beatLog.length > 24) beatLog.shift();
      // Hide display again if new beat added after reveal
      display.classList.remove('visible');
    }

    function renderBeats() {
      display.innerHTML = '';
      beatLog.forEach(b => {
        const dot = document.createElement('span');
        dot.className = `beat-dot ${b}`;
        dot.textContent = b === 'ti' ? 'ti' : 'tá';
        display.appendChild(dot);
      });
    }

    function triggerTi(x, y) {
      playTi();
      spawnRipple(x, y, 'rgba(255,107,107,0.4)');
      addBeat('ti');
      pulse(btnTi);
    }

    function triggerTaa(x, y) {
      playTaa();
      spawnRipple(x, y, 'rgba(78,205,196,0.4)');
      addBeat('taa');
      pulse(btnTaa);
    }

    function pulse(el) {
      el.classList.add('pressed');
      setTimeout(() => el.classList.remove('pressed'), 150);
    }

    const btnTi  = document.getElementById('btnTi');
    const btnTaa = document.getElementById('btnTaa');

    btnTi.addEventListener('pointerdown', e => {
      e.preventDefault();
      const r = btnTi.getBoundingClientRect();
      triggerTi(r.left + r.width/2, r.top + r.height/2);
    });

    btnTaa.addEventListener('pointerdown', e => {
      e.preventDefault();
      const r = btnTaa.getBoundingClientRect();
      triggerTaa(r.left + r.width/2, r.top + r.height/2);
    });

    // Keyboard
    const keys = new Set();
    document.addEventListener('keydown', e => {
      if (keys.has(e.code)) return;
      keys.add(e.code);
      if (e.code === 'KeyT') {
        const r = btnTi.getBoundingClientRect();
        triggerTi(r.left + r.width/2, r.top + r.height/2);
      }
      if (e.code === 'Space') {
        e.preventDefault();
        const r = btnTaa.getBoundingClientRect();
        triggerTaa(r.left + r.width/2, r.top + r.height/2);
      }
    });
    document.addEventListener('keyup', e => keys.delete(e.code));

    // Check button – reveal rhythm
    document.getElementById('checkBtn').addEventListener('click', () => {
      if (beatLog.length === 0) return;
      renderBeats();
      display.classList.add('visible');
    });

    // Clear
    document.getElementById('clearBtn').addEventListener('click', () => {
      beatLog = [];
      display.innerHTML = '';
      display.classList.remove('visible');
    });
  </script>
</body>
</html>
