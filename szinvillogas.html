<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Színvillogás</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #111;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #display {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #square {
    width: min(90vw, 90vh);
    height: min(90vw, 90vh);
    border-radius: 12px;
    background: #222;
  }

  #controls {
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 40px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 320px;
    height: 10px;
    border-radius: 10px;
    background: #333;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
  }

  input[type=range]::-moz-range-thumb {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<!-- back-btn -->
<style>
.back-btn {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 9999;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 2px solid rgba(0,0,0,0.08);
  border-radius: 50px;
  padding: 8px 16px 8px 12px;
  font-family: sans-serif;
  font-size: 0.85rem;
  font-weight: 900;
  color: #333;
  text-decoration: none;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  transition: transform 0.15s, box-shadow 0.15s;
}
.back-btn:hover {
  transform: translateX(-3px);
  box-shadow: 0 5px 18px rgba(0,0,0,0.18);
}
</style>
<a class="back-btn" href="../index.html">← Vissza</a>


<div id="display">
  <div id="square"></div>
</div>

<div id="controls">
  <input type="range" id="speed" min="0" max="100" value="50">
</div>

<script>
  const colors = ['#2ECC40', '#FF4136', '#FFDC00', '#0074D9'];
  const square = document.getElementById('square');
  const speedSlider = document.getElementById('speed');
  let timer = null;
  let lastColor = null;

  function randomColor() {
    let available = colors.filter(c => c !== lastColor);
    let color = available[Math.floor(Math.random() * available.length)];
    lastColor = color;
    return color;
  }

  function flash() {
    square.style.background = randomColor();
  }

  function getInterval(val) {
    if (val === 0) return null;
    return Math.round(2000 - (val - 1) * (1920 / 99));
  }

  function restart() {
    clearInterval(timer);
    const interval = getInterval(parseInt(speedSlider.value));
    if (interval === null) {
      square.style.background = '#222';
    } else {
      flash();
      timer = setInterval(flash, interval);
    }
  }

  speedSlider.addEventListener('input', restart);
  restart();
</script>
</body>
</html>
