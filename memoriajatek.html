<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Memóriajáték</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--sky:#6EC6F5;--sun:#FFD43B;--grass:#51CF66;--coral:#FF6B6B;--purple:#CC5DE8;--orange:#FF922B;--mint:#38D9A9;--pink:#F783AC;--bg:#FFF9EC;--shadow:0 6px 24px rgba(0,0,0,.10);--radius:22px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
.bg-shapes{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.shape{position:absolute;border-radius:50%;opacity:.12;animation:floatShape 8s ease-in-out infinite;}
.shape:nth-child(1){width:180px;height:180px;background:var(--sky);top:5%;left:-40px;}
.shape:nth-child(2){width:120px;height:120px;background:var(--coral);top:20%;right:-20px;animation-delay:1.5s;}
.shape:nth-child(3){width:200px;height:200px;background:var(--sun);bottom:10%;left:10%;animation-delay:3s;}
.shape:nth-child(4){width:100px;height:100px;background:var(--purple);bottom:30%;right:5%;animation-delay:2s;}
.shape:nth-child(5){width:140px;height:140px;background:var(--grass);top:50%;left:40%;animation-delay:4s;}
@keyframes floatShape{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-18px) scale(1.05);}}
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:16px 12px 50px;}
header{text-align:center;padding:16px 0 8px;}
.header-title{font-size:clamp(1.9rem,7vw,3.2rem);font-weight:900;background:linear-gradient(135deg,var(--coral),var(--purple),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.header-sub{font-size:1rem;color:#999;margin-top:4px;}
.stars-display{display:flex;gap:4px;justify-content:center;margin-top:6px;font-size:1.4rem;}
.tabs{display:flex;gap:8px;justify-content:center;margin:18px 0 10px;flex-wrap:wrap;}
.tab-btn{font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;padding:9px 18px;border:none;border-radius:50px;cursor:pointer;transition:all .2s;background:white;color:#aaa;box-shadow:0 3px 10px rgba(0,0,0,.08);}
.tab-btn.active{background:linear-gradient(135deg,var(--coral),var(--purple));color:white;box-shadow:0 6px 18px rgba(204,93,232,.35);transform:translateY(-2px);}
.panel{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 26px;margin-bottom:16px;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.panel-title{font-size:1.2rem;font-weight:800;color:#444;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.settings-grid{grid-template-columns:1fr;}}
.setting-item label{display:block;font-size:.88rem;font-weight:700;color:#666;margin-bottom:5px;}
.setting-item select,.setting-item input[type=range]{width:100%;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;border:2.5px solid #eee;border-radius:12px;padding:7px 11px;background:#fafafa;color:#444;outline:none;transition:border-color .2s;cursor:pointer;}
.setting-item select:focus{border-color:var(--purple);}
.difficulty-btns{display:flex;gap:7px;flex-wrap:wrap;}
.diff-btn{font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;padding:7px 16px;border:2.5px solid transparent;border-radius:50px;cursor:pointer;transition:all .2s;opacity:.55;}
.diff-btn.easy{background:#D3F9D8;color:#2F9E44;}.diff-btn.medium{background:#FFF3BF;color:#E67700;}.diff-btn.hard{background:#FFE3E3;color:#C92A2A;}
.diff-btn.active{opacity:1;transform:scale(1.07);border-color:currentColor;box-shadow:0 4px 14px rgba(0,0,0,.13);}
.range-row{display:flex;align-items:center;gap:8px;}
.range-val{min-width:30px;text-align:center;font-size:1.05rem;font-weight:800;color:var(--purple);background:#F3F0FF;border-radius:8px;padding:2px 6px;}
.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:6px 0 14px;}
.mode-card{background:#fafafa;border:2.5px solid #eee;border-radius:16px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;font-weight:700;font-size:.88rem;color:#666;}
.mode-card .mode-icon{font-size:1.9rem;margin-bottom:6px;}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.10);}
.mode-card.active{border-color:var(--purple);background:#F9F0FF;color:var(--purple);box-shadow:0 4px 16px rgba(204,93,232,.25);transform:translateY(-2px);}
.btn-start{display:block;width:100%;font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:800;color:white;background:linear-gradient(135deg,var(--grass),var(--sky));border:none;border-radius:50px;padding:15px 28px;cursor:pointer;box-shadow:0 8px 24px rgba(81,207,102,.4);transition:all .2s;margin-top:8px;}
.btn-start:hover{transform:translateY(-3px) scale(1.02);}
.btn-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
.btn-action{flex:1;min-width:120px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;padding:11px 18px;border:none;border-radius:50px;cursor:pointer;transition:all .2s;color:white;}
.btn-check{background:linear-gradient(135deg,var(--purple),var(--sky));box-shadow:0 5px 16px rgba(110,198,245,.4);}
.btn-next{background:linear-gradient(135deg,var(--grass),var(--mint));box-shadow:0 5px 16px rgba(56,217,169,.4);}
.btn-reset{background:linear-gradient(135deg,var(--coral),var(--orange));box-shadow:0 5px 16px rgba(255,107,107,.4);}
.btn-action:hover{transform:translateY(-2px) scale(1.03);}
#game-area{display:none;}
.phase-label{text-align:center;font-size:1.35rem;font-weight:800;color:#555;margin-bottom:12px;min-height:38px;}
.phase-label span{color:var(--purple);}
.progress-wrap{background:#F0F0F0;border-radius:50px;height:10px;margin-bottom:18px;overflow:hidden;}
.progress-bar{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--coral),var(--purple));transition:width .4s;}
.round-info{display:flex;justify-content:space-between;align-items:center;font-size:.88rem;font-weight:700;color:#999;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.score-badge{background:linear-gradient(135deg,var(--sun),var(--orange));color:white;border-radius:50px;padding:4px 13px;font-size:.9rem;font-weight:800;box-shadow:0 3px 10px rgba(255,146,43,.35);}
.mode-badge{font-size:.75rem;font-weight:800;padding:3px 10px;border-radius:50px;background:#F3F0FF;color:var(--purple);}
.img-grid{display:grid;gap:10px;justify-items:center;margin-bottom:14px;}
.img-card{background:white;border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.09);padding:10px 8px;cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);border:3px solid transparent;display:flex;flex-direction:column;align-items:center;gap:5px;user-select:none;position:relative;width:100%;}
.img-card:hover:not(.locked){transform:translateY(-4px) scale(1.05);box-shadow:0 10px 26px rgba(0,0,0,.14);}
.img-card .emoji{font-size:clamp(1.8rem,6vw,3rem);line-height:1;}
.img-card .label{font-size:.75rem;font-weight:700;color:#999;text-align:center;}
.img-card.selected{border-color:var(--purple);background:#F9F0FF;transform:scale(1.06);}
.img-card.correct{border-color:var(--grass);background:#EBFBEE;animation:pop .35s;}
.img-card.wrong{border-color:var(--coral);background:#FFF5F5;animation:shake .4s;}
.img-card.locked{cursor:default;}
.img-card.face-down{background:linear-gradient(135deg,#74C0FC,#4DABF7);border-color:#339AF0;}
.img-card.face-down .emoji,.img-card.face-down .label{visibility:hidden;}
.img-card.face-down::after{content:'?';position:absolute;font-size:2rem;font-weight:900;color:white;opacity:.8;}
.order-slots{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.order-slot{min-width:54px;min-height:54px;border:3px dashed #DDD;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:#FAFAFA;transition:all .2s;position:relative;}
.order-slot.filled{border-style:solid;border-color:var(--purple);background:#F3F0FF;}
.order-slot .slot-num{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--purple);color:white;font-size:.62rem;font-weight:800;border-radius:50px;padding:1px 7px;}
.feedback-box{text-align:center;padding:14px;border-radius:16px;margin-top:10px;font-size:1.1rem;font-weight:800;display:none;animation:fadeIn .3s;}
.feedback-box.success{background:#EBFBEE;color:#2F9E44;}.feedback-box.fail{background:#FFF5F5;color:#C92A2A;}
.timer-ring{width:52px;height:52px;border-radius:50%;border:5px solid #EEE;border-top-color:var(--coral);animation:spin 1s linear infinite;margin:0 auto 10px;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAIRS */
.pairs-grid{display:grid;gap:10px;justify-items:center;margin-bottom:14px;}
/* CHANGED */
.changed-grid{display:flex;gap:0;justify-content:center;flex-wrap:wrap;margin-bottom:14px;background:white;border-radius:18px;overflow:hidden;border:2.5px solid #EEE;}
.changed-col{flex:1;min-width:110px;padding:14px 12px;}
.changed-col:first-child{border-right:3px solid #DEE2E6;background:#FAFAFA;}
.changed-col:last-child{background:#F8F0FF;}
.changed-label{text-align:center;font-size:.82rem;font-weight:800;margin-bottom:10px;padding:5px 12px;border-radius:50px;display:inline-block;width:100%;}
.changed-col:first-child .changed-label{background:#E9ECEF;color:#666;}
.changed-col:last-child .changed-label{background:#E9D8FD;color:var(--purple);}
/* COUNT */
.count-display{text-align:center;font-size:4.5rem;font-weight:900;color:var(--purple);padding:18px 0;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.count-options{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.count-btn{font-family:'Nunito',sans-serif;font-size:1.4rem;font-weight:800;width:66px;height:66px;border:3px solid #EEE;border-radius:16px;background:white;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(0,0,0,.08);color:#444;}
.count-btn:hover{transform:translateY(-3px) scale(1.06);border-color:var(--purple);background:#F9F0FF;}
.count-btn.correct{border-color:var(--grass);background:#EBFBEE;color:#2F9E44;}
.count-btn.wrong{border-color:var(--coral);background:#FFF5F5;color:#C92A2A;}
.missing-question{padding:12px;background:#F8F9FA;border-radius:14px;margin-bottom:10px;}
/* RESULT */
#result-screen{display:none;text-align:center;padding:28px 18px;animation:fadeIn .4s;}
.result-emoji{font-size:4.5rem;margin-bottom:8px;animation:bounce 1s infinite;}
.result-title{font-size:1.8rem;font-weight:900;color:#444;}
.result-score{font-size:1.1rem;color:#888;margin:8px 0 14px;}
.result-stars{font-size:2.5rem;margin:8px 0 20px;}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:confettiFall 1.8s ease-in forwards;z-index:999;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1.06)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>

<!-- back-btn -->
<style>
.back-btn {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 9999;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 2px solid rgba(0,0,0,0.08);
  border-radius: 50px;
  padding: 8px 16px 8px 12px;
  font-family: sans-serif;
  font-size: 0.85rem;
  font-weight: 900;
  color: #333;
  text-decoration: none;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  transition: transform 0.15s, box-shadow 0.15s;
}
.back-btn:hover {
  transform: translateX(-3px);
  box-shadow: 0 5px 18px rgba(0,0,0,0.18);
}
</style>
<a class="back-btn" href="../index.html">← Vissza</a>

<div class="bg-shapes"><div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div></div>
<div class="app">
  <header>
    <div class="header-title">🧠 Memóriajáték</div>
    <div class="header-sub">Fejleszd az emlékezetedet játszva!</div>
    <div class="stars-display" id="total-stars"></div>
  </header>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('game')">🎮 Játék</button>
    <button class="tab-btn" onclick="switchTab('settings')">⚙️ Beállítások</button>
  </div>
  <!-- SETTINGS -->
  <div class="panel" id="settings-panel" style="display:none">
    <div class="panel-title">⚙️ Pedagógus / Szülő beállítások</div>
    <div class="settings-grid">
      <div class="setting-item">
        <label>🎯 Nehézségi szint</label>
        <div class="difficulty-btns">
          <button class="diff-btn easy active" onclick="setDiff('easy',this)">🌱 Könnyű</button>
          <button class="diff-btn medium" onclick="setDiff('medium',this)">🌿 Közepes</button>
          <button class="diff-btn hard" onclick="setDiff('hard',this)">🌳 Nehéz</button>
        </div>
      </div>
      <div class="setting-item">
        <label>🖼️ Képek száma</label>
        <div class="range-row">
          <input type="range" id="img-count" min="2" max="10" value="4" oninput="document.getElementById('img-count-val').textContent=this.value">
          <div class="range-val" id="img-count-val">4</div>
        </div>
      </div>
      <div class="setting-item">
        <label>👁️ Megjegyzési idő (mp)</label>
        <div class="range-row">
          <input type="range" id="mem-time" min="2" max="15" value="5" oninput="document.getElementById('mem-time-val').textContent=this.value">
          <div class="range-val" id="mem-time-val">5</div>
        </div>
      </div>
      <div class="setting-item">
        <label>🎨 Képkategória</label>
        <select id="category">
          <option value="animals">🐶 Állatok</option>
          <option value="food">🍎 Ételek</option>
          <option value="nature">🌸 Természet</option>
          <option value="transport">🚗 Járművek</option>
          <option value="mixed">🎲 Vegyes</option>
        </select>
      </div>
      <div class="setting-item">
        <label>🔄 Körök száma</label>
        <div class="range-row">
          <input type="range" id="rounds" min="1" max="10" value="5" oninput="document.getElementById('rounds-val').textContent=this.value">
          <div class="range-val" id="rounds-val">5</div>
        </div>
      </div>
      <div class="setting-item">
        <label>🎮 Játékmód</label>
        <select id="settings-mode">
          <option value="recall">🔁 Visszamondás</option>
          <option value="order">🔢 Sorba rendezés</option>
          <option value="missing">🔍 Mi hiányzik?</option>
          <option value="pairs">🪞 Páros memória</option>
          <option value="changed">🎨 Mi változott?</option>
          <option value="count">🔢 Hány volt?</option>
          <option value="mixed_all">🎲 Vegyes (mind)</option>
        </select>
      </div>
    </div>
    <button class="btn-start" onclick="applySettings()">✅ Mentés és játék indítása</button>
  </div>
  <!-- GAME -->
  <div id="game-panel">
    <div class="panel" id="start-screen">
      <div style="text-align:center;padding:6px 0 4px">
        <div style="font-size:3.2rem;margin-bottom:10px">🧸</div>
        <div style="font-size:1.15rem;font-weight:800;color:#555;margin-bottom:12px">Válassz játékmódot!</div>
        <div class="mode-grid">
          <div class="mode-card active" onclick="selectMode('recall',this)"><div class="mode-icon">🔁</div>Visszamondás</div>
          <div class="mode-card" onclick="selectMode('order',this)"><div class="mode-icon">🔢</div>Sorba rendezés</div>
          <div class="mode-card" onclick="selectMode('missing',this)"><div class="mode-icon">🔍</div>Mi hiányzik?</div>
          <div class="mode-card" onclick="selectMode('pairs',this)"><div class="mode-icon">🪞</div>Páros memória</div>
          <div class="mode-card" onclick="selectMode('changed',this)"><div class="mode-icon">🎨</div>Mi változott?</div>
          <div class="mode-card" onclick="selectMode('count',this)"><div class="mode-icon">🔢</div>Hány volt?</div>
        </div>
        <button class="btn-start" onclick="startGame()">🚀 Játék indítása!</button>
      </div>
    </div>
    <div id="game-area">
      <div class="panel">
        <div class="round-info">
          <span id="round-label">Kör: 1 / 5</span>
          <span class="mode-badge" id="mode-badge">🔁 Visszamondás</span>
          <div class="score-badge">⭐ <span id="score-val">0</span> pont</div>
        </div>
        <div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
        <div class="timer-ring" id="timer-ring"></div>
        <div class="phase-label" id="phase-label"></div>
        <div class="img-grid" id="img-grid"></div>
        <div class="order-slots" id="order-slots" style="display:none"></div>
        <div class="pairs-grid" id="pairs-grid" style="display:none"></div>

        <div id="count-area" style="display:none">
          <div class="count-display" id="count-display"></div>
          <div class="count-options" id="count-options"></div>
        </div>
        <div class="changed-grid" id="changed-grid" style="display:none"></div>
        <div class="missing-question" id="missing-q" style="display:none"></div>
        <div class="feedback-box" id="feedback-box"></div>
        <div class="btn-row" id="btn-row" style="display:none">
          <button class="btn-action btn-check" id="btn-check" onclick="routeCheck()" style="display:none">✅ Ellenőrzés</button>
          <button class="btn-action btn-next" id="btn-next" onclick="nextRound()" style="display:none">➡️ Következő</button>
          <button class="btn-action btn-reset" onclick="resetGame()">🏠 Kezdőoldal</button>
        </div>
      </div>
    </div>
    <div id="result-screen">
      <div class="panel">
        <div class="result-emoji" id="res-emoji">🎉</div>
        <div class="result-title" id="res-title">Szuper!</div>
        <div class="result-score" id="res-score"></div>
        <div class="result-stars" id="res-stars"></div>
        <button class="btn-start" onclick="resetGame()">🏠 Kezdőoldal</button>
        <button class="btn-action btn-reset" style="margin-top:10px;width:100%" onclick="startGame(true)">⚡ Ugyanez újra</button>
      </div>
    </div>
  </div>
</div>
<script>
const EMOJI_SETS={
  animals:[{e:'🐶',l:'Kutya'},{e:'🐱',l:'Macska'},{e:'🐭',l:'Egér'},{e:'🐹',l:'Hörcsög'},{e:'🐰',l:'Nyúl'},{e:'🦊',l:'Róka'},{e:'🐻',l:'Medve'},{e:'🐼',l:'Panda'},{e:'🐨',l:'Koala'},{e:'🐯',l:'Tigris'},{e:'🦁',l:'Oroszlán'},{e:'🐮',l:'Tehén'},{e:'🐷',l:'Malac'},{e:'🐸',l:'Béka'},{e:'🦋',l:'Pillangó'},{e:'🐙',l:'Polip'}],
  food:[{e:'🍎',l:'Alma'},{e:'🍌',l:'Banán'},{e:'🍇',l:'Szőlő'},{e:'🍓',l:'Eper'},{e:'🍕',l:'Pizza'},{e:'🌮',l:'Taco'},{e:'🍦',l:'Fagylalt'},{e:'🍰',l:'Torta'},{e:'🍩',l:'Fánk'},{e:'🥕',l:'Répa'},{e:'🌽',l:'Kukorica'},{e:'🍉',l:'Dinnye'},{e:'🍊',l:'Narancs'},{e:'🥝',l:'Kivi'},{e:'🍋',l:'Citrom'},{e:'🥑',l:'Avokádó'}],
  nature:[{e:'🌸',l:'Cseresznyevirág'},{e:'🌻',l:'Napraforgó'},{e:'🌈',l:'Szivárvány'},{e:'⭐',l:'Csillag'},{e:'🌙',l:'Hold'},{e:'☀️',l:'Nap'},{e:'🌊',l:'Hullám'},{e:'🍀',l:'Lóhere'},{e:'🌴',l:'Pálmafa'},{e:'🌵',l:'Kaktusz'},{e:'🍄',l:'Gomba'},{e:'🌺',l:'Hibiszkusz'},{e:'🐚',l:'Kagyló'},{e:'❄️',l:'Hópehely'},{e:'🌿',l:'Levél'},{e:'🦀',l:'Rák'}],
  transport:[{e:'🚗',l:'Autó'},{e:'🚕',l:'Taxi'},{e:'🚌',l:'Busz'},{e:'🚎',l:'Trolibusz'},{e:'🚂',l:'Vonat'},{e:'✈️',l:'Repülő'},{e:'🚀',l:'Rakéta'},{e:'🚁',l:'Helikopter'},{e:'🚢',l:'Hajó'},{e:'🚲',l:'Kerékpár'},{e:'🛵',l:'Robogó'},{e:'🚒',l:'Tűzoltó'},{e:'🚑',l:'Mentő'},{e:'🚓',l:'Rendőrautó'},{e:'🛶',l:'Csónak'},{e:'🚜',l:'Traktor'}]
};
const MODE_LABELS={recall:'🔁 Visszamondás',order:'🔢 Sorba rendezés',missing:'🔍 Mi hiányzik?',pairs:'🪞 Páros memória',changed:'🎨 Mi változott?',count:'🔢 Hány volt?'};
const DIFF_PRESETS={easy:{count:4,memTime:6},medium:{count:6,memTime:4},hard:{count:8,memTime:3}};
let cfg={count:4,memTime:5,category:'animals',rounds:5,mode:'recall'};
let currentDiff='easy',selectedMode='recall',state={};
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function $(id){return document.getElementById(id);}
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='game')||(i===1&&t==='settings')));
  $('settings-panel').style.display=t==='settings'?'block':'none';
  $('game-panel').style.display=t==='game'?'block':'none';
}
function selectMode(m,el){selectedMode=m;document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('active'));el.classList.add('active');}
function setQuickDiff(d){currentDiff=d;['easy','medium','hard'].forEach(x=>$('qs-'+x).classList.toggle('active',x===d));}
function setDiff(d,btn){
  currentDiff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const p=DIFF_PRESETS[d];
  $('img-count').value=p.count;$('img-count-val').textContent=p.count;
  $('mem-time').value=p.memTime;$('mem-time-val').textContent=p.memTime;
}
function applySettings(){
  cfg.count=+$('img-count').value;cfg.memTime=+$('mem-time').value;
  cfg.category=$('category').value;cfg.rounds=+$('rounds').value;
  selectedMode=$('settings-mode').value;
  switchTab('game');startGame(true);
}
function getPool(cat){
  if(cat==='mixed'){return [...EMOJI_SETS.animals,...EMOJI_SETS.food,...EMOJI_SETS.nature,...EMOJI_SETS.transport];}
  return EMOJI_SETS[cat]||EMOJI_SETS.animals;
}
function startGame(fromSettings){
  $('start-screen').style.display='none';$('result-screen').style.display='none';$('game-area').style.display='block';
  if(!fromSettings){const p=DIFF_PRESETS[currentDiff];cfg.count=p.count;cfg.memTime=p.memTime;}
  if(!cfg.rounds)cfg.rounds=5;
  state={round:1,score:0,totalStars:0,answered:false,pairsFlipped:[],pairsMatched:new Set(),pairsLock:false};
  updateStarsDisplay();loadRound();
}
function pickRandom(){const m=['recall','order','missing','pairs','changed','count'];return m[Math.floor(Math.random()*m.length)];}
function loadRound(){
  state.answered=false;state.pairsFlipped=[];state.pairsMatched=new Set();state.pairsLock=false;
  let mode=selectedMode==='mixed_all'?pickRandom():selectedMode;
  state.currentMode=mode;
  hideAll();updateRoundUI();
  const pool=shuffle(getPool(cfg.category));
  state.shownItems=pool.slice(0,cfg.count);
  state.shownOrder=[...state.shownItems];
  state.distractors=pool.slice(cfg.count,cfg.count+Math.min(cfg.count,4));
  $('mode-badge').textContent=MODE_LABELS[mode]||mode;
  if(mode==='pairs'){loadPairs();return;}
  if(mode==='count'){loadCount();return;}
  if(mode==='changed'){loadChanged();return;}
  renderMemorize();
  startTimer(cfg.memTime,()=>startAnswerPhase(mode));
}
function hideAll(){
  $('img-grid').style.display='grid';$('img-grid').innerHTML='';
  $('order-slots').style.display='none';$('pairs-grid').style.display='none';
  $('count-area').style.display='none';
  $('changed-grid').style.display='none';$('changed-grid').innerHTML='';
  $('missing-q').style.display='none';$('feedback-box').style.display='none';
  $('btn-row').style.display='none';$('btn-check').style.display='none';$('btn-next').style.display='none';
  $('timer-ring').style.display='none';
}
function updateRoundUI(){
  $('round-label').textContent='Kör: '+state.round+' / '+cfg.rounds;
  $('score-val').textContent=state.score;
  $('prog-bar').style.width=((state.round-1)/cfg.rounds*100)+'%';
}
function startTimer(sec,cb){
  $('timer-ring').style.display='block';let t=sec;
  $('phase-label').innerHTML='👀 Figyelj! <span>'+t+'</span> mp';
  const iv=setInterval(()=>{t--;$('phase-label').innerHTML='👀 Figyelj! <span>'+t+'</span> mp';if(t<=0){clearInterval(iv);$('timer-ring').style.display='none';cb();}},1000);
}
function renderMemorize(){
  const grid=$('img-grid'),isOrder=(state.currentMode==='order');
  const cols=isOrder?cfg.count:(cfg.count<=4?2:cfg.count<=6?3:4);
  grid.style.gridTemplateColumns='repeat('+cols+',1fr)';
  grid.style.overflowX=isOrder?'auto':'';
  grid.innerHTML=state.shownItems.map((item,i)=>'<div class="img-card locked" id="mc-'+i+'"><div class="emoji">'+item.e+'</div><div class="label">'+item.l+'</div></div>').join('');
}
function startAnswerPhase(mode){if(mode==='recall')startRecall();else if(mode==='order')startOrder();else if(mode==='missing')startMissing();}
/* RECALL */
function startRecall(){
  $('phase-label').innerHTML='🤔 <span>Melyik képeket láttad?</span> Kattints rájuk!';
  state.selected=[];
  const all=shuffle([...state.shownItems,...state.distractors]);
  const cols=all.length<=4?2:all.length<=6?3:4;
  const grid=$('img-grid');grid.style.gridTemplateColumns='repeat('+cols+',1fr)';grid.style.overflowX='';
  grid.innerHTML=all.map((item,i)=>'<div class="img-card" id="ri-'+i+'" onclick="toggleRecall('+i+')" data-key="'+item.e+'"><div class="emoji">'+item.e+'</div><div class="label">'+item.l+'</div></div>').join('');
  showBtnRow(true,false);
}
function toggleRecall(i){
  if(state.answered)return;
  const card=$('ri-'+i),key=card.dataset.key;
  if(state.selected.includes(key)){state.selected=state.selected.filter(k=>k!==key);card.classList.remove('selected');}
  else{state.selected.push(key);card.classList.add('selected');}
}
function checkRecall(){
  state.answered=true;const shown=state.shownItems.map(x=>x.e);let correct=0;
  document.querySelectorAll('[id^="ri-"]').forEach(card=>{
    const key=card.dataset.key,wasShown=shown.includes(key),wasSel=state.selected.includes(key);
    card.classList.add('locked');
    if(wasShown&&wasSel){card.classList.add('correct');correct++;}
    else if(!wasShown&&wasSel)card.classList.add('wrong');
    else if(wasShown&&!wasSel)card.style.opacity='.45';
  });
  awardPoints(correct,shown.length);
}
/* ORDER */
function startOrder(){
  $('phase-label').innerHTML='🔢 <span>Rendezd sorba!</span> Ahogy láttad.';
  state.orderAnswer=[];
  const shuffled=shuffle([...state.shownItems]);
  const grid=$('img-grid');grid.style.gridTemplateColumns='repeat('+shuffled.length+',1fr)';grid.style.overflowX='auto';
  grid.innerHTML=shuffled.map((item,i)=>'<div class="img-card" id="oi-'+i+'" onclick="selectOrder('+i+')" data-key="'+item.e+'"><div class="emoji">'+item.e+'</div><div class="label">'+item.l+'</div></div>').join('');
  const slots=$('order-slots');slots.style.display='flex';
  slots.innerHTML=state.shownItems.map((_,i)=>'<div class="order-slot" id="slot-'+i+'"><span class="slot-num">'+(i+1)+'.</span></div>').join('');
  showBtnRow(false,false);$('btn-row').style.display='flex';
}
function selectOrder(i){
  if(state.answered)return;
  const card=$('oi-'+i);if(card.classList.contains('locked'))return;
  const key=card.dataset.key;state.orderAnswer.push(key);card.classList.add('locked','selected');
  const idx=state.orderAnswer.length-1,slot=$('slot-'+idx);
  if(slot){slot.innerHTML='<span class="slot-num">'+(idx+1)+'.</span>'+card.querySelector('.emoji').textContent;slot.classList.add('filled');}
  if(state.orderAnswer.length===state.shownItems.length)setTimeout(checkOrder,300);
}
function checkOrder(){
  state.answered=true;const co=state.shownOrder.map(x=>x.e);let correct=0;
  state.orderAnswer.forEach((key,i)=>{const slot=$('slot-'+i);if(co[i]===key){correct++;if(slot)slot.style.borderColor='var(--grass)';}else{if(slot)slot.style.borderColor='var(--coral)';}});
  awardPoints(correct,co.length);
}
/* MISSING */
function startMissing(){
  const mi=Math.floor(Math.random()*state.shownItems.length);
  state.missingItem=state.shownItems[mi];
  const visible=state.shownItems.filter((_,i)=>i!==mi);
  $('phase-label').innerHTML='🔍 <span>Melyik hiányzik?</span> Válassz!';
  const cols=visible.length<=3?3:4;const grid=$('img-grid');
  grid.style.gridTemplateColumns='repeat('+cols+',1fr)';grid.style.overflowX='';
  grid.innerHTML=visible.map((item,i)=>'<div class="img-card locked" id="vi-'+i+'"><div class="emoji">'+item.e+'</div><div class="label">'+item.l+'</div></div>').join('');
  const choices=shuffle([state.missingItem,...state.distractors.slice(0,3)]);
  $('missing-q').style.display='block';
  $('missing-q').innerHTML='<div style="font-size:.9rem;font-weight:800;margin-bottom:8px;color:#555">Melyik kép hiányzik?</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
    choices.map(c=>'<button onclick="checkMissing(\''+c.e+'\')" style="font-size:1.8rem;padding:8px 14px;border:3px solid #eee;border-radius:14px;background:white;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(0,0,0,.08)" onmouseover="this.style.transform=\'scale(1.1)\'" onmouseout="this.style.transform=\'\'">'+c.e+'<div style="font-size:.7rem;font-weight:700;color:#888">'+c.l+'</div></button>').join('')+'</div>';
  showBtnRow(false,false);$('btn-row').style.display='flex';
}
function checkMissing(k){
  if(state.answered)return;state.answered=true;
  const ok=k===state.missingItem.e;
  $('missing-q').querySelectorAll('button').forEach(btn=>{
    btn.disabled=true;
    const txt=btn.textContent.trim();
    if(txt.startsWith(state.missingItem.e))btn.style.cssText+='border-color:var(--grass);background:#EBFBEE;';
    else if(txt.startsWith(k)&&!ok)btn.style.cssText+='border-color:var(--coral);background:#FFF5F5;';
  });
  awardPoints(ok?1:0,1);
}
/* PAIRS */
function loadPairs(){
  $('phase-label').innerHTML='🪞 <span>Keresd a párokat!</span> Kettesével fordítsd fel!';
  $('img-grid').style.display='none';
  const pairsCount=Math.min(cfg.count,8);
  const items=shuffle(getPool(cfg.category)).slice(0,pairsCount);
  const cards=shuffle([...items,...items].map((item,i)=>({...item,uid:i})));
  state.pairsCards=cards;state.pairsFlipped=[];state.pairsMatched=new Set();
  const grid=$('pairs-grid');grid.style.display='grid';
  grid.style.gridTemplateColumns='repeat('+(cards.length<=8?4:4)+',1fr)';
  grid.innerHTML=cards.map((card,i)=>'<div class="img-card face-down" id="pc-'+i+'" onclick="flipPair('+i+')"><div class="emoji">'+card.e+'</div><div class="label">'+card.l+'</div></div>').join('');
  showBtnRow(false,false);$('btn-row').style.display='flex';
}
function flipPair(i){
  if(state.pairsLock||state.pairsMatched.has(i))return;
  const card=$('pc-'+i);
  if(!card.classList.contains('face-down'))return;
  card.classList.remove('face-down');card.classList.add('selected');
  state.pairsFlipped.push(i);
  if(state.pairsFlipped.length===2){
    state.pairsLock=true;
    const [a,b]=state.pairsFlipped;
    setTimeout(()=>{
      if(state.pairsCards[a].e===state.pairsCards[b].e){
        [$('pc-'+a),$('pc-'+b)].forEach(c=>{c.classList.add('correct');c.classList.remove('selected');});
        state.pairsMatched.add(a);state.pairsMatched.add(b);
        playSound('correct');
        if(state.pairsMatched.size===state.pairsCards.length)setTimeout(()=>awardPoints(state.pairsCards.length/2,state.pairsCards.length/2),400);
      }else{
        [$('pc-'+a),$('pc-'+b)].forEach(c=>{c.classList.add('face-down');c.classList.remove('selected');});
        playSound('wrong');
      }
      state.pairsFlipped=[];state.pairsLock=false;
    },700);
  }
}
/* CHANGED */
function loadChanged(){
  const before=[...state.shownItems];
  const ci=Math.floor(Math.random()*before.length);
  const pool=getPool(cfg.category).filter(x=>!before.find(b=>b.e===x.e));
  const newItem=shuffle(pool)[0];
  const after=before.map((item,i)=>i===ci?newItem:item);
  state.changedItem=newItem;
  $('phase-label').innerHTML='🎨 <span>Mi változott?</span> Melyik kép cserélődött ki?';
  $('img-grid').style.display='none';
  const cols=before.length<=4?2:before.length<=6?3:4;
  const makeGrid=(items,lbl)=>'<div class="changed-col"><div class="changed-label">'+lbl+'</div><div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:7px">'+
    items.map(item=>'<div class="img-card locked" style="padding:7px"><div class="emoji" style="font-size:clamp(1.5rem,4.5vw,2.4rem)">'+item.e+'</div><div class="label">'+item.l+'</div></div>').join('')+'</div></div>';
  const cg=$('changed-grid');cg.style.display='flex';
  cg.innerHTML=makeGrid(before,'⬅️ Előtte')+makeGrid(after,'➡️ Utána');
  const choices=shuffle([newItem,...state.shownItems.filter((_,i)=>i!==ci).slice(0,3)]);
  $('missing-q').style.display='block';
  $('missing-q').innerHTML='<div style="font-size:.9rem;font-weight:800;margin-bottom:8px;color:#555">Melyik kép cserélődött ki?</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
    choices.map(c=>'<button onclick="checkChanged(\''+c.e+'\')" style="font-size:1.7rem;padding:7px 12px;border:3px solid #eee;border-radius:14px;background:white;cursor:pointer;transition:all .2s" onmouseover="this.style.transform=\'scale(1.1)\'" onmouseout="this.style.transform=\'\'">'+c.e+'<div style="font-size:.7rem;font-weight:700;color:#888">'+c.l+'</div></button>').join('')+'</div>';
  showBtnRow(false,false);$('btn-row').style.display='flex';
}
function checkChanged(k){
  if(state.answered)return;state.answered=true;
  const ok=k===state.changedItem.e;
  $('missing-q').querySelectorAll('button').forEach(btn=>{
    btn.disabled=true;const txt=btn.textContent.trim();
    if(txt.startsWith(state.changedItem.e))btn.style.cssText+='border-color:var(--grass);background:#EBFBEE;';
    else if(txt.startsWith(k)&&!ok)btn.style.cssText+='border-color:var(--coral);background:#FFF5F5;';
  });
  awardPoints(ok?1:0,1);
}
/* COUNT */
function loadCount(){
  const count=Math.floor(Math.random()*(cfg.count-1))+2;
  const item=shuffle(getPool(cfg.category))[0];
  state.countAnswer=count;
  $('phase-label').innerHTML='🔢 <span>Számold meg!</span> Hány '+item.l+' jelent meg?';
  $('img-grid').style.display='none';$('count-area').style.display='block';
  $('count-display').innerHTML=Array.from({length:count},()=>'<span style="display:inline-block;margin:2px">'+item.e+'</span>').join('');$('count-display').style.display='block';
  $('count-options').innerHTML='';
  setTimeout(()=>{
    $('count-display').style.display='none';
    const vals=shuffle([...new Set([count,Math.max(1,count-2),Math.max(1,count-1),count+1,count+2].filter((v,i,a)=>a.indexOf(v)===i))].slice(0,4));
    $('count-options').innerHTML=vals.map(v=>'<button class="count-btn" onclick="checkCount('+v+',this)">'+v+'</button>').join('');
    $('phase-label').innerHTML='🔢 <span>Hány darab volt?</span>';
  },cfg.memTime*1000);
  showBtnRow(false,false);$('btn-row').style.display='flex';
}
function checkCount(val,btn){
  if(state.answered)return;state.answered=true;
  document.querySelectorAll('.count-btn').forEach(b=>b.disabled=true);
  const ok=val===state.countAnswer;btn.classList.add(ok?'correct':'wrong');
  if(!ok)document.querySelectorAll('.count-btn').forEach(b=>{if(+b.textContent===state.countAnswer)b.classList.add('correct');});
  awardPoints(ok?1:0,1);
}
/* SCORING */
function awardPoints(correct,total){
  const pts=Math.round((correct/total)*10);state.score+=pts;$('score-val').textContent=state.score;
  const perfect=correct===total,good=correct>=total*.7;
  let msg,cls;
  if(perfect){msg='🎉 Tökéletes! Mindet eltaláltad! +'+pts+' pont';cls='success';confetti();}
  else if(good){msg='😊 Szép munka! '+correct+'/'+total+' helyes. +'+pts+' pont';cls='success';}
  else{msg='🙈 '+correct+'/'+total+' volt helyes. +'+pts+' pont';cls='fail';}
  const fb=$('feedback-box');fb.textContent=msg;fb.className='feedback-box '+cls;fb.style.display='block';
  const stars=perfect?3:good?2:1;state.totalStars+=stars;updateStarsDisplay();
  showBtnRow(false,true);playSound(perfect||good?'correct':'wrong');
}
function showBtnRow(check,next){
  $('btn-check').style.display=check?'inline-block':'none';
  $('btn-next').style.display=next?'inline-block':'none';
  $('btn-row').style.display='flex';
}
function routeCheck(){const m=state.currentMode;if(m==='recall')checkRecall();else if(m==='order')checkOrder();}
function nextRound(){if(state.round>=cfg.rounds){showResult();return;}state.round++;loadRound();}
function showResult(){
  $('game-area').style.display='none';$('result-screen').style.display='block';
  const max=cfg.rounds*10,pct=state.score/max;const stars=pct>=.9?3:pct>=.6?2:1;
  $('res-emoji').textContent=['😢','😊','🎉'][stars-1];
  $('res-title').textContent=['Próbáld újra!','Szuper volt!','Bajnok vagy! 🏆'][stars-1];
  $('res-score').textContent=state.score+' pont a lehetséges '+max+'-ból';
  $('res-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  confetti(stars===3?80:30);
  try{const prev=parseInt(localStorage.getItem('memTotalStars')||'0');localStorage.setItem('memTotalStars',prev+state.totalStars);}catch(e){}
  updateStarsDisplay();
}
function resetGame(){$('game-area').style.display='none';$('result-screen').style.display='none';$('start-screen').style.display='block';}
function updateStarsDisplay(){
  let total=state.totalStars||0;try{total+=parseInt(localStorage.getItem('memTotalStars')||'0');}catch(e){}
  const el=$('total-stars');el.textContent=total>0?'⭐'.repeat(Math.min(total,10))+(total>10?' +'+(total-10):''):'';
}
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playSound(type){
  try{
    const ac=getAudio(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    const freqs={correct:523,wrong:200};
    o.frequency.value=freqs[type]||440;o.type=type==='wrong'?'sawtooth':'sine';
    g.gain.setValueAtTime(.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.3);
    o.start();o.stop(ac.currentTime+.3);
  }catch(e){}
}
function confetti(n=50){
  const colors=['#FF6B6B','#FFD43B','#51CF66','#6EC6F5','#CC5DE8','#FF922B','#F783AC'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText='left:'+Math.random()*100+'vw;top:-10px;background:'+colors[Math.floor(Math.random()*colors.length)]+';animation-duration:'+(1.2+Math.random()*1.2)+'s;animation-delay:'+(Math.random()*.6)+'s;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;border-radius:'+(Math.random()<.5?'50%':'2px')+';';
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}
updateStarsDisplay();
</script>
</body>
</html>
