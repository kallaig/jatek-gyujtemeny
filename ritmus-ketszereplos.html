<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritmusjáték – Kétszereplős</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8EC;
      --ti-color: #FF6B6B;
      --ti-shadow: #c94b4b;
      --taa-color: #4ECDC4;
      --taa-shadow: #2da89f;
      --text: #3a2a1a;
      --teacher-bg: #EEF6FF;
      --teacher-border: #9BCBF0;
      --student-bg: #F0FFF4;
      --student-border: #82D9A0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ── Start screen ── */
    .start-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .start-box {
      text-align: center;
      padding: 2rem;
    }
    .start-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    .start-box h1 { font-size: 2.2rem; margin-bottom: 0.4rem; color: var(--text); }
    .start-box p  { color: #8a7060; font-size: 1.05rem; font-weight: 700; margin-bottom: 2rem; }
    .start-btn {
      background: #FF6B6B;
      border: none;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      padding: 0.8rem 2.5rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #c94b4b;
      transition: all 0.1s;
    }
    .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c94b4b; }

    /* ── Main layout ── */
    #mainApp { width: 100%; max-width: 700px; }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      font-weight: 900;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.2rem;
    }
    .subtitle {
      font-size: 1rem;
      color: #8a7060;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* ── Panels ── */
    .panel {
      border-radius: 20px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1rem;
    }
    .panel-teacher {
      background: var(--teacher-bg);
      border: 3px solid var(--teacher-border);
    }
    .panel-student {
      background: var(--student-bg);
      border: 3px solid var(--student-border);
    }
    .panel-label {
      font-size: 0.85rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .panel-teacher .panel-label { color: #4a80b0; }
    .panel-student .panel-label { color: #3a9a60; }

    /* ── Length selector ── */
    .length-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .length-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: #7a6a60;
    }
    .length-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #c0b0a0;
      background: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      color: #7a6a60;
      cursor: pointer;
      transition: all 0.15s;
    }
    .length-btn.active {
      background: #FF6B6B;
      border-color: #c94b4b;
      color: white;
      box-shadow: 0 3px 0 #c94b4b;
    }
    .length-btn:hover:not(.active) { background: #f0e0d8; }

    /* ── Beat buttons ── */
    .buttons {
      display: flex;
      gap: clamp(1rem, 4vw, 3rem);
      justify-content: center;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
    }
    .btn-label-small {
      font-size: 0.85rem;
      font-weight: 700;
      color: #8a7060;
    }
    .beat-btn {
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      transition: transform 0.08s, box-shadow 0.08s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
    }
    .beat-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
    }
    .beat-btn.pressed { transform: scale(0.91) translateY(5px); }

    .btn-ti {
      width: clamp(80px, 16vw, 120px);
      height: clamp(80px, 16vw, 120px);
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      background: var(--ti-color);
      box-shadow: 0 7px 0 var(--ti-shadow), 0 10px 25px rgba(255,107,107,0.3);
    }
    .btn-ti.pressed  { box-shadow: 0 2px 0 var(--ti-shadow); }

    .btn-taa {
      width: clamp(120px, 26vw, 190px);
      height: clamp(120px, 26vw, 190px);
      font-size: clamp(2rem, 5vw, 3.2rem);
      background: var(--taa-color);
      box-shadow: 0 9px 0 var(--taa-shadow), 0 14px 35px rgba(78,205,196,0.3);
    }
    .btn-taa.pressed { box-shadow: 0 2px 0 var(--taa-shadow); }

    /* ── Rhythm preview dots ── */
    .rhythm-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .dot-slot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px dashed #c0b0a0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 900;
      color: #c0b0a0;
      transition: all 0.2s;
    }
    .dot-slot.filled-ti {
      background: var(--ti-color);
      border-color: var(--ti-shadow);
      color: white;
      font-size: 0.75rem;
      box-shadow: 0 3px 0 var(--ti-shadow);
      animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .dot-slot.filled-taa {
      background: var(--taa-color);
      border-color: var(--taa-shadow);
      color: white;
      font-size: 0.75rem;
      box-shadow: 0 3px 0 var(--taa-shadow);
      animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .dot-slot.correct   { outline: 4px solid #2ecc71; outline-offset: 2px; }
    .dot-slot.incorrect { outline: 4px solid #e74c3c; outline-offset: 2px; }

    @keyframes popIn {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ── Action buttons ── */
    .action-row {
      margin-top: 1rem;
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .action-btn {
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      padding: 0.55rem 1.5rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .btn-done {
      background: #FFD166;
      color: #5a4010;
      box-shadow: 0 4px 0 #c9a030;
    }
    .btn-done:active { transform: translateY(3px); box-shadow: 0 1px 0 #c9a030; }
    .btn-done:hover  { background: #ffc940; }
    .btn-done:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-replay {
      background: #a78bfa;
      color: white;
      box-shadow: 0 4px 0 #7c5cbf;
    }
    .btn-replay:active { transform: translateY(3px); box-shadow: 0 1px 0 #7c5cbf; }
    .btn-replay:hover  { background: #8b6ef0; }

    .btn-check {
      background: #06c270;
      color: white;
      box-shadow: 0 4px 0 #059954;
    }
    .btn-check:active { transform: translateY(3px); box-shadow: 0 1px 0 #059954; }
    .btn-check:hover  { background: #04a85f; }
    .btn-check:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-reset {
      background: none;
      border: 3px solid #d0c0b0;
      color: #a09080;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { background: #f0e8e0; }

    /* ── Result banner ── */
    .result-banner {
      display: none;
      margin-top: 1rem;
      padding: 0.8rem 1.5rem;
      border-radius: 16px;
      font-size: 1.2rem;
      font-weight: 900;
      text-align: center;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .result-banner.show { display: block; }
    .result-banner.ok  { background: #d4f5e2; color: #1a7a45; border: 3px solid #82D9A0; }
    .result-banner.fail{ background: #fde8e8; color: #9a2020; border: 3px solid #f0a0a0; }

    /* ── Phase instruction ── */
    .phase-msg {
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: #8a7060;
      margin-bottom: 0.8rem;
      min-height: 1.4em;
    }

    /* ── Ripple ── */
    .ripple {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: rippleOut 0.6s ease-out forwards;
      z-index: 10;
    }
    @keyframes rippleOut {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.5; }
      100% { transform: translate(-50%,-50%) scale(8); opacity: 0; }
    }
  </style>
</head>
<body>

<style>

  <!-- Start screen -->
  <div id="startScreen" class="start-screen">
    <div class="start-box">
      <div class="start-icon">🎶</div>
      <h1>Ritmusjáték</h1>
      <p>Kétszereplős változat – tanár és tanuló</p>
      <button id="startBtn" class="start-btn">▶ Kezdjük!</button>
    </div>
  </div>

  <!-- Main app -->
  <div id="mainApp" style="display:none">
    <h1>🎶 Ritmusjáték</h1>
    <p class="subtitle">Kétszereplős – tanár mutatja, tanuló visszajátssza</p>

    <!-- TEACHER PANEL -->
    <div class="panel panel-teacher">
      <div class="panel-label">👩‍🏫 Tanár</div>

      <!-- Length selector -->
      <div class="length-row">
        <span class="length-label">Szótagok száma:</span>
        <button class="length-btn active" data-len="2">2</button>
        <button class="length-btn" data-len="3">3</button>
        <button class="length-btn" data-len="4">4</button>
        <button class="length-btn" data-len="5">5</button>
        <button class="length-btn" data-len="6">6</button>
        <button class="length-btn" data-len="8">8</button>
      </div>

      <div class="phase-msg" id="teacherMsg">Játszd el a ritmust!</div>

      <div class="buttons">
        <div class="btn-wrap">
          <span class="btn-label-small">rövid</span>
          <button class="beat-btn btn-ti" id="tTi">ti</button>
        </div>
        <div class="btn-wrap">
          <span class="btn-label-small">hosszú</span>
          <button class="beat-btn btn-taa" id="tTaa">tá</button>
        </div>
      </div>

      <div class="action-row">
        <button class="action-btn btn-done" id="btnDone">✓ Kész, átadom!</button>
        <button class="action-btn btn-reset" id="btnTeacherClear">✕ Törlés</button>
      </div>
    </div>

    <!-- STUDENT PANEL -->
    <div class="panel panel-student">
      <div class="panel-label">🧒 Tanuló</div>

      <div class="phase-msg" id="studentMsg">Várakozás a tanárra…</div>

      <div class="buttons">
        <div class="btn-wrap">
          <span class="btn-label-small">rövid</span>
          <button class="beat-btn btn-ti" id="sTi" disabled>ti</button>
        </div>
        <div class="btn-wrap">
          <span class="btn-label-small">hosszú</span>
          <button class="beat-btn btn-taa" id="sTaa" disabled>tá</button>
        </div>
      </div>

      <!-- Student rhythm slots -->
      <div class="rhythm-row" id="studentSlots"></div>

      <div class="action-row">
        <button class="action-btn btn-replay" id="btnReplay" disabled>▶ Visszajátszás</button>
        <button class="action-btn btn-check"  id="btnCheck"  disabled>🔍 Ellenőrzés</button>
        <button class="action-btn btn-reset"  id="btnStudentClear" disabled>✕ Törlés</button>
      </div>

      <div class="result-banner" id="resultBanner"></div>
    </div>
  </div>

  <script>
    // ── Audio ──────────────────────────────────────────────────────────
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let ctx = null;
    let compressor = null, masterGain = null;

    document.getElementById('startBtn').addEventListener('click', () => {
      ctx = new AudioContext();
      ctx.resume().then(() => {
        const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf; src.connect(ctx.destination); src.start(0);
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
      });
    });

    function setupChain() {
      compressor = ctx.createDynamicsCompressor();
      compressor.threshold.value = -6;
      compressor.knee.value      = 3;
      compressor.ratio.value     = 20;
      compressor.attack.value    = 0.001;
      compressor.release.value   = 0.1;
      masterGain = ctx.createGain();
      masterGain.gain.value = 1.4;
      compressor.connect(masterGain);
      masterGain.connect(ctx.destination);
    }

    function playTone(freq, duration, type = 'sine', fadeIn = 0.01, vol = 0.95, atTime = null) {
      if (!ctx) return duration;
      if (!compressor) setupChain();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(compressor);
      osc.type = type;
      const t = atTime !== null ? atTime : ctx.currentTime;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + fadeIn);
      gain.gain.setValueAtTime(vol, t + duration - 0.05);
      gain.gain.linearRampToValueAtTime(0, t + duration);
      osc.start(t);
      osc.stop(t + duration + 0.05);
      return duration;
    }

    const TI_DUR  = 0.18, TI_GAP  = 0.28;
    const TAA_DUR = 0.65, TAA_GAP = 0.80;

    function playTi(atTime)  { return playTone(520, TI_DUR,  'triangle', 0.008, 0.95, atTime); }
    function playTaa(atTime) { return playTone(370, TAA_DUR, 'sine',     0.015, 1.6,  atTime); }

    function playSequence(seq) {
      let t = ctx.currentTime + 0.05;
      seq.forEach(b => {
        if (b === 'ti')  { playTi(t);  t += TI_GAP; }
        else             { playTaa(t); t += TAA_GAP; }
      });
    }

    // ── Ripple ────────────────────────────────────────────────────────
    function spawnRipple(x, y, color) {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.cssText = `left:${x}px;top:${y}px;width:70px;height:70px;background:${color};`;
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 700);
    }

    // ── State ─────────────────────────────────────────────────────────
    let beatLength   = 2;
    let teacherLog   = [];
    let studentLog   = [];
    let phase        = 'teacher'; // 'teacher' | 'student' | 'done'

    // ── Slot rendering ────────────────────────────────────────────────
    function renderSlots(containerId, log, showResult = false, teacherRef = null) {
      const el = document.getElementById(containerId);
      el.innerHTML = '';
      for (let i = 0; i < beatLength; i++) {
        const slot = document.createElement('div');
        slot.className = 'dot-slot';
        if (log[i]) {
          slot.classList.add(log[i] === 'ti' ? 'filled-ti' : 'filled-taa');
          slot.textContent = log[i] === 'ti' ? 'ti' : 'tá';
          if (showResult && teacherRef) {
            slot.classList.add(log[i] === teacherRef[i] ? 'correct' : 'incorrect');
          }
        }
        el.appendChild(slot);
      }
    }

    function refreshTeacher() { /* slots hidden */ }
    function refreshStudent(showResult = false) {
      renderSlots('studentSlots', studentLog, showResult, teacherLog);
    }

    // ── Length buttons ────────────────────────────────────────────────
    document.querySelectorAll('.length-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.length-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        beatLength = parseInt(btn.dataset.len);
        resetAll();
      });
    });

    // ── Phase control ─────────────────────────────────────────────────
    function setTeacherPhase() {
      phase = 'teacher';
      document.getElementById('teacherMsg').textContent = 'Játszd el a ritmust!';
      document.getElementById('studentMsg').textContent = 'Várakozás a tanárra…';
      document.getElementById('tTi').disabled  = false;
      document.getElementById('tTaa').disabled = false;
      document.getElementById('sTi').disabled  = true;
      document.getElementById('sTaa').disabled = true;
      document.getElementById('btnDone').disabled   = false;
      document.getElementById('btnReplay').disabled  = true;
      document.getElementById('btnCheck').disabled   = true;
      document.getElementById('btnStudentClear').disabled = true;
      document.getElementById('resultBanner').className = 'result-banner';
      teacherLog = []; studentLog = [];
      refreshTeacher(); refreshStudent();
    }

    function setStudentPhase() {
      phase = 'student';
      document.getElementById('teacherMsg').textContent = '✓ Ritmus elküldve – várj!';
      document.getElementById('studentMsg').textContent = 'Hallgasd meg, majd játszd vissza!';
      document.getElementById('tTi').disabled  = true;
      document.getElementById('tTaa').disabled = true;
      document.getElementById('sTi').disabled  = false;
      document.getElementById('sTaa').disabled = false;
      document.getElementById('btnDone').disabled   = true;
      document.getElementById('btnReplay').disabled  = false;
      document.getElementById('btnCheck').disabled   = false;
      document.getElementById('btnStudentClear').disabled = false;
      studentLog = [];
      refreshStudent();
      // Auto-play teacher rhythm once
      playSequence(teacherLog);
    }

    function resetAll() {
      setTeacherPhase();
    }

    // ── Teacher buttons ───────────────────────────────────────────────
    function teacherAddBeat(type, x, y) {
      if (phase !== 'teacher') return;
      if (teacherLog.length >= beatLength) return;
      teacherLog.push(type);
      refreshTeacher();
      if (type === 'ti') { playTi(); spawnRipple(x, y, 'rgba(255,107,107,0.4)'); pulse(document.getElementById('tTi')); }
      else               { playTaa(); spawnRipple(x, y, 'rgba(78,205,196,0.4)'); pulse(document.getElementById('tTaa')); }
    }

    document.getElementById('tTi').addEventListener('pointerdown', e => {
      e.preventDefault();
      const r = e.target.getBoundingClientRect();
      teacherAddBeat('ti', r.left + r.width/2, r.top + r.height/2);
    });
    document.getElementById('tTaa').addEventListener('pointerdown', e => {
      e.preventDefault();
      const r = e.target.getBoundingClientRect();
      teacherAddBeat('taa', r.left + r.width/2, r.top + r.height/2);
    });

    document.getElementById('btnDone').addEventListener('click', () => {
      if (teacherLog.length === 0) return;
      // Pad if shorter than beatLength
      setStudentPhase();
    });

    document.getElementById('btnTeacherClear').addEventListener('click', () => {
      teacherLog = [];
      refreshTeacher();
    });

    // ── Student buttons ───────────────────────────────────────────────
    function studentAddBeat(type, x, y) {
      if (phase !== 'student') return;
      if (studentLog.length >= beatLength) return;
      studentLog.push(type);
      refreshStudent();
      if (type === 'ti') { playTi(); spawnRipple(x, y, 'rgba(255,107,107,0.4)'); pulse(document.getElementById('sTi')); }
      else               { playTaa(); spawnRipple(x, y, 'rgba(78,205,196,0.4)'); pulse(document.getElementById('sTaa')); }
    }

    document.getElementById('sTi').addEventListener('pointerdown', e => {
      e.preventDefault();
      const r = e.target.getBoundingClientRect();
      studentAddBeat('ti', r.left + r.width/2, r.top + r.height/2);
    });
    document.getElementById('sTaa').addEventListener('pointerdown', e => {
      e.preventDefault();
      const r = e.target.getBoundingClientRect();
      studentAddBeat('taa', r.left + r.width/2, r.top + r.height/2);
    });

    document.getElementById('btnReplay').addEventListener('click', () => {
      playSequence(teacherLog);
    });

    document.getElementById('btnCheck').addEventListener('click', () => {
      if (studentLog.length === 0) return;
      phase = 'done';
      refreshStudent(true);
      const ok = studentLog.length === teacherLog.length &&
                 studentLog.every((b, i) => b === teacherLog[i]);
      const banner = document.getElementById('resultBanner');
      banner.textContent = ok ? '🎉 Helyes! Pontosan visszajátszottad!' : '❌ Nem egyezik. Próbáld újra!';
      banner.className = 'result-banner show ' + (ok ? 'ok' : 'fail');
      if (!ok) {
        // After a moment, return to teacher phase for a new task
        setTimeout(() => {
          resetAll();
        }, 2200);
      }
    });

    document.getElementById('btnStudentClear').addEventListener('click', () => {
      studentLog = [];
      refreshStudent();
      document.getElementById('resultBanner').className = 'result-banner';
    });

    // Reset button – new round
    document.querySelectorAll('.btn-reset').forEach(btn => {
      // already handled above for teacher clear; only wire "new round" if needed
    });

    // New round button in result
    // (clicking teacher panel area resets)
    document.getElementById('mainApp').addEventListener('click', e => {
      if (e.target.closest('.panel-teacher') && phase === 'done') {
        resetAll();
      }
    });

    // ── Pulse ─────────────────────────────────────────────────────────
    function pulse(el) {
      el.classList.add('pressed');
      setTimeout(() => el.classList.remove('pressed'), 150);
    }

    // ── Init ──────────────────────────────────────────────────────────
    // Build initial slots after DOM ready
    window.addEventListener('load', () => {
      renderSlots('studentSlots', [], false);
    });
  </script>
</body>
</html>
