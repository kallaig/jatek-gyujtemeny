<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritmusjáték – Automatikus</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8EC;
      --ti-color: #FF6B6B;
      --ti-shadow: #c94b4b;
      --taa-color: #4ECDC4;
      --taa-shadow: #2da89f;
      --text: #3a2a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ── Start screen ── */
    .start-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .start-box { text-align: center; padding: 2rem; }
    .start-icon { font-size: 5rem; margin-bottom: 1rem; animation: bounce 1.5s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .start-box h1 { font-size: 2.2rem; margin-bottom: 0.4rem; color: var(--text); }
    .start-box p  { color: #8a7060; font-size: 1.05rem; font-weight: 700; margin-bottom: 2rem; }
    .start-btn {
      background: #FF6B6B; border: none; color: white;
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.4rem;
      padding: 0.8rem 2.5rem; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 0 #c94b4b; transition: all 0.1s;
    }
    .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c94b4b; }

    /* ── Main ── */
    #mainApp { width: 100%; max-width: 680px; }
    h1 { font-size: clamp(1.6rem,5vw,2.4rem); font-weight: 900; color: var(--text); text-align: center; margin-bottom: 0.2rem; }
    .subtitle { font-size: 1rem; color: #8a7060; font-weight: 700; text-align: center; margin-bottom: 1.4rem; }

    /* ── Settings panel ── */
    .settings {
      background: #F3EFFF; border: 3px solid #C4B0F5;
      border-radius: 20px; padding: 1.2rem 1.5rem; margin-bottom: 1rem;
    }
    .settings-title {
      font-size: 0.85rem; font-weight: 900; letter-spacing: 0.08em;
      text-transform: uppercase; color: #7c5cbf; margin-bottom: 1rem;
    }
    .settings-grid { display: flex; flex-wrap: wrap; gap: 1rem; }
    .setting-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .setting-label { font-size: 0.85rem; font-weight: 700; color: #7a6a60; }
    .chip-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .chip {
      padding: 0.3rem 0.9rem; border-radius: 50px;
      border: 2px solid #c0b0a0; background: white;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem;
      color: #7a6a60; cursor: pointer; transition: all 0.15s;
    }
    .chip.active { background: #a78bfa; border-color: #7c5cbf; color: white; box-shadow: 0 3px 0 #7c5cbf; }
    .chip:hover:not(.active) { background: #ede9ff; }

    /* difficulty chips */
    .chip.lvl1.active { background: #06c270; border-color: #059954; box-shadow: 0 3px 0 #059954; }
    .chip.lvl2.active { background: #FFD166; border-color: #c9a030; color: #5a4010; box-shadow: 0 3px 0 #c9a030; }
    .chip.lvl3.active { background: #FF9F43; border-color: #c97820; color: white; box-shadow: 0 3px 0 #c97820; }
    .chip.lvl4.active { background: #FF6B6B; border-color: #c94b4b; box-shadow: 0 3px 0 #c94b4b; }

    /* ── Game panel ── */
    .game-panel {
      background: #F0FFF4; border: 3px solid #82D9A0;
      border-radius: 20px; padding: 1.4rem 1.6rem;
    }
    .phase-msg {
      text-align: center; font-size: 1.05rem; font-weight: 700;
      color: #3a9a60; margin-bottom: 1rem; min-height: 1.5em;
    }

    /* ── Measure display ── */
    .measures-wrap { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
    .measure-row {
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(255,255,255,0.6); border-radius: 14px;
      padding: 0.5rem 0.8rem;
    }
    .measure-label {
      font-size: 0.75rem; font-weight: 900; color: #a09080;
      min-width: 18px; text-align: center;
    }
    .slots-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .dot-slot {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px dashed #c0b0a0; background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 900; color: #c0b0a0;
      transition: all 0.18s;
    }
    .dot-slot.filled-ti  { background: var(--ti-color);  border-color: var(--ti-shadow);  color: white; box-shadow: 0 3px 0 var(--ti-shadow);  animation: popIn .2s cubic-bezier(.34,1.56,.64,1) both; }
    .dot-slot.filled-taa { background: var(--taa-color); border-color: var(--taa-shadow); color: white; box-shadow: 0 3px 0 var(--taa-shadow); animation: popIn .2s cubic-bezier(.34,1.56,.64,1) both; }
    .dot-slot.correct    { outline: 4px solid #2ecc71; outline-offset: 2px; }
    .dot-slot.incorrect  { outline: 4px solid #e74c3c; outline-offset: 2px; }
    .dot-slot.playing    { transform: scale(1.2); box-shadow: 0 0 0 4px rgba(255,209,102,0.7); }
    @keyframes popIn { 0%{transform:scale(0) rotate(-10deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }

    /* ── Beat buttons ── */
    .buttons {
      display: flex; gap: clamp(1rem,4vw,3rem);
      justify-content: center; align-items: flex-end;
      flex-wrap: wrap; margin-bottom: 1rem;
    }
    .btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.7rem; }
    .btn-label-small { font-size: 0.85rem; font-weight: 700; color: #8a7060; }
    .beat-btn {
      border: none; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 900; color: white;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      transition: transform 0.08s, box-shadow 0.08s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .beat-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
    .beat-btn.pressed  { transform: scale(0.91) translateY(5px); }
    .btn-ti  { width: clamp(80px,16vw,120px); height: clamp(80px,16vw,120px); font-size: clamp(1.4rem,3.5vw,2.2rem); background: var(--ti-color);  box-shadow: 0 7px 0 var(--ti-shadow),  0 10px 25px rgba(255,107,107,.3); }
    .btn-taa { width: clamp(120px,26vw,190px); height: clamp(120px,26vw,190px); font-size: clamp(2rem,5vw,3.2rem);     background: var(--taa-color); box-shadow: 0 9px 0 var(--taa-shadow), 0 14px 35px rgba(78,205,196,.3); }
    .btn-ti.pressed  { box-shadow: 0 2px 0 var(--ti-shadow); }
    .btn-taa.pressed { box-shadow: 0 2px 0 var(--taa-shadow); }

    /* ── Action buttons ── */
    .action-row { display: flex; gap: 0.7rem; justify-content: center; flex-wrap: wrap; }
    .action-btn {
      border: none; font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: 1rem; padding: 0.55rem 1.4rem; border-radius: 50px;
      cursor: pointer; transition: all 0.1s;
    }
    .btn-generate { background: #a78bfa; color: white; box-shadow: 0 4px 0 #7c5cbf; }
    .btn-generate:active { transform: translateY(3px); box-shadow: 0 1px 0 #7c5cbf; }
    .btn-generate:hover  { background: #8b6ef0; }
    .btn-replay   { background: #4ECDC4; color: white; box-shadow: 0 4px 0 #2da89f; }
    .btn-replay:active { transform: translateY(3px); box-shadow: 0 1px 0 #2da89f; }
    .btn-replay:hover  { background: #38b8af; }
    .btn-replay:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-check    { background: #06c270; color: white; box-shadow: 0 4px 0 #059954; }
    .btn-check:active { transform: translateY(3px); box-shadow: 0 1px 0 #059954; }
    .btn-check:hover  { background: #04a85f; }
    .btn-check:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-clear    { background: none; border: 3px solid #d0c0b0; color: #a09080; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1rem; padding: 0.5rem 1.2rem; border-radius: 50px; cursor: pointer; transition: all 0.2s; }
    .btn-clear:hover { background: #f0e8e0; }
    .btn-clear:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Result ── */
    .result-banner {
      display: none; margin-top: 1rem;
      padding: 0.8rem 1.5rem; border-radius: 16px;
      font-size: 1.15rem; font-weight: 900; text-align: center;
      animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both;
    }
    .result-banner.show { display: block; }
    .result-banner.ok   { background: #d4f5e2; color: #1a7a45; border: 3px solid #82D9A0; }
    .result-banner.fail { background: #fde8e8; color: #9a2020; border: 3px solid #f0a0a0; }

    /* ── Score ── */
    .score-row { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 1rem; }
    .score-box { text-align: center; }
    .score-num { font-size: 2rem; font-weight: 900; color: var(--text); }
    .score-lbl { font-size: 0.75rem; font-weight: 700; color: #a09080; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── Ripple ── */
    .ripple { position: fixed; border-radius: 50%; pointer-events: none; animation: rippleOut .6s ease-out forwards; z-index: 10; }
    @keyframes rippleOut { 0%{transform:translate(-50%,-50%) scale(0);opacity:.5} 100%{transform:translate(-50%,-50%) scale(8);opacity:0} }
  </style>
</head>

  <!-- Start screen -->
  <div id="startScreen" class="start-screen">
    <div class="start-box">
      <div class="start-icon">🎵</div>
      <h1>Ritmusjáték</h1>
      <p>Hallgasd meg és játszd vissza!</p>
      <button id="startBtn" class="start-btn">▶ Kezdjük!</button>
    </div>
  </div>

  <!-- Main app -->
  <div id="mainApp" style="display:none">
    <h1>🎵 Ritmusjáték</h1>
    <p class="subtitle">Hallgasd meg a ritmust, majd játszd vissza!</p>

    <!-- Settings -->
    <div class="settings">
      <div class="settings-title">⚙️ Beállítások</div>
      <div class="settings-grid">

        <div class="setting-group">
          <span class="setting-label">Ütem</span>
          <div class="chip-row" id="timeSigBtns">
            <button class="chip active" data-ts="2">2/4</button>
            <button class="chip" data-ts="3">3/4</button>
            <button class="chip" data-ts="4">4/4</button>
          </div>
        </div>

        <div class="setting-group">
          <span class="setting-label">Ütemek száma</span>
          <div class="chip-row" id="measureBtns">
            <button class="chip" data-m="2">2</button>
            <button class="chip active" data-m="3">3</button>
            <button class="chip" data-m="4">4</button>
            <button class="chip" data-m="5">5</button>
            <button class="chip" data-m="6">6</button>
            <button class="chip" data-m="7">7</button>
            <button class="chip" data-m="8">8</button>
          </div>
        </div>

        <div class="setting-group">
          <span class="setting-label">Nehézség</span>
          <div class="chip-row" id="levelBtns">
            <button class="chip lvl1 active" data-lvl="1">⭐ Könnyű</button>
            <button class="chip lvl2" data-lvl="2">⭐⭐ Közepes</button>
            <button class="chip lvl3" data-lvl="3">⭐⭐⭐ Nehéz</button>
            <button class="chip lvl4" data-lvl="4">⭐⭐⭐⭐ Vegyes</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Game -->
    <div class="game-panel">

      <!-- Score -->
      <div class="score-row">
        <div class="score-box"><div class="score-num" id="scoreOk">0</div><div class="score-lbl">✓ Helyes</div></div>
        <div class="score-box"><div class="score-num" id="scoreFail">0</div><div class="score-lbl">✗ Hibás</div></div>
      </div>

      <div class="phase-msg" id="phaseMsg">Nyomj a 🎲 gombra az első feladathoz!</div>

      <!-- Measures display -->
      <div class="measures-wrap" id="measuresWrap"></div>

      <!-- Student beat buttons -->
      <div class="buttons">
        <div class="btn-wrap">
          <span class="btn-label-small">rövid</span>
          <button class="beat-btn btn-ti" id="sTi" disabled>ti</button>
        </div>
        <div class="btn-wrap">
          <span class="btn-label-small">hosszú</span>
          <button class="beat-btn btn-taa" id="sTaa" disabled>tá</button>
        </div>
      </div>

      <div class="action-row">
        <button class="action-btn btn-generate" id="btnGenerate">🎲 Új ritmus</button>
        <button class="action-btn btn-replay"   id="btnReplay"   disabled>▶ Visszajátszás</button>
        <button class="action-btn btn-check"    id="btnCheck"    disabled>🔍 Ellenőrzés</button>
        <button class="action-btn btn-clear"    id="btnClear"    disabled>✕ Törlés</button>
      </div>

      <div class="result-banner" id="resultBanner"></div>
    </div>
  </div>

  <script>
    // ── Audio ──────────────────────────────────────────────────────────
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let ctx = null, compressor = null, masterGain = null;

    document.getElementById('startBtn').addEventListener('click', () => {
      ctx = new AudioCtx();
      ctx.resume().then(() => {
        const buf = ctx.createBuffer(1,1,ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf; src.connect(ctx.destination); src.start(0);
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        buildMeasures();
      });
    });

    function setupChain() {
      compressor = ctx.createDynamicsCompressor();
      compressor.threshold.value = -6; compressor.knee.value = 3;
      compressor.ratio.value = 20; compressor.attack.value = 0.001; compressor.release.value = 0.1;
      masterGain = ctx.createGain(); masterGain.gain.value = 1.4;
      compressor.connect(masterGain); masterGain.connect(ctx.destination);
    }

    function playTone(freq, duration, type='sine', fadeIn=0.01, vol=0.95, atTime=null) {
      if (!ctx) return;
      if (!compressor) setupChain();
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(compressor);
      osc.type = type;
      const t = atTime !== null ? atTime : ctx.currentTime;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + fadeIn);
      gain.gain.setValueAtTime(vol, t + duration - 0.05);
      gain.gain.linearRampToValueAtTime(0, t + duration);
      osc.start(t); osc.stop(t + duration + 0.05);
    }

    const TI_DUR=0.18, TI_GAP=0.30, TAA_DUR=0.65, TAA_GAP=0.85;

    function playTi(at)  { playTone(520, TI_DUR,  'triangle', 0.008, 0.95, at); return TI_GAP; }
    function playTaa(at) { playTone(370, TAA_DUR,  'sine',    0.015, 1.6,  at); return TAA_GAP; }

    function playSequence(seq, highlightCb) {
      let t = ctx.currentTime + 0.08;
      seq.forEach((b, i) => {
        const gap = b === 'ti' ? playTi(t) : playTaa(t);
        if (highlightCb) {
          const delay = (t - ctx.currentTime) * 1000;
          setTimeout(() => highlightCb(i), delay);
        }
        t += gap;
      });
      return t;
    }

    // ── State ──────────────────────────────────────────────────────────
    let timeSig    = 2;   // beats per measure
    let numMeasures = 3;
    let level      = 1;
    let targetSeq  = [];  // generated rhythm
    let studentSeq = [];
    let scoreOk    = 0;
    let scoreFail  = 0;
    let phase      = 'idle'; // idle | listening | answering | result

    // ── Settings ────────────────────────────────────────────────────────
    document.getElementById('timeSigBtns').addEventListener('click', e => {
      const btn = e.target.closest('[data-ts]'); if (!btn) return;
      document.querySelectorAll('[data-ts]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      timeSig = parseInt(btn.dataset.ts);
      resetGame();
    });

    document.getElementById('measureBtns').addEventListener('click', e => {
      const btn = e.target.closest('[data-m]'); if (!btn) return;
      document.querySelectorAll('[data-m]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      numMeasures = parseInt(btn.dataset.m);
      resetGame();
    });

    document.getElementById('levelBtns').addEventListener('click', e => {
      const btn = e.target.closest('[data-lvl]'); if (!btn) return;
      document.querySelectorAll('[data-lvl]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      level = parseInt(btn.dataset.lvl);
      resetGame();
    });

    // ── Rhythm generation ───────────────────────────────────────────────
    // Each measure = timeSig beats. Each beat = 'ti' or 'taa'.
    // 'taa' counts as 2 beats. So we fill each measure greedily.
    function generateMeasure() {
      const beats = [];
      let remaining = timeSig;
      while (remaining > 0) {
        // Decide ti or taa based on level
        let taaChance = 0;
        if      (level === 1) taaChance = 0;       // only ti
        else if (level === 2) taaChance = 0.2;     // mostly ti
        else if (level === 3) taaChance = 0.5;     // balanced
        else                   taaChance = 0.55;   // random mix

        const useTaa = remaining >= 2 && Math.random() < taaChance;
        if (useTaa) { beats.push('taa'); remaining -= 2; }
        else        { beats.push('ti');  remaining -= 1; }
      }
      return beats;
    }

    function generateRhythm() {
      const seq = [];
      for (let m = 0; m < numMeasures; m++) {
        generateMeasure().forEach(b => seq.push(b));
      }
      return seq;
    }

    // ── UI building ─────────────────────────────────────────────────────
    function totalBeats() { return timeSig * numMeasures; }

    function buildMeasures(studentFill = [], showResult = false) {
      const wrap = document.getElementById('measuresWrap');
      wrap.innerHTML = '';
      let sIdx = 0; // student answer index
      let tIdx = 0; // target index

      for (let m = 0; m < numMeasures; m++) {
        const row = document.createElement('div');
        row.className = 'measure-row';

        const lbl = document.createElement('div');
        lbl.className = 'measure-label';
        lbl.textContent = m + 1;
        row.appendChild(lbl);

        const slotsDiv = document.createElement('div');
        slotsDiv.className = 'slots-row';

        // Count target beats in this measure
        let mBeats = 0;
        let mStart = tIdx;
        while (mBeats < timeSig && tIdx < targetSeq.length) {
          mBeats += targetSeq[tIdx] === 'taa' ? 2 : 1;
          tIdx++;
        }
        const measureTarget = targetSeq.slice(mStart, tIdx);

        // Build slots from student answer for this measure
        // We allocate student beats greedily per measure
        let mStudentBeats = 0;
        let msStart = sIdx;
        // figure out how many student entries fit in timeSig beats
        let tempIdx = sIdx;
        while (mStudentBeats < timeSig && tempIdx < studentFill.length) {
          mStudentBeats += studentFill[tempIdx] === 'taa' ? 2 : 1;
          tempIdx++;
          if (mStudentBeats >= timeSig) break;
        }
        const measureStudent = studentFill.slice(msStart, tempIdx);
        sIdx = tempIdx;

        // Render slots based on student OR target (for replay highlight)
        const displaySeq = studentFill.length > 0 ? measureStudent : [];

        for (let i = 0; i < measureTarget.length; i++) {
          const slot = document.createElement('div');
          slot.className = 'dot-slot';
          slot.id = `slot-${mStart + i}`;
          if (displaySeq[i]) {
            slot.classList.add(displaySeq[i] === 'ti' ? 'filled-ti' : 'filled-taa');
            slot.textContent = displaySeq[i] === 'ti' ? 'ti' : 'tá';
            if (showResult) {
              slot.classList.add(displaySeq[i] === measureTarget[i] ? 'correct' : 'incorrect');
            }
          }
          slotsDiv.appendChild(slot);
        }

        row.appendChild(slotsDiv);
        wrap.appendChild(row);
      }
    }

    // ── Game flow ───────────────────────────────────────────────────────
    function resetGame() {
      phase = 'idle';
      targetSeq = []; studentSeq = [];
      buildMeasures();
      setMsg('Nyomj a 🎲 gombra az első feladathoz!');
      document.getElementById('sTi').disabled  = true;
      document.getElementById('sTaa').disabled = true;
      document.getElementById('btnReplay').disabled = true;
      document.getElementById('btnCheck').disabled  = true;
      document.getElementById('btnClear').disabled  = true;
      document.getElementById('resultBanner').className = 'result-banner';
    }

    function startListeningPhase() {
      targetSeq = generateRhythm();
      studentSeq = [];
      buildMeasures();
      phase = 'listening';
      setMsg('Figyelj! ▶️');
      document.getElementById('sTi').disabled  = true;
      document.getElementById('sTaa').disabled = true;
      document.getElementById('btnReplay').disabled = true;
      document.getElementById('btnCheck').disabled  = true;
      document.getElementById('btnClear').disabled  = true;
      document.getElementById('resultBanner').className = 'result-banner';

      // Play with slot highlight
      playSequence(targetSeq, (i) => {
        document.querySelectorAll('.dot-slot').forEach(s => s.classList.remove('playing'));
        const slot = document.getElementById(`slot-${i}`);
        if (slot) slot.classList.add('playing');
      });

      // After playback ends, enable student input
      let totalDur = 0.08;
      targetSeq.forEach(b => { totalDur += b === 'ti' ? TI_GAP : TAA_GAP; });
      setTimeout(() => {
        document.querySelectorAll('.dot-slot').forEach(s => s.classList.remove('playing'));
        startAnswerPhase();
      }, totalDur * 1000 + 200);
    }

    function startAnswerPhase() {
      phase = 'answering';
      setMsg('Most te jössz! Játszd vissza!');
      document.getElementById('sTi').disabled  = false;
      document.getElementById('sTaa').disabled = false;
      document.getElementById('btnReplay').disabled = false;
      document.getElementById('btnCheck').disabled  = false;
      document.getElementById('btnClear').disabled  = false;
    }

    function setMsg(txt) {
      document.getElementById('phaseMsg').textContent = txt;
    }

    // ── Generate button ──────────────────────────────────────────────────
    document.getElementById('btnGenerate').addEventListener('click', () => {
      startListeningPhase();
    });

    // ── Replay ───────────────────────────────────────────────────────────
    document.getElementById('btnReplay').addEventListener('click', () => {
      if (phase !== 'answering') return;
      setMsg('Figyelj újra! ▶️');
      document.getElementById('sTi').disabled  = true;
      document.getElementById('sTaa').disabled = true;
      document.getElementById('btnReplay').disabled = true;

      playSequence(targetSeq);

      let totalDur = 0.08;
      targetSeq.forEach(b => { totalDur += b === 'ti' ? TI_GAP : TAA_GAP; });
      setTimeout(() => {
        setMsg('Most te jössz!');
        document.getElementById('sTi').disabled  = false;
        document.getElementById('sTaa').disabled = false;
        document.getElementById('btnReplay').disabled = false;
      }, totalDur * 1000 + 200);
    });

    // ── Student input ────────────────────────────────────────────────────
    function studentBeat(type, x, y) {
      if (phase !== 'answering') return;
      // Check if adding this beat exceeds total capacity
      const used = studentSeq.reduce((s, b) => s + (b === 'taa' ? 2 : 1), 0);
      const adding = type === 'taa' ? 2 : 1;
      if (used + adding > timeSig * numMeasures) return;

      studentSeq.push(type);
      buildMeasures(studentSeq);
      if (type === 'ti') { playTi(); spawnRipple(x, y, 'rgba(255,107,107,0.4)'); pulse(document.getElementById('sTi')); }
      else               { playTaa(); spawnRipple(x, y, 'rgba(78,205,196,0.4)'); pulse(document.getElementById('sTaa')); }
    }

    document.getElementById('sTi').addEventListener('pointerdown', e => {
      e.preventDefault();
      const r = e.target.getBoundingClientRect();
      studentBeat('ti', r.left + r.width/2, r.top + r.height/2);
    });
    document.getElementById('sTaa').addEventListener('pointerdown', e => {
      e.preventDefault();
      const r = e.target.getBoundingClientRect();
      studentBeat('taa', r.left + r.width/2, r.top + r.height/2);
    });

    // ── Check ────────────────────────────────────────────────────────────
    document.getElementById('btnCheck').addEventListener('click', () => {
      if (phase !== 'answering' || studentSeq.length === 0) return;
      phase = 'result';
      buildMeasures(studentSeq, true);

      const ok = studentSeq.length === targetSeq.length &&
                 studentSeq.every((b, i) => b === targetSeq[i]);

      if (ok) { scoreOk++;  document.getElementById('scoreOk').textContent   = scoreOk; }
      else    { scoreFail++; document.getElementById('scoreFail').textContent = scoreFail; }

      const banner = document.getElementById('resultBanner');
      banner.textContent = ok ? '🎉 Helyes! Pontosan visszajátszottad!' : '❌ Nem egyezik. Próbálj egy újat!';
      banner.className = 'result-banner show ' + (ok ? 'ok' : 'fail');

      document.getElementById('sTi').disabled  = true;
      document.getElementById('sTaa').disabled = true;
      document.getElementById('btnReplay').disabled = true;
      document.getElementById('btnCheck').disabled  = true;
      document.getElementById('btnClear').disabled  = true;
      setMsg('Kész! Nyomj 🎲-ra az új feladathoz.');
    });

    // ── Clear ─────────────────────────────────────────────────────────────
    document.getElementById('btnClear').addEventListener('click', () => {
      if (phase !== 'answering') return;
      studentSeq = [];
      buildMeasures();
      document.getElementById('resultBanner').className = 'result-banner';
    });

    // ── Helpers ───────────────────────────────────────────────────────────
    function spawnRipple(x, y, color) {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.cssText = `left:${x}px;top:${y}px;width:70px;height:70px;background:${color};`;
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 700);
    }
    function pulse(el) {
      el.classList.add('pressed');
      setTimeout(() => el.classList.remove('pressed'), 150);
    }
  </script>
</body>
</html>
